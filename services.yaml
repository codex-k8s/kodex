# Draft only. This file is not a deployable inventory yet.
# Previous full inventory is archived at deprecated/services.yaml.
apiVersion: kodex.works/v1alpha1
kind: ServiceStackDraft
metadata:
  name: kodex
  status: draft
spec:
  purpose: >
    Minimal root placeholder after the reset before wave 7. Do not use it for
    build, deploy, version bumps, runtime profiles or agent workspace assembly.
  sourceOfTruth:
    - refactoring/task.md
    - refactoring/README.md
    - refactoring/24-pre-wave7-documentation-rebuild-plan.md
  archivedPreviousInventory: deprecated/services.yaml
  activeRoots:
    - AGENTS.md
    - README.md
    - docs/index.md
    - docs/design-guidelines
    - docs/templates
    - refactoring
  repositorySources:
    submodules:
      documentation:
        - id: guidelines-common
          repo: github.com/codex-k8s/kodex-guidelines-common-ru
          path: docs/external/guidelines/common
          visibility: public
          role: common-guidelines
        - id: guidelines-go
          repo: github.com/codex-k8s/kodex-guidelines-go-ru
          path: docs/external/guidelines/go
          visibility: public
          role: go-guidelines
        - id: guidelines-vue
          repo: github.com/codex-k8s/kodex-guidelines-vue-ru
          path: docs/external/guidelines/vue
          visibility: public
          role: vue-guidelines
        - id: doc-templates
          repo: github.com/codex-k8s/kodex-doc-templates-ru
          path: docs/external/templates
          visibility: public
          role: documentation-templates
      packages:
        - id: package-store-source
          repo: github.com/codex-k8s/kodex-package-store
          path: packages/package-store
          visibility: private
          role: platform-owned-package-source
        - id: platform-site-source
          repo: github.com/codex-k8s/kodex-platform-site
          path: packages/platform-site
          visibility: private
          role: platform-owned-package-source
    policies:
      ordinaryClone:
        initSubmodules: false
      privateSubmodules:
        ownerPrefix: github.com/codex-k8s/
        skipWhenRepositorySlugOutsideOwnerPrefix: true
      changeManagement:
        mode: pull-request-only
      packageDelivery:
        platformOwnedSourceReposMayUseSubmodules: true
        thirdPartyAndCustomerPackagesUseSubmodules: false
        useSubmodulesForInstalledPackages: false
        allowPinnedGitRefs: true
        allowedRefs:
          - tag
          - commit
        paidPackagesDistribution: platform-proxy-only
  deployableServices: []
  notes:
    - New deployable services must be added only after the corresponding wave documentation is accepted.
    - Do not restore old services, versions, environments or runtime settings from deprecated/services.yaml mechanically.
    - The final inventory schema is defined by the new architecture, not by the archived pre-refactor file.
    - Submodules are for platform-owned source repositories and public guidance packages, not for the default installation path of user packages.
