      bumpOn:
        - services/internal/platform-event-log
        - libs/go/eventlog
        - libs/go/migrationtest
        - deploy/base/platform-event-log
        - deploy/base/postgres
    golang-alpine:
      value: "1.25.8-alpine"
    pgvector:
      value: "pg16"
    registry:
      value: "2"
    kaniko-executor:
      value: "v1.24.0-debug"
    crane:
      value: "debug"
    busybox:
      value: "1.36"
  images:
    golang-alpine:
      type: external
      from: 'golang:{{ version "golang-alpine" }}'
      local: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/kodex/mirror/golang:{{ version "golang-alpine" }}'
    postgres:
      type: external
      from: 'pgvector/pgvector:{{ version "pgvector" }}'
      local: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/kodex/mirror/pgvector:{{ version "pgvector" }}'
    registry:
      type: external
      from: 'registry:{{ version "registry" }}'
      local: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/kodex/mirror/registry:{{ version "registry" }}'
    kaniko-executor:
