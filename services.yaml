      dockerfile: services/internal/package-hub/Dockerfile
      imageEnv: KODEX_PACKAGE_HUB_IMAGE
      internalImageRepositoryEnv: KODEX_PACKAGE_HUB_INTERNAL_IMAGE_REPOSITORY
      migrationsImageEnv: KODEX_PACKAGE_HUB_MIGRATIONS_IMAGE
      migrationsInternalImageRepositoryEnv: KODEX_PACKAGE_HUB_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY
      ownerDomain: package-platform
      apiContracts:
        grpc: proto/kodex/packages/v1/package_hub.proto
        asyncapi: specs/asyncapi/package-hub.v1.yaml
