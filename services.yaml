# Draft inventory for the active refactoring architecture.
# Previous full inventory is archived at deprecated/services.yaml.
apiVersion: kodex.works/v1alpha1
kind: ServiceStackDraft
metadata:
  name: kodex
  status: draft
spec:
  purpose: >
    Active minimal inventory after the reset. It records only the services,
    data stores, versions, images and deploy manifests that already belong to
    the new architecture. Do not restore old entries from deprecated/services.yaml
    mechanically.
  sourceOfTruth:
    - refactoring/task.md
    - refactoring/README.md
    - refactoring/24-pre-wave7-documentation-rebuild-plan.md
  archivedPreviousInventory: deprecated/services.yaml
  activeRoots:
    - AGENTS.md
    - README.md
    - bootstrap
    - docs/index.md
    - docs/design-guidelines
    - docs/templates
    - deploy
    - proto
    - services
    - specs
    - refactoring
  repositorySources:
    sourceOfTruth:
      gitSubmodules: .gitmodules
      packageRuntimeMetadata: platform-db
      packageBootstrapMetadata: package-manifest-json
    paths:
      guidancePackages: docs/external/guidelines
      documentTemplates: docs/templates
      packages: packages
    policies:
      workspaceSources:
        initAllGitSubmodules: true
        unavailableSourcesMustBeReported: true
      privateSubmodules:
        accessCheckedByPlatform: true
      changeManagement:
        mode: pull-request-only
      packageDelivery:
        checkoutRoot: packages
        sourceSubmodulesDeclaredInGitmodules: true
        installedPackageMetadataStoredInDb: true
        prefillMetadataFromPackageManifestJson: true
        installedPackagesUsePinnedGitRefs: true
        allowPinnedGitRefs: true
        allowedRefs:
          - tag
          - commit
        downstreamRepositoryCleanupWorkflow: true
  versions:
    access-manager:
      value: "0.1.0"
      bumpOn:
        - services/internal/access-manager
        - libs/go/accesscatalog
        - libs/go/grpcserver
        - libs/go/postgres
        - libs/go/eventlog
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/access
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/access_accounts/v1
        - specs/asyncapi/access-manager.v1.yaml
        - deploy/base/access-manager
    project-catalog:
      value: "0.1.0"
      bumpOn:
        - services/internal/project-catalog
        - libs/go/accesscheck
        - libs/go/accesscatalog
        - libs/go/eventconsumer
        - libs/go/grpcserver
        - libs/go/postgres
        - libs/go/eventlog
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/provider
        - libs/go/platformevents/project
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/providers/v1
        - proto/kodex/projects/v1
        - specs/asyncapi/project-catalog.v1.yaml
        - deploy/base/project-catalog
    package-hub:
      value: "0.1.0"
      bumpOn:
        - services/internal/package-hub
        - libs/go/accesscheck
        - libs/go/accesscatalog
        - libs/go/eventlog
        - libs/go/grpcserver
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/packagehub
        - libs/go/postgres
        - libs/go/secretresolver
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/access_accounts/v1
        - proto/kodex/packages/v1
        - specs/asyncapi/package-hub.v1.yaml
        - deploy/base/package-hub
    provider-hub:
      value: "0.1.0"
      bumpOn:
        - services/internal/provider-hub
        - libs/go/accesscatalog
        - libs/go/accesscheck
        - libs/go/grpcserver
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/provider
        - libs/go/postgres
        - libs/go/secretresolver
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/providers/v1
