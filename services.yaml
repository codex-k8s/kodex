# Draft inventory for the active refactoring architecture.
# Previous full inventory is archived at deprecated/services.yaml.
apiVersion: kodex.works/v1alpha1
kind: ServiceStackDraft
metadata:
  name: kodex
  status: draft
spec:
  purpose: >
    Active minimal inventory after the reset. It records only the services,
    data stores, versions, images and deploy manifests that already belong to
    the new architecture. Do not restore old entries from deprecated/services.yaml
    mechanically.
  sourceOfTruth:
    - refactoring/task.md
    - refactoring/README.md
    - refactoring/24-pre-wave7-documentation-rebuild-plan.md
  archivedPreviousInventory: deprecated/services.yaml
  activeRoots:
    - AGENTS.md
    - README.md
    - docs/index.md
    - docs/design-guidelines
    - docs/templates
    - deploy
    - proto
    - services
    - specs
    - refactoring
  repositorySources:
    sourceOfTruth:
      gitSubmodules: .gitmodules
      packageRuntimeMetadata: platform-db
      packageBootstrapMetadata: package-manifest-json
    paths:
      guidancePackages: docs/external/guidelines
      documentTemplates: docs/templates
      packages: packages
    policies:
      workspaceSources:
        initAllGitSubmodules: true
        unavailableSourcesMustBeReported: true
      privateSubmodules:
        accessCheckedByPlatform: true
      changeManagement:
        mode: pull-request-only
      packageDelivery:
        checkoutRoot: packages
        sourceSubmodulesDeclaredInGitmodules: true
        installedPackageMetadataStoredInDb: true
        prefillMetadataFromPackageManifestJson: true
        installedPackagesUsePinnedGitRefs: true
        allowPinnedGitRefs: true
        allowedRefs:
          - tag
          - commit
        downstreamRepositoryCleanupWorkflow: true
  versions:
    access-manager:
      value: "0.1.0"
      bumpOn:
        - services/internal/access-manager
        - libs/go/accesscatalog
        - libs/go/grpcserver
        - libs/go/postgres
        - libs/go/eventlog
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/access
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/access_accounts/v1
        - specs/asyncapi/access-manager.v1.yaml
        - deploy/base/access-manager
    project-catalog:
      value: "0.1.0"
      bumpOn:
        - services/internal/project-catalog
        - libs/go/accesscheck
        - libs/go/accesscatalog
        - libs/go/grpcserver
        - libs/go/postgres
        - libs/go/eventlog
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/project
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/providers/v1
        - proto/kodex/projects/v1
        - specs/asyncapi/project-catalog.v1.yaml
        - deploy/base/project-catalog
    package-hub:
      value: "0.1.0"
      bumpOn:
        - services/internal/package-hub
        - libs/go/accesscheck
        - libs/go/accesscatalog
        - libs/go/eventlog
        - libs/go/grpcserver
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/packagehub
        - libs/go/postgres
        - libs/go/secretresolver
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/access_accounts/v1
        - proto/kodex/packages/v1
        - specs/asyncapi/package-hub.v1.yaml
        - deploy/base/package-hub
    provider-hub:
      value: "0.1.0"
      bumpOn:
        - services/internal/provider-hub
        - libs/go/accesscatalog
        - libs/go/accesscheck
        - libs/go/grpcserver
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/provider
        - libs/go/postgres
        - libs/go/secretresolver
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/providers/v1
        - specs/asyncapi/provider-hub.v1.yaml
        - deploy/base/provider-hub
    integration-gateway:
      value: "0.1.0"
      bumpOn:
        - services/external/integration-gateway
        - specs/openapi/integration-gateway.v1.yaml
        - proto/kodex/providers/v1
        - tools/codegen/openapi/integration-gateway.oapi-codegen.yaml
        - libs/go/servicemain
        - libs/go/serviceprocess
        - libs/go/secretresolver
    runtime-manager:
      value: "0.1.0"
      bumpOn:
        - services/internal/runtime-manager
        - libs/go/accesscheck
        - libs/go/accesscatalog
        - libs/go/eventlog
        - libs/go/grpcserver
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/postgres
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/fleet/v1
        - proto/kodex/runtime/v1
        - specs/asyncapi/runtime-manager.v1.yaml
        - deploy/base/runtime-manager
    fleet-manager:
      value: "0.1.0"
      bumpOn:
        - services/internal/fleet-manager
        - libs/go/accesscatalog
        - libs/go/accesscheck
        - libs/go/grpcserver
        - libs/go/postgres
        - libs/go/eventlog
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/fleet
        - libs/go/secretresolver
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/fleet/v1
        - specs/asyncapi/fleet-manager.v1.yaml
        - deploy/base/fleet-manager
    governance-manager:
      value: "0.1.0"
      bumpOn:
        - services/internal/governance-manager
        - libs/go/grpcserver
        - libs/go/postgres
        - libs/go/eventlog
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/governance
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/governance/v1
        - specs/asyncapi/governance-manager.v1.yaml
    platform-mcp-server:
      value: "0.1.0"
      bumpOn:
        - services/internal/platform-mcp-server
        - libs/go/grpcserver
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/agents/v1
        - proto/kodex/providers/v1
    codex-hook-ingress:
      value: "0.1.0"
      bumpOn:
        - services/internal/codex-hook-ingress
        - libs/go/serviceprocess
        - libs/go/servicemain
        - specs/jsonschema/codex-hook-ingress.v1
    interaction-hub:
      value: "0.1.0"
      bumpOn:
        - services/internal/interaction-hub
        - libs/go/eventlog
        - libs/go/grpcserver
        - libs/go/migrationtest
        - libs/go/outbox
        - libs/go/platformevents/interaction
        - libs/go/postgres
        - libs/go/serviceprocess
        - libs/go/servicemain
        - proto/kodex/interactions/v1
        - specs/asyncapi/interaction-hub.v1.yaml
    platform-event-log:
      value: "0.1.0"
      bumpOn:
        - services/internal/platform-event-log
        - libs/go/eventlog
        - libs/go/migrationtest
        - deploy/base/platform-event-log
        - deploy/base/postgres
    golang-alpine:
      value: "1.25.8-alpine"
    pgvector:
      value: "pg16"
  images:
    golang-alpine:
      type: external
      from: 'golang:{{ index .Versions "golang-alpine" }}'
      local: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/kodex/mirror/golang:{{ index .Versions "golang-alpine" }}'
    postgres:
      type: external
      from: 'pgvector/pgvector:{{ index .Versions "pgvector" }}'
      local: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/kodex/mirror/pgvector:{{ index .Versions "pgvector" }}'
    access-manager:
      type: build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_ACCESS_MANAGER_INTERNAL_IMAGE_REPOSITORY" "kodex/access-manager" }}'
      tagTemplate: '{{ index .Versions "access-manager" }}'
      dockerfile: services/internal/access-manager/Dockerfile
      target: prod
      context: .
      imageEnv: KODEX_ACCESS_MANAGER_IMAGE
    access-manager-migrations:
      type: migration-build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_ACCESS_MANAGER_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY" "kodex/access-manager-migrations" }}'
      tagTemplate: '{{ index .Versions "access-manager" }}'
      dockerfile: services/internal/access-manager/Dockerfile
      target: migrations
      context: .
      imageEnv: KODEX_ACCESS_MANAGER_MIGRATIONS_IMAGE
      migratesDatabase: kodex_access_manager
    project-catalog:
      type: build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_PROJECT_CATALOG_INTERNAL_IMAGE_REPOSITORY" "kodex/project-catalog" }}'
      tagTemplate: '{{ index .Versions "project-catalog" }}'
      dockerfile: services/internal/project-catalog/Dockerfile
      target: prod
      context: .
      imageEnv: KODEX_PROJECT_CATALOG_IMAGE
    project-catalog-migrations:
      type: migration-build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_PROJECT_CATALOG_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY" "kodex/project-catalog-migrations" }}'
      tagTemplate: '{{ index .Versions "project-catalog" }}'
      dockerfile: services/internal/project-catalog/Dockerfile
      target: migrations
      context: .
      imageEnv: KODEX_PROJECT_CATALOG_MIGRATIONS_IMAGE
      migratesDatabase: kodex_project_catalog
    package-hub:
      type: build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_PACKAGE_HUB_INTERNAL_IMAGE_REPOSITORY" "kodex/package-hub" }}'
      tagTemplate: '{{ index .Versions "package-hub" }}'
      dockerfile: services/internal/package-hub/Dockerfile
      target: prod
      context: .
      imageEnv: KODEX_PACKAGE_HUB_IMAGE
    package-hub-migrations:
      type: migration-build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_PACKAGE_HUB_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY" "kodex/package-hub-migrations" }}'
      tagTemplate: '{{ index .Versions "package-hub" }}'
      dockerfile: services/internal/package-hub/Dockerfile
      target: migrations
      context: .
      imageEnv: KODEX_PACKAGE_HUB_MIGRATIONS_IMAGE
      migratesDatabase: kodex_package_hub
    provider-hub:
      type: build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_PROVIDER_HUB_INTERNAL_IMAGE_REPOSITORY" "kodex/provider-hub" }}'
      tagTemplate: '{{ index .Versions "provider-hub" }}'
      dockerfile: services/internal/provider-hub/Dockerfile
      target: prod
      context: .
      imageEnv: KODEX_PROVIDER_HUB_IMAGE
    provider-hub-migrations:
      type: migration-build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_PROVIDER_HUB_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY" "kodex/provider-hub-migrations" }}'
      tagTemplate: '{{ index .Versions "provider-hub" }}'
      dockerfile: services/internal/provider-hub/Dockerfile
      target: migrations
      context: .
      imageEnv: KODEX_PROVIDER_HUB_MIGRATIONS_IMAGE
      migratesDatabase: kodex_provider_hub
    runtime-manager:
      type: build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_RUNTIME_MANAGER_INTERNAL_IMAGE_REPOSITORY" "kodex/runtime-manager" }}'
      tagTemplate: '{{ index .Versions "runtime-manager" }}'
      dockerfile: services/internal/runtime-manager/Dockerfile
      target: prod
      context: .
      imageEnv: KODEX_RUNTIME_MANAGER_IMAGE
    runtime-manager-migrations:
      type: migration-build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_RUNTIME_MANAGER_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY" "kodex/runtime-manager-migrations" }}'
      tagTemplate: '{{ index .Versions "runtime-manager" }}'
      dockerfile: services/internal/runtime-manager/Dockerfile
      target: migrations
      context: .
      imageEnv: KODEX_RUNTIME_MANAGER_MIGRATIONS_IMAGE
      migratesDatabase: kodex_runtime_manager
    fleet-manager:
      type: build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_FLEET_MANAGER_INTERNAL_IMAGE_REPOSITORY" "kodex/fleet-manager" }}'
      tagTemplate: '{{ index .Versions "fleet-manager" }}'
      dockerfile: services/internal/fleet-manager/Dockerfile
      target: prod
      context: .
      imageEnv: KODEX_FLEET_MANAGER_IMAGE
    fleet-manager-migrations:
      type: migration-build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_FLEET_MANAGER_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY" "kodex/fleet-manager-migrations" }}'
      tagTemplate: '{{ index .Versions "fleet-manager" }}'
      dockerfile: services/internal/fleet-manager/Dockerfile
      target: migrations
      context: .
      imageEnv: KODEX_FLEET_MANAGER_MIGRATIONS_IMAGE
      migratesDatabase: kodex_fleet_manager
    platform-event-log-migrations:
      type: migration-build
      repository: '{{ envOr "KODEX_INTERNAL_REGISTRY_HOST" "127.0.0.1:5000" }}/{{ envOr "KODEX_PLATFORM_EVENT_LOG_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY" "kodex/platform-event-log-migrations" }}'
      tagTemplate: '{{ index .Versions "platform-event-log" }}'
      dockerfile: services/internal/platform-event-log/Dockerfile
      target: prod
      context: .
      imageEnv: KODEX_PLATFORM_EVENT_LOG_MIGRATIONS_IMAGE
      migratesDatabase: kodex_platform_event_log
  deployableServices:
    - name: access-manager
      status: foundation
      zone: internal
      path: services/internal/access-manager
      dockerfile: services/internal/access-manager/Dockerfile
      imageEnv: KODEX_ACCESS_MANAGER_IMAGE
      internalImageRepositoryEnv: KODEX_ACCESS_MANAGER_INTERNAL_IMAGE_REPOSITORY
      migrationsImageEnv: KODEX_ACCESS_MANAGER_MIGRATIONS_IMAGE
      migrationsInternalImageRepositoryEnv: KODEX_ACCESS_MANAGER_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY
      ownerDomain: access-and-accounts
      apiContracts:
        grpc: proto/kodex/access_accounts/v1/access_manager.proto
        asyncapi: specs/asyncapi/access-manager.v1.yaml
      database:
        owner: access-manager
        migrations: services/internal/access-manager/cmd/cli/migrations
      deploy:
        serviceManifest: deploy/base/access-manager/access-manager.yaml.tpl
        migrationsManifest: deploy/base/access-manager/migrations.yaml.tpl
        kustomization: deploy/base/access-manager/kustomization.yaml.tpl
        health:
          livez: /health/livez
          readyz: /health/readyz
          metrics: /metrics
    - name: project-catalog
      status: foundation
      zone: internal
      path: services/internal/project-catalog
      dockerfile: services/internal/project-catalog/Dockerfile
      imageEnv: KODEX_PROJECT_CATALOG_IMAGE
      internalImageRepositoryEnv: KODEX_PROJECT_CATALOG_INTERNAL_IMAGE_REPOSITORY
      migrationsImageEnv: KODEX_PROJECT_CATALOG_MIGRATIONS_IMAGE
      migrationsInternalImageRepositoryEnv: KODEX_PROJECT_CATALOG_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY
      ownerDomain: projects-and-repositories
      apiContracts:
        grpc: proto/kodex/projects/v1/project_catalog.proto
        asyncapi: specs/asyncapi/project-catalog.v1.yaml
      database:
        owner: project-catalog
        migrations: services/internal/project-catalog/cmd/cli/migrations
      deploy:
        serviceManifest: deploy/base/project-catalog/project-catalog.yaml.tpl
        migrationsManifest: deploy/base/project-catalog/migrations.yaml.tpl
        kustomization: deploy/base/project-catalog/kustomization.yaml.tpl
        health:
          livez: /health/livez
          readyz: /health/readyz
          metrics: /metrics
    - name: package-hub
      status: foundation
      zone: internal
      path: services/internal/package-hub
      dockerfile: services/internal/package-hub/Dockerfile
      imageEnv: KODEX_PACKAGE_HUB_IMAGE
      internalImageRepositoryEnv: KODEX_PACKAGE_HUB_INTERNAL_IMAGE_REPOSITORY
      migrationsImageEnv: KODEX_PACKAGE_HUB_MIGRATIONS_IMAGE
      migrationsInternalImageRepositoryEnv: KODEX_PACKAGE_HUB_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY
      ownerDomain: package-platform
      apiContracts:
        grpc: proto/kodex/packages/v1/package_hub.proto
        asyncapi: specs/asyncapi/package-hub.v1.yaml
      database:
        owner: package-hub
        migrations: services/internal/package-hub/cmd/cli/migrations
      dependencies:
        - access-manager
        - platform-event-log
      deploy:
        serviceManifest: deploy/base/package-hub/package-hub.yaml.tpl
        migrationsManifest: deploy/base/package-hub/migrations.yaml.tpl
        kustomization: deploy/base/package-hub/kustomization.yaml.tpl
        health:
          livez: /health/livez
          readyz: /health/readyz
          metrics: /metrics
    - name: provider-hub
      status: foundation
      zone: internal
      path: services/internal/provider-hub
      dockerfile: services/internal/provider-hub/Dockerfile
      imageEnv: KODEX_PROVIDER_HUB_IMAGE
      internalImageRepositoryEnv: KODEX_PROVIDER_HUB_INTERNAL_IMAGE_REPOSITORY
      migrationsImageEnv: KODEX_PROVIDER_HUB_MIGRATIONS_IMAGE
      migrationsInternalImageRepositoryEnv: KODEX_PROVIDER_HUB_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY
      ownerDomain: provider-native-work-items
      apiContracts:
        grpc: proto/kodex/providers/v1/provider_hub.proto
        asyncapi: specs/asyncapi/provider-hub.v1.yaml
      database:
        owner: provider-hub
        migrations: services/internal/provider-hub/cmd/cli/migrations
      dependencies:
        - access-manager
        - platform-event-log
      deploy:
        serviceManifest: deploy/base/provider-hub/provider-hub.yaml.tpl
        migrationsManifest: deploy/base/provider-hub/migrations.yaml.tpl
        kustomization: deploy/base/provider-hub/kustomization.yaml.tpl
        health:
          livez: /health/livez
          readyz: /health/readyz
          metrics: /metrics
    - name: runtime-manager
      status: foundation
      zone: internal
      path: services/internal/runtime-manager
      dockerfile: services/internal/runtime-manager/Dockerfile
      imageEnv: KODEX_RUNTIME_MANAGER_IMAGE
      internalImageRepositoryEnv: KODEX_RUNTIME_MANAGER_INTERNAL_IMAGE_REPOSITORY
      migrationsImageEnv: KODEX_RUNTIME_MANAGER_MIGRATIONS_IMAGE
      migrationsInternalImageRepositoryEnv: KODEX_RUNTIME_MANAGER_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY
      ownerDomain: runtime-and-fleet
      apiContracts:
        grpc: proto/kodex/runtime/v1/runtime_manager.proto
        asyncapi: specs/asyncapi/runtime-manager.v1.yaml
      database:
        owner: runtime-manager
        migrations: services/internal/runtime-manager/cmd/cli/migrations
      dependencies:
        - access-manager
        - fleet-manager
        - platform-event-log
      deploy:
        serviceManifest: deploy/base/runtime-manager/runtime-manager.yaml.tpl
        migrationsManifest: deploy/base/runtime-manager/migrations.yaml.tpl
        kustomization: deploy/base/runtime-manager/kustomization.yaml.tpl
        health:
          livez: /health/livez
          readyz: /health/readyz
          metrics: /metrics
    - name: fleet-manager
      status: foundation
      zone: internal
      path: services/internal/fleet-manager
      dockerfile: services/internal/fleet-manager/Dockerfile
      imageEnv: KODEX_FLEET_MANAGER_IMAGE
      internalImageRepositoryEnv: KODEX_FLEET_MANAGER_INTERNAL_IMAGE_REPOSITORY
      migrationsImageEnv: KODEX_FLEET_MANAGER_MIGRATIONS_IMAGE
      migrationsInternalImageRepositoryEnv: KODEX_FLEET_MANAGER_MIGRATIONS_INTERNAL_IMAGE_REPOSITORY
      ownerDomain: runtime-and-fleet
      apiContracts:
        grpc: proto/kodex/fleet/v1/fleet_manager.proto
        asyncapi: specs/asyncapi/fleet-manager.v1.yaml
      database:
        owner: fleet-manager
        migrations: services/internal/fleet-manager/cmd/cli/migrations
      dependencies:
        - access-manager
        - platform-event-log
      deploy:
        serviceManifest: deploy/base/fleet-manager/fleet-manager.yaml.tpl
        migrationsManifest: deploy/base/fleet-manager/migrations.yaml.tpl
        kustomization: deploy/base/fleet-manager/kustomization.yaml.tpl
        health:
          livez: /health/livez
          readyz: /health/readyz
          metrics: /metrics
  platformDataStores:
    - name: platform-event-log
      status: foundation
      owner: platform-event-log
      databaseName: kodex_platform_event_log
      migrations: services/internal/platform-event-log/cmd/cli/migrations
      dockerfile: services/internal/platform-event-log/Dockerfile
      migrationsImageEnv: KODEX_PLATFORM_EVENT_LOG_MIGRATIONS_IMAGE
      clientLibrary: libs/go/eventlog
      purpose: shared-domain-event-log
    - name: runtime-manager
      status: foundation
      owner: runtime-manager
      databaseName: kodex_runtime_manager
      migrations: services/internal/runtime-manager/cmd/cli/migrations
      dockerfile: services/internal/runtime-manager/Dockerfile
      migrationsImageEnv: KODEX_RUNTIME_MANAGER_MIGRATIONS_IMAGE
      purpose: runtime-slots-workspaces-jobs
    - name: package-hub
      status: foundation
      owner: package-hub
      databaseName: kodex_package_hub
      migrations: services/internal/package-hub/cmd/cli/migrations
      dockerfile: services/internal/package-hub/Dockerfile
      migrationsImageEnv: KODEX_PACKAGE_HUB_MIGRATIONS_IMAGE
      purpose: package-sources-catalog-installations-manifest
    - name: provider-hub
      status: foundation
      owner: provider-hub
      databaseName: kodex_provider_hub
      migrations: services/internal/provider-hub/cmd/cli/migrations
      dockerfile: services/internal/provider-hub/Dockerfile
      migrationsImageEnv: KODEX_PROVIDER_HUB_MIGRATIONS_IMAGE
      purpose: provider-native-projections-webhook-reconciliation-operations
    - name: fleet-manager
      status: foundation
      owner: fleet-manager
      databaseName: kodex_fleet_manager
      migrations: services/internal/fleet-manager/cmd/cli/migrations
      dockerfile: services/internal/fleet-manager/Dockerfile
      migrationsImageEnv: KODEX_FLEET_MANAGER_MIGRATIONS_IMAGE
      purpose: fleet-scopes-servers-clusters-health-placement
  serviceScaffolds:
    - name: integration-gateway
      status: scaffold
      zone: external
      path: services/external/integration-gateway
      ownerDomain: integration-gateway
      apiContracts:
        openapi: specs/openapi/integration-gateway.v1.yaml
        ownerGrpcClient: proto/kodex/providers/v1/provider_hub.proto
      dependencies:
        - provider-hub
      implementation:
        businessState: none
        providerWebhookRoute: github-hmac-sha256-to-provider-hub
        signatureVerification: github-x-hub-signature-256
        webhookSecretRefs:
          storeTypeEnv: KODEX_INTEGRATION_GATEWAY_PROVIDER_WEBHOOK_GITHUB_SECRET_STORE_TYPE
          storeRefEnv: KODEX_INTEGRATION_GATEWAY_PROVIDER_WEBHOOK_GITHUB_SECRET_STORE_REF
          resolverBackends:
            - env
            - kubernetes_mounted_secret
            - vault
        callbackRoutes: reserved-only
      deploy:
        health:
          livez: /health/livez
          readyz: /health/readyz
          metrics: /metrics
