<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <style>
      .bg { fill: #f4efe6; }
      .panel { fill: #fffdfa; stroke: #d7cfbf; stroke-width: 2; }
      .soft { fill: #faf6ef; stroke: #e2d8c8; stroke-width: 1.5; }
      .blue { fill: #dcecff; }
      .green { fill: #ddf3e6; }
      .yellow { fill: #f8efd4; }
      .accent { fill: #d86a3b; }
      .title { fill: #1f1914; font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .heading { fill: #1f1914; font-family: Arial, sans-serif; font-size: 23px; font-weight: 700; }
      .label { fill: #1f1914; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .body { fill: #342d26; font-family: Arial, sans-serif; font-size: 17px; }
      .small { fill: #6d655b; font-family: Arial, sans-serif; font-size: 16px; }
      .chip { fill: #5d4c41; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .white { fill: #ffffff; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="960"/>
  <rect class="panel" x="28" y="24" width="1544" height="912" rx="28"/>
  <text class="title" x="64" y="78">Вариант B — каталог ролей и шаблонов с публикацией через PR</text>
  <text class="small" x="64" y="108">Основной фокус не на полотне flow, а на роли, её правах, шаблонах и будущем PR, который публикует изменения.</text>

  <rect class="panel" x="54" y="136" width="360" height="754" rx="26"/>
  <text class="heading" x="84" y="176">Каталог ролей</text>
  <rect class="yellow" x="84" y="198" width="300" height="56" rx="16"/>
  <text class="chip" x="108" y="231">vision-reviewer • встроенная</text>
  <rect class="soft" x="84" y="270" width="300" height="56" rx="16"/>
  <text class="chip" x="108" y="303">lexical-gatekeeper • пользовательская</text>
  <rect class="soft" x="84" y="342" width="300" height="56" rx="16"/>
  <text class="chip" x="108" y="375">risk-manager • встроенная</text>
  <rect class="soft" x="84" y="414" width="300" height="56" rx="16"/>
  <text class="chip" x="108" y="447">qa-release-check • встроенная</text>
  <rect class="soft" x="84" y="486" width="300" height="56" rx="16"/>
  <text class="chip" x="108" y="519">custom-adoption-guide • пользовательская</text>
  <rect class="accent" x="84" y="822" width="170" height="42" rx="14"/>
  <text class="white" x="114" y="848">Новая роль</text>

  <rect class="panel" x="438" y="136" width="586" height="754" rx="26"/>
  <text class="heading" x="468" y="176">Профиль роли</text>
  <rect class="soft" x="468" y="198" width="526" height="100" rx="18"/>
  <text class="label" x="494" y="232">lexical-gatekeeper</text>
  <text class="body" x="494" y="258">Назначение: проверить PR и follow-up `Issue` на избыточную смесь русского и английского.</text>
  <text class="body" x="494" y="282">Область действия: проект / flow / переход `vision` → `prd`</text>

  <rect class="soft" x="468" y="320" width="250" height="154" rx="18"/>
  <text class="label" x="492" y="354">Шаблоны</text>
  <text class="body" x="492" y="380">• `work`: prompts/roles/lexical/work.md</text>
  <text class="body" x="492" y="406">• `revise`: не требуется</text>
  <text class="body" x="492" y="432">• версия: main@8d18af2</text>

  <rect class="soft" x="744" y="320" width="250" height="154" rx="18"/>
  <text class="label" x="768" y="354">Права и контур</text>
  <text class="body" x="768" y="380">• MCP: comments, feedback, approvals</text>
  <text class="body" x="768" y="406">• GitHub account: kodex-agent</text>
  <text class="body" x="768" y="432">• Runtime: `code-only`</text>

  <rect class="soft" x="468" y="496" width="526" height="180" rx="18"/>
  <text class="label" x="492" y="530">Связь с flow</text>
  <text class="body" x="492" y="556">• запускается после прохождения базовой acceptance</text>
  <text class="body" x="492" y="582">• работает параллельно с `vision-reviewer`</text>
  <text class="body" x="492" y="608">• может оставить comment, approval или follow-up `Issue`</text>
  <text class="body" x="492" y="634">• не имеет права понижать risk class</text>

  <rect class="soft" x="468" y="698" width="526" height="148" rx="18"/>
  <text class="label" x="492" y="732">Изменения</text>
  <text class="body" x="492" y="758">UI показывает diff по profile fields и затронутым prompt files.</text>
  <text class="body" x="492" y="784">Сохранение идёт только через branch и `PR`.</text>

  <rect class="panel" x="1048" y="136" width="500" height="754" rx="26"/>
  <text class="heading" x="1078" y="176">Просмотр diff и будущего PR</text>

  <rect class="soft" x="1078" y="198" width="440" height="216" rx="18"/>
  <text class="label" x="1102" y="232">Изменённые файлы</text>
  <text class="body" x="1102" y="258">• prompts/roles/lexical/work.md</text>
  <text class="body" x="1102" y="284">• roles/catalog/lexical-gatekeeper.yaml</text>
  <text class="body" x="1102" y="310">• flows/full-delivery.yaml</text>
  <text class="body" x="1102" y="336">• rights/mcp-policies.yaml</text>

  <rect class="soft" x="1078" y="434" width="440" height="230" rx="18"/>
  <text class="label" x="1102" y="468">Summary будущего PR</text>
  <text class="body" x="1102" y="494">Включает новую пользовательскую роль, шаблон и привязку к flow.</text>
  <text class="body" x="1102" y="520">После merge роль станет доступна в командном центре и в редакторе flow.</text>
  <text class="body" x="1102" y="546">Traceability: связать с `Issue` настройки и review шаблонов.</text>

  <rect class="green" x="1078" y="692" width="220" height="46" rx="14"/>
  <text class="chip" x="1112" y="720">Показать diff</text>
  <rect class="accent" x="1310" y="692" width="208" height="46" rx="14"/>
  <text class="white" x="1350" y="720">Создать PR</text>

  <rect class="soft" x="1078" y="760" width="440" height="86" rx="18"/>
  <text class="body" x="1102" y="796">Права доступа, внешние аккаунты и runtime проверяются до публикации.</text>
  <text class="body" x="1102" y="822">Скрытого сохранения текста шаблонов в БД нет.</text>
</svg>
