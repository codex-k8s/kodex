<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <style>
      .bg { fill: #f4efe6; }
      .panel { fill: #fffdfa; stroke: #d7cfbf; stroke-width: 2; }
      .soft { fill: #faf6ef; stroke: #e3d8c7; stroke-width: 1.5; }
      .blue { fill: #dcecff; }
      .green { fill: #ddf4e6; }
      .yellow { fill: #f8efd4; }
      .rose { fill: #f8d9cf; }
      .accent { fill: #d86a3b; }
      .title { fill: #1f1914; font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .heading { fill: #1f1914; font-family: Arial, sans-serif; font-size: 23px; font-weight: 700; }
      .label { fill: #1f1914; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .body { fill: #342d26; font-family: Arial, sans-serif; font-size: 17px; }
      .small { fill: #6d655b; font-family: Arial, sans-serif; font-size: 16px; }
      .chip { fill: #5f4d42; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .white { fill: #ffffff; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="960"/>
  <rect class="panel" x="26" y="24" width="1548" height="912" rx="28"/>
  <rect class="soft" x="26" y="24" width="1548" height="72" rx="28"/>
  <text class="label" x="62" y="68">kodex</text>
  <rect class="panel" x="238" y="42" width="260" height="36" rx="12"/>
  <text class="small" x="260" y="66">Кабинет поставщика</text>
  <rect class="panel" x="516" y="42" width="660" height="36" rx="12"/>
  <text class="small" x="540" y="66">Поиск по задачам, PR, решениям, каналам и настройкам</text>
  <rect class="accent" x="1196" y="38" width="130" height="44" rx="14"/>
  <text class="white" x="1232" y="65">Создать</text>
  <rect class="panel" x="1342" y="38" width="190" height="44" rx="14"/>
  <text class="small" x="1364" y="65">Голос и чат</text>

  <text class="title" x="58" y="144">Вариант B — командный центр с фокусом на решения и активную работу</text>
  <text class="small" x="58" y="176">Сверху — решения и блокировки, снизу — чат и текущая работа. Подходит, если operator inbox важнее ленты диалога.</text>

  <rect class="panel" x="52" y="208" width="1488" height="132" rx="24"/>
  <text class="heading" x="82" y="246">Что требует моего решения сейчас</text>
  <rect class="yellow" x="82" y="266" width="320" height="50" rx="16"/>
  <text class="chip" x="104" y="296">Release gate • PR #614 • открыть решение</text>
  <rect class="rose" x="420" y="266" width="320" height="50" rx="16"/>
  <text class="chip" x="442" y="296">Cleanup `job` failed • открыть диагностику</text>
  <rect class="blue" x="758" y="266" width="320" height="50" rx="16"/>
  <text class="chip" x="780" y="296">Feedback owner • ответить agent-manager</text>
  <rect class="green" x="1096" y="266" width="414" height="50" rx="16"/>
  <text class="chip" x="1118" y="296">Этап завершён • vision → prd • открыть связанный `Issue`</text>

  <rect class="panel" x="52" y="364" width="978" height="500" rx="26"/>
  <text class="heading" x="82" y="404">Чат и возобновляемые сессии</text>
  <rect class="soft" x="82" y="428" width="918" height="84" rx="18"/>
  <text class="label" x="108" y="464">agent-manager</text>
  <text class="body" x="108" y="490">Я подготовил adoption-задачу и нашёл два пробела в правах репозитория.</text>
  <rect class="blue" x="226" y="534" width="540" height="78" rx="18"/>
  <text class="label" x="252" y="568">Пользователь</text>
  <text class="body" x="252" y="594">Покажи мне рабочее пространство `Issue` и шаблоны ролей для onboarding.</text>
  <rect class="green" x="82" y="632" width="660" height="108" rx="18"/>
  <text class="label" x="108" y="668">agent-manager</text>
  <text class="body" x="108" y="696">Открою `Issue` #721 и подскажу, какой flow подойдёт для первого запуска.</text>
  <text class="body" x="108" y="722">Также могу создать PR с изменением role templates.</text>
  <rect class="soft" x="82" y="770" width="918" height="56" rx="16"/>
  <text class="small" x="106" y="804">Поле ввода • переключатель текста и голоса • история ответов • контекст проекта</text>

  <rect class="panel" x="1054" y="364" width="486" height="500" rx="26"/>
  <text class="heading" x="1084" y="404">Текущая работа</text>

  <rect class="soft" x="1084" y="430" width="426" height="96" rx="18"/>
  <text class="label" x="1108" y="464">`Issue` #721 • initiative</text>
  <text class="body" x="1108" y="490">Первый запуск через agent-manager</text>
  <text class="body" x="1108" y="514">Следующий шаг: создать follow-up `Issue` типа `intake`</text>

  <rect class="soft" x="1084" y="546" width="426" height="96" rx="18"/>
  <text class="label" x="1108" y="580">PR #614 • требуется release gate</text>
  <text class="body" x="1108" y="606">Acceptance пройдена, ждём решение owner</text>

  <rect class="soft" x="1084" y="662" width="426" height="96" rx="18"/>
  <text class="label" x="1108" y="696">`run` dev-2481 • `full-env`</text>
  <text class="body" x="1108" y="722">Слот переиспользован, открыт доступ к логам и health summary</text>

  <rect class="soft" x="1084" y="778" width="426" height="56" rx="16"/>
  <text class="chip" x="1108" y="812">Переход в настройки flow • роли • внешние аккаунты</text>

  <circle class="accent" cx="1486" cy="876" r="34"/>
  <text class="white" x="1473" y="884">🎤</text>
</svg>
