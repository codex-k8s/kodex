<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <style>
      .bg { fill: #f5f0e7; }
      .panel { fill: #fffdfa; stroke: #d8cfbf; stroke-width: 2; }
      .soft { fill: #faf6ef; stroke: #e1d7c8; stroke-width: 1.5; }
      .blue { fill: #dfeffd; }
      .green { fill: #dff4e8; }
      .yellow { fill: #f7efd5; }
      .rose { fill: #f7d9cf; }
      .accent { fill: #d96b3b; }
      .title { fill: #1f1914; font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .heading { fill: #1f1914; font-family: Arial, sans-serif; font-size: 23px; font-weight: 700; }
      .label { fill: #1f1914; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .body { fill: #342d26; font-family: Arial, sans-serif; font-size: 17px; }
      .small { fill: #6d655b; font-family: Arial, sans-serif; font-size: 16px; }
      .chip { fill: #5e4d42; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .white { fill: #ffffff; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="960"/>
  <rect class="panel" x="28" y="24" width="1544" height="912" rx="28"/>
  <text class="title" x="64" y="78">Вариант A — рабочее пространство `Issue` с правым контекстом</text>
  <text class="small" x="64" y="108">Слева — история и диалог, справа — связанные `PR`, gates и исполнения. Подходит для работы owner и operator.</text>

  <rect class="panel" x="54" y="136" width="1494" height="132" rx="24"/>
  <text class="heading" x="84" y="176">`Issue` #721 • initiative • Первый запуск через agent-manager</text>
  <text class="body" x="84" y="206">Следующий шаг: создать follow-up `Issue` типа `intake` и выбрать flow для empty repository onboarding.</text>
  <rect class="yellow" x="84" y="222" width="320" height="28" rx="12"/>
  <text class="chip" x="104" y="241">Ожидается продуктовая контрольная точка</text>
  <rect class="blue" x="422" y="222" width="250" height="28" rx="12"/>
  <text class="chip" x="444" y="241">Risk class: R1</text>
  <rect class="green" x="690" y="222" width="282" height="28" rx="12"/>
  <text class="chip" x="712" y="241">Acceptance: контракт заполнен</text>

  <rect class="panel" x="54" y="294" width="938" height="570" rx="26"/>
  <text class="heading" x="84" y="334">Conversation и связанные решения</text>

  <rect class="soft" x="84" y="360" width="880" height="84" rx="18"/>
  <text class="label" x="108" y="394">agent-manager</text>
  <text class="body" x="108" y="420">Найдено два варианта flow. Для первого запуска рекомендую начать с guided onboarding.</text>

  <rect class="blue" x="248" y="468" width="520" height="84" rx="18"/>
  <text class="label" x="274" y="502">Пользователь</text>
  <text class="body" x="274" y="528">Открой мне связанные шаблоны ролей и создай PR с базовой конфигурацией.</text>

  <rect class="green" x="84" y="576" width="880" height="112" rx="18"/>
  <text class="label" x="108" y="612">agent-manager</text>
  <text class="body" x="108" y="638">Создан PR #614, связанный с `Issue` #721. После merge можно запускать первый `run:intake`.</text>
  <text class="body" x="108" y="664">Также добавил ссылку на каталог ролей и шаблонов prompt templates.</text>

  <rect class="soft" x="84" y="716" width="880" height="120" rx="18"/>
  <text class="label" x="108" y="750">Активность</text>
  <text class="body" x="108" y="776">• follow-up `Issue` типа `intake` создан</text>
  <text class="body" x="108" y="802">• role `vision-reviewer` пока не нужна</text>
  <text class="body" x="108" y="828">• внешние аккаунты GitHub и OpenAI валидны</text>

  <rect class="panel" x="1018" y="294" width="530" height="570" rx="26"/>
  <text class="heading" x="1048" y="334">Контекст задачи</text>

  <rect class="soft" x="1048" y="360" width="470" height="96" rx="18"/>
  <text class="label" x="1072" y="394">Связанный PR</text>
  <text class="body" x="1072" y="420">PR #614 • базовая конфигурация onboarding</text>
  <text class="body" x="1072" y="444">Состояние: review открыт, release gate не требуется</text>

  <rect class="soft" x="1048" y="476" width="470" height="96" rx="18"/>
  <text class="label" x="1072" y="510">Проверки и решения</text>
  <text class="body" x="1072" y="536">Acceptance: зелёная</text>
  <text class="body" x="1072" y="560">Human gate: продуктовая контрольная точка pending</text>

  <rect class="soft" x="1048" y="592" width="470" height="96" rx="18"/>
  <text class="label" x="1072" y="626">Исполнения</text>
  <text class="body" x="1072" y="652">`run` intake-481 • не запускался</text>
  <text class="body" x="1072" y="676">`job` cleanup-slot-19 • завершена успешно</text>

  <rect class="soft" x="1048" y="708" width="470" height="128" rx="18"/>
  <text class="label" x="1072" y="742">Действия</text>
  <text class="body" x="1072" y="768">• открыть PR workspace</text>
  <text class="body" x="1072" y="794">• ответить agent-manager</text>
  <text class="body" x="1072" y="820">• перейти в настройки flow</text>

  <circle class="accent" cx="1486" cy="884" r="34"/>
  <text class="white" x="1473" y="892">🎤</text>
</svg>
