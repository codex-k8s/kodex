        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

components:
  parameters:
    ProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
    RunID:
      in: path
      name: run_id
      required: true
      schema:
        type: string
    RuntimeErrorID:
      in: path
      name: runtime_error_id
      required: true
      schema:
        type: string
    ApprovalRequestID:
      in: path
      name: approval_request_id
      required: true
      schema:
        type: integer
        format: int64
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000000
    PageSize:
      in: query
      name: page_size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    UserID:
      in: path
      name: user_id
      required: true
      schema:
        type: string
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    TriggerKindFilter:
      in: query
      name: trigger_kind
      required: false
      schema:
        type: string
    RunStatusFilter:
      in: query
      name: status
      required: false
      schema:
        type: string
    AgentKeyFilter:
      in: query
      name: agent_key
      required: false
      schema:
        type: string
    WaitStateFilter:
      in: query
      name: wait_state
      required: false
      schema:
        type: string
    TailLines:
      in: query
      name: tail_lines
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 2000
    IncludePayload:
      in: query
      name: include_payload
      required: false
      schema:
        type: boolean
        default: false
    IncludeSnapshot:
      in: query
      name: include_snapshot
      required: false
      schema:
        type: boolean
        default: false
    IncludeLogs:
      in: query
      name: include_logs
      required: false
      schema:
        type: boolean
        default: false
    MCPCallbackToken:
      in: header
      name: X-Codex-MCP-Token
      required: false
      description: "Callback bearer token. Authorization: Bearer ... is also accepted."
      schema:
        type: string
    MissionControlViewMode:
      in: query
      name: view_mode
      required: false
      schema:
        type: string
        enum: [board, list]
    MissionControlActiveFilter:
      in: query
      name: active_filter
      required: false
      schema:
        type: string
        enum: [working, waiting, blocked, review, recent_critical_updates, all_active]
    MissionControlSearch:
      in: query
      name: search
      required: false
      schema:
        type: string
    MissionControlCursor:
      in: query
      name: cursor
      required: false
      schema:
        type: string
    MissionControlResumeToken:
      in: query
      name: resume_token
      required: true
      schema:
        type: string
    MissionControlCorrelationID:
      in: header
      name: X-Correlation-ID
      required: false
      schema:
        type: string
    MissionControlIdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
    MissionControlEntityKind:
      in: path
      name: entity_kind
      required: true
      schema:
        type: string
        enum: [work_item, discussion, pull_request, agent]
    MissionControlEntityPublicID:
      in: path
      name: entity_public_id
      required: true
      description: URL-encoded public entity identifier.
      schema:
        type: string
    MissionControlCommandID:
      in: path
      name: command_id
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Internal:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - invalid_argument
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - failed_precondition
            - resource_exhausted
            - deadline_exceeded
            - unavailable
            - canceled
            - internal
        message:
          type: string
        field:
          type: string

    IngestGitHubWebhookResponse:
      type: object
      additionalProperties: false
      required: [correlation_id, status, duplicate]
      properties:
        correlation_id:
          type: string
        run_id:
          type: string
        status:
          type: string
          enum: [accepted, duplicate, ignored]
        duplicate:
          type: boolean

    MeUser:
      type: object
      additionalProperties: false
      required: [id, email, github_login, is_platform_admin, is_platform_owner]
      properties:
        id:
          type: string
        email:
          type: string
        github_login:
          type: string
        is_platform_admin:
          type: boolean
        is_platform_owner:
          type: boolean

    MeResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/MeUser"

    RunNamespaceCleanupResponse:
      type: object
      additionalProperties: false
      required: [run_id, namespace, deleted, already_deleted]
      properties:
        run_id:
          type: string
        namespace:
          type: string
        deleted:
          type: boolean
        already_deleted:
          type: boolean
        comment_url:
          type: string
          nullable: true

    Project:
      type: object
      additionalProperties: false
      required: [id, slug, name, role]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        role:
          type: string

    Run:
      type: object
      additionalProperties: false
      required:
        - id
        - correlation_id
        - project_slug
        - project_name
        - status
        - created_at
      properties:
        id:
          type: string
        correlation_id:
          type: string
        project_id:
          type: string
          nullable: true
        project_slug:
          type: string
        project_name:
          type: string
        issue_number:
          type: integer
          format: int32
          nullable: true
        issue_url:
          type: string
          nullable: true
        pr_number:
          type: integer
          format: int32
          nullable: true
        pr_url:
          type: string
          nullable: true
        trigger_kind:
          type: string
          nullable: true
        trigger_label:
          type: string
          nullable: true
        job_name:
          type: string
          nullable: true
        job_namespace:
          type: string
          nullable: true
        namespace:
          type: string
          nullable: true
        job_exists:
          type: boolean
        namespace_exists:
          type: boolean
        wait_state:
          type: string
          nullable: true
        wait_reason:
          type: string
          nullable: true
        agent_key:
          type: string
          nullable: true
        wait_since:
          type: string
          format: date-time
          nullable: true
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        wait_projection:
          $ref: "#/components/schemas/RunWaitProjection"
          nullable: true

    RunWaitProjection:
      type: object
      additionalProperties: false
      required: [wait_state, wait_reason, dominant_wait, related_waits, comment_mirror_state]
      properties:
        wait_state:
          type: string
        wait_reason:
          type: string
        dominant_wait:
          $ref: "#/components/schemas/GitHubRateLimitWaitItem"
        related_waits:
          type: array
          items:
            $ref: "#/components/schemas/GitHubRateLimitWaitItem"
        comment_mirror_state:
          type: string
          enum: [synced, pending_retry, not_attempted]

    GitHubRateLimitWaitItem:
      type: object
      additionalProperties: false
      required:
        - wait_id
        - contour_kind
        - limit_kind
        - operation_class
        - state
        - confidence
        - entered_at
        - attempts_used
        - max_attempts
        - recovery_hint
      properties:
        wait_id:
          type: string
        contour_kind:
          type: string
          enum: [platform_pat, agent_bot_token]
        limit_kind:
          type: string
          enum: [primary, secondary]
        operation_class:
          type: string
          enum: [run_status_comment, issue_label_transition, repository_provider_call, agent_github_call]
        state:
          type: string
          enum: [open, auto_resume_scheduled, auto_resume_in_progress, resolved, manual_action_required, cancelled]
        confidence:
          type: string
          enum: [deterministic, conservative, provider_uncertain]
        entered_at:
          type: string
          format: date-time
        resume_not_before:
          type: string
          format: date-time
          nullable: true
        attempts_used:
          type: integer
          format: int32
        max_attempts:
          type: integer
          format: int32
        recovery_hint:
          $ref: "#/components/schemas/GitHubRateLimitRecoveryHint"
        manual_action:
          $ref: "#/components/schemas/GitHubRateLimitManualAction"
          nullable: true

    GitHubRateLimitRecoveryHint:
      type: object
      additionalProperties: false
      required: [hint_kind, source_headers, details_markdown]
      properties:
        hint_kind:
          type: string
          enum: [rate_limit_reset, retry_after, exponential_backoff, manual_only]
        resume_not_before:
          type: string
          format: date-time
          nullable: true
        source_headers:
          type: string
          enum: [reset_at, retry_after, provider_uncertain]
        details_markdown:
          type: string

    GitHubRateLimitManualAction:
      type: object
      additionalProperties: false
      required: [kind, summary, details_markdown]
      properties:
        kind:
          type: string
          enum: [requeue_platform_operation, resume_agent_session, retry_after_operator_review]
        summary:
          type: string
        details_markdown:
          type: string
        suggested_not_before:
          type: string
          format: date-time
          nullable: true

    RunWaitResolution:
      type: object
      additionalProperties: false
      required: [wait_id, contour_kind, resolution_kind, resolved_at]
      properties:
        wait_id:
          type: string
        contour_kind:
          type: string
          enum: [platform_pat, agent_bot_token]
        resolution_kind:
          type: string
          enum: [auto_resumed, manually_resolved, cancelled]
        resolved_at:
          type: string
          format: date-time

    RunWaitManualActionEvent:
      type: object
      additionalProperties: false
      required: [wait_id, manual_action, updated_at]
      properties:
        wait_id:
          type: string
        manual_action:
          $ref: "#/components/schemas/GitHubRateLimitManualAction"
        updated_at:
          type: string
          format: date-time

    RunRealtimeMessage:
      type: object
      additionalProperties: false
      required: [type, sent_at]
      properties:
        type:
          type: string
          enum: [snapshot, run, events, logs, wait_entered, wait_updated, wait_resolved, wait_manual_action_required, error]
        run:
          $ref: "#/components/schemas/Run"
          nullable: true
        events:
          type: array
          items:
            $ref: "#/components/schemas/FlowEvent"
        logs:
          $ref: "#/components/schemas/RunLogs"
          nullable: true
        wait_projection:
          $ref: "#/components/schemas/RunWaitProjection"
          nullable: true
        wait_resolution:
          $ref: "#/components/schemas/RunWaitResolution"
          nullable: true
        wait_manual_action:
          $ref: "#/components/schemas/RunWaitManualActionEvent"
          nullable: true
        message:
          type: string
          nullable: true
        sent_at:
          type: string
          format: date-time

    ApprovalRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - correlation_id
        - tool_name
        - action
        - approval_mode
        - requested_by
        - created_at
      properties:
        id:
          type: integer
          format: int64
        correlation_id:
