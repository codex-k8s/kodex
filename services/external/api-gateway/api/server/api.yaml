openapi: 3.0.3
info:
  title: codex-k8s api-gateway
  version: 0.2.0
  description: |
    External webhook + staff API contract for codex-k8s.
servers:
  - url: https://platform.codex-k8s.dev
paths:
  /api/v1/webhooks/github:
    post:
      summary: Ingest GitHub webhook delivery
      operationId: ingestGithubWebhook
      tags: [webhooks]
      parameters:
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
        - in: header
          name: X-GitHub-Delivery
          required: true
          schema:
            type: string
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Accepted and enqueued for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestGitHubWebhookResponse"
        "200":
          description: Duplicate delivery already ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestGitHubWebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/mcp/approver/callback:
    post:
      summary: Resolve one MCP approval request from external approver callback
      operationId: mcpApproverCallback
      tags: [mcp-callbacks]
      parameters:
        - $ref: "#/components/parameters/MCPCallbackToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPApprovalCallbackRequest"
      responses:
        "200":
          description: Approval callback applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveApprovalDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/mcp/executor/callback:
    post:
      summary: Resolve one MCP approval request from external executor callback
      operationId: mcpExecutorCallback
      tags: [mcp-callbacks]
      parameters:
        - $ref: "#/components/parameters/MCPCallbackToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPApprovalCallbackRequest"
      responses:
        "200":
          description: Executor callback applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveApprovalDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/mcp/interactions/callback:
    post:
      summary: Apply one built-in MCP user interaction callback
      operationId: mcpInteractionCallback
      tags: [mcp-callbacks]
      parameters:
        - $ref: "#/components/parameters/MCPCallbackToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InteractionCallbackEnvelope"
      responses:
        "200":
          description: Interaction callback classified and applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionCallbackOutcome"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/auth/github/login:
    get:
      summary: Start GitHub OAuth login
      operationId: loginGithub
      tags: [auth]
      responses:
        "302":
          description: Redirect to GitHub OAuth authorize URL
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/auth/github/callback:
    get:
      summary: Complete GitHub OAuth callback and set auth cookie
      operationId: callbackGithub
      tags: [auth]
      parameters:
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to staff UI after successful login
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/auth/logout:
    post:
      summary: Logout current staff user
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      summary: Get current authenticated staff principal
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/projects:
    get:
      summary: List projects
      operationId: listProjects
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create or update a project by slug
      operationId: upsertProject
      tags: [staff-projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProjectRequest"
      responses:
        "201":
          description: Project created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/staff/projects/{project_id}:
    get:
      summary: Get project by id
      operationId: getProject
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete project by id
      operationId: deleteProject
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "204":
          description: Project deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runs/waits:
    get:
      summary: List wait queue runs
      operationId: listRunWaits
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/TriggerKindFilter"
        - $ref: "#/components/parameters/RunStatusFilter"
        - $ref: "#/components/parameters/AgentKeyFilter"
        - $ref: "#/components/parameters/WaitStateFilter"
      responses:
        "200":
          description: Wait queue list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runs/realtime:
    get:
      summary: Open realtime runs list stream (WebSocket upgrade)
      operationId: runsRealtime
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Realtime runs list stream endpoint (expects WebSocket upgrade)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/approvals:
    get:
      summary: List pending approval requests
      operationId: listPendingApprovals
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Pending approvals list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequestItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/approvals/{approval_request_id}/decision:
    post:
      summary: Resolve one approval request (approve/deny/expire/fail)
      operationId: resolveApprovalDecision
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveApprovalDecisionRequest"
      responses:
        "200":
          description: Approval resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveApprovalDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runs/{run_id}:
    get:
      summary: Get run by id
      operationId: getRun
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runs/{run_id}/namespace:
    delete:
      summary: Force delete run namespace
      operationId: deleteRunNamespace
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Namespace cleanup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunNamespaceCleanupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runs/{run_id}/events:
    get:
      summary: List run flow events
      operationId: listRunEvents
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludePayload"
      responses:
        "200":
          description: Flow events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowEventItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runs/{run_id}/realtime:
    get:
      summary: Open realtime run stream (WebSocket upgrade)
      operationId: runRealtime
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/TailLines"
        - $ref: "#/components/parameters/IncludeLogs"
      responses:
        "200":
          description: Realtime stream endpoint (expects WebSocket upgrade)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunRealtimeMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runs/{run_id}/logs:
    get:
      summary: Get run logs snapshot with tail lines
      operationId: getRunLogs
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/TailLines"
        - $ref: "#/components/parameters/IncludeSnapshot"
      responses:
        "200":
          description: Run logs snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLogs"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runs/{run_id}/learning-feedback:
    get:
      summary: List run learning feedback
      operationId: listRunLearningFeedback
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Learning feedback list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningFeedbackItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runtime-deploy/tasks/realtime:
    get:
      summary: Open realtime runtime deploy tasks list stream (WebSocket upgrade)
      operationId: runtimeDeployTasksRealtime
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, running, succeeded, failed, canceled]
        - in: query
          name: target_env
          schema:
            type: string
      responses:
        "200":
          description: Realtime runtime deploy tasks stream endpoint (expects WebSocket upgrade)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runtime-deploy/tasks/{run_id}:
    get:
      summary: Get runtime deploy task details
      operationId: getRuntimeDeployTask
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Runtime deploy task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDeployTask"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runtime-deploy/tasks/{run_id}/cancel:
    post:
      summary: Cancel runtime deploy task
      operationId: cancelRuntimeDeployTask
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeDeployTaskActionRequest"
      responses:
        "200":
          description: Runtime deploy task action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDeployTaskActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/staff/runtime-deploy/tasks/{run_id}/stop:
    post:
      summary: Stop runtime deploy task
      operationId: stopRuntimeDeployTask
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeDeployTaskActionRequest"
      responses:
        "200":
          description: Runtime deploy task action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDeployTaskActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/staff/runtime-errors:
    get:
      summary: List runtime error journal entries
      operationId: listRuntimeErrors
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - in: query
          name: state
          schema:
            type: string
            enum: [active, viewed, all]
        - in: query
          name: level
          schema:
            type: string
            enum: [error, warning, critical]
        - in: query
          name: source
          schema:
            type: string
        - in: query
          name: run_id
          schema:
            type: string
        - in: query
          name: correlation_id
          schema:
            type: string
      responses:
        "200":
          description: Runtime error journal entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeErrorItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runtime-errors/{runtime_error_id}/viewed:
    post:
      summary: Mark runtime error as viewed
      operationId: markRuntimeErrorViewed
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RuntimeErrorID"
      responses:
        "200":
          description: Runtime error marked as viewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/users:
    get:
      summary: List users
      operationId: listUsers
      tags: [staff-users]
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create allowed user
      operationId: createUser
      tags: [staff-users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/users/{user_id}:
    delete:
      summary: Delete user
      operationId: deleteUser
      tags: [staff-users]
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/members:
    get:
      summary: List project members
      operationId: listProjectMembers
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Project members list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add or update project member
      operationId: upsertProjectMember
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProjectMemberRequest"
      responses:
        "204":
          description: Member upserted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/members/{user_id}:
    delete:
      summary: Delete project member
      operationId: deleteProjectMember
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/UserID"
      responses:
        "204":
          description: Member deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/members/{user_id}/learning-mode:
    put:
      summary: Set project member learning mode override
      operationId: setProjectMemberLearningModeOverride
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProjectMemberLearningModeRequest"
      responses:
        "204":
          description: Learning mode override updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/repositories:
    get:
      summary: List project repositories
      operationId: listProjectRepositories
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Project repositories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryBindingItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add or update project repository binding
      operationId: upsertProjectRepository
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProjectRepositoryRequest"
      responses:
        "201":
          description: Repository binding created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryBinding"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/repositories/{repository_id}:
    delete:
      summary: Delete project repository binding
      operationId: deleteProjectRepository
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - in: path
          name: repository_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Repository binding deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
