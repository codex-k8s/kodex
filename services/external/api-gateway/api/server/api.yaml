openapi: 3.0.3
info:
  title: codex-k8s api-gateway
  version: 0.2.0
  description: |
    External webhook + staff API contract for codex-k8s.
servers:
  - url: https://platform.codex-k8s.dev
paths:
  /api/v1/webhooks/github:
    post:
      summary: Ingest GitHub webhook delivery
      operationId: ingestGithubWebhook
      tags: [webhooks]
      parameters:
        - in: header
          name: X-GitHub-Event
          required: true
          schema:
            type: string
        - in: header
          name: X-GitHub-Delivery
          required: true
          schema:
            type: string
        - in: header
          name: X-Hub-Signature-256
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "202":
          description: Accepted and enqueued for processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestGitHubWebhookResponse"
        "200":
          description: Duplicate delivery already ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestGitHubWebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/mcp/approver/callback:
    post:
      summary: Resolve one MCP approval request from external approver callback
      operationId: mcpApproverCallback
      tags: [mcp-callbacks]
      parameters:
        - $ref: "#/components/parameters/MCPCallbackToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPApprovalCallbackRequest"
      responses:
        "200":
          description: Approval callback applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveApprovalDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/mcp/executor/callback:
    post:
      summary: Resolve one MCP approval request from external executor callback
      operationId: mcpExecutorCallback
      tags: [mcp-callbacks]
      parameters:
        - $ref: "#/components/parameters/MCPCallbackToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPApprovalCallbackRequest"
      responses:
        "200":
          description: Executor callback applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveApprovalDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/mcp/interactions/callback:
    post:
      summary: Apply one built-in MCP user interaction callback
      operationId: mcpInteractionCallback
      tags: [mcp-callbacks]
      parameters:
        - $ref: "#/components/parameters/MCPCallbackToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InteractionCallbackEnvelope"
      responses:
        "200":
          description: Interaction callback classified and applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionCallbackOutcome"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/auth/github/login:
    get:
      summary: Start GitHub OAuth login
      operationId: loginGithub
      tags: [auth]
      responses:
        "302":
          description: Redirect to GitHub OAuth authorize URL
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/auth/github/callback:
    get:
      summary: Complete GitHub OAuth callback and set auth cookie
      operationId: callbackGithub
      tags: [auth]
      parameters:
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to staff UI after successful login
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/auth/logout:
    post:
      summary: Logout current staff user
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      summary: Get current authenticated staff principal
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/projects:
    get:
      summary: List projects
      operationId: listProjects
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create or update a project by slug
      operationId: upsertProject
      tags: [staff-projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProjectRequest"
      responses:
        "201":
          description: Project created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/Internal"

  /api/v1/staff/projects/{project_id}:
    get:
      summary: Get project by id
      operationId: getProject
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete project by id
      operationId: deleteProject
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "204":
          description: Project deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runs/waits:
    get:
      summary: List wait queue runs
      operationId: listRunWaits
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/TriggerKindFilter"
        - $ref: "#/components/parameters/RunStatusFilter"
        - $ref: "#/components/parameters/AgentKeyFilter"
        - $ref: "#/components/parameters/WaitStateFilter"
      responses:
        "200":
          description: Wait queue list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runs/realtime:
    get:
      summary: Open realtime runs list stream (WebSocket upgrade)
      operationId: runsRealtime
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Realtime runs list stream endpoint (expects WebSocket upgrade)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/approvals:
    get:
      summary: List pending approval requests
      operationId: listPendingApprovals
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Pending approvals list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequestItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/approvals/{approval_request_id}/decision:
    post:
      summary: Resolve one approval request (approve/deny/expire/fail)
      operationId: resolveApprovalDecision
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/ApprovalRequestID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveApprovalDecisionRequest"
      responses:
        "200":
          description: Approval resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveApprovalDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runs/{run_id}:
    get:
      summary: Get run by id
      operationId: getRun
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runs/{run_id}/namespace:
    delete:
      summary: Force delete run namespace
      operationId: deleteRunNamespace
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Namespace cleanup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunNamespaceCleanupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runs/{run_id}/events:
    get:
      summary: List run flow events
      operationId: listRunEvents
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/IncludePayload"
      responses:
        "200":
          description: Flow events list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowEventItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runs/{run_id}/realtime:
    get:
      summary: Open realtime run stream (WebSocket upgrade)
      operationId: runRealtime
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/TailLines"
        - $ref: "#/components/parameters/IncludeLogs"
      responses:
        "200":
          description: Realtime stream endpoint (expects WebSocket upgrade)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runs/{run_id}/logs:
    get:
      summary: Get run logs snapshot with tail lines
      operationId: getRunLogs
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/TailLines"
        - $ref: "#/components/parameters/IncludeSnapshot"
      responses:
        "200":
          description: Run logs snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLogs"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runs/{run_id}/learning-feedback:
    get:
      summary: List run learning feedback
      operationId: listRunLearningFeedback
      tags: [staff-runs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Learning feedback list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningFeedbackItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/staff/runtime-deploy/tasks/realtime:
    get:
      summary: Open realtime runtime deploy tasks list stream (WebSocket upgrade)
      operationId: runtimeDeployTasksRealtime
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, running, succeeded, failed, canceled]
        - in: query
          name: target_env
          schema:
            type: string
      responses:
        "200":
          description: Realtime runtime deploy tasks stream endpoint (expects WebSocket upgrade)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runtime-deploy/tasks/{run_id}:
    get:
      summary: Get runtime deploy task details
      operationId: getRuntimeDeployTask
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Runtime deploy task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDeployTask"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/runtime-deploy/tasks/{run_id}/cancel:
    post:
      summary: Cancel runtime deploy task
      operationId: cancelRuntimeDeployTask
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeDeployTaskActionRequest"
      responses:
        "200":
          description: Runtime deploy task action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDeployTaskActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/staff/runtime-deploy/tasks/{run_id}/stop:
    post:
      summary: Stop runtime deploy task
      operationId: stopRuntimeDeployTask
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeDeployTaskActionRequest"
      responses:
        "200":
          description: Runtime deploy task action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDeployTaskActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/staff/runtime-errors:
    get:
      summary: List runtime error journal entries
      operationId: listRuntimeErrors
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - in: query
          name: state
          schema:
            type: string
            enum: [active, viewed, all]
        - in: query
          name: level
          schema:
            type: string
            enum: [error, warning, critical]
        - in: query
          name: source
          schema:
            type: string
        - in: query
          name: run_id
          schema:
            type: string
        - in: query
          name: correlation_id
          schema:
            type: string
      responses:
        "200":
          description: Runtime error journal entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeErrorItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/runtime-errors/{runtime_error_id}/viewed:
    post:
      summary: Mark runtime error as viewed
      operationId: markRuntimeErrorViewed
      tags: [staff-runtime-deploy]
      parameters:
        - $ref: "#/components/parameters/RuntimeErrorID"
      responses:
        "200":
          description: Runtime error marked as viewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeError"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/staff/users:
    get:
      summary: List users
      operationId: listUsers
      tags: [staff-users]
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create allowed user
      operationId: createUser
      tags: [staff-users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/users/{user_id}:
    delete:
      summary: Delete user
      operationId: deleteUser
      tags: [staff-users]
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "204":
          description: User deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/members:
    get:
      summary: List project members
      operationId: listProjectMembers
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Project members list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add or update project member
      operationId: upsertProjectMember
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProjectMemberRequest"
      responses:
        "204":
          description: Member upserted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/members/{user_id}:
    delete:
      summary: Delete project member
      operationId: deleteProjectMember
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/UserID"
      responses:
        "204":
          description: Member deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/members/{user_id}/learning-mode:
    put:
      summary: Set project member learning mode override
      operationId: setProjectMemberLearningModeOverride
      tags: [staff-project-members]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProjectMemberLearningModeRequest"
      responses:
        "204":
          description: Learning mode override updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/repositories:
    get:
      summary: List project repositories
      operationId: listProjectRepositories
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Project repositories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryBindingItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Add or update project repository binding
      operationId: upsertProjectRepository
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProjectRepositoryRequest"
      responses:
        "201":
          description: Repository binding created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryBinding"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/repositories/{repository_id}:
    delete:
      summary: Delete project repository binding
      operationId: deleteProjectRepository
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - in: path
          name: repository_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Repository binding deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/repositories/{repository_id}/bot-params:
    put:
      summary: Update repository bot parameters (token/login/email)
      operationId: upsertRepositoryBotParams
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - in: path
          name: repository_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertRepositoryBotParamsRequest"
      responses:
        "204":
          description: Repository bot params updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/repositories/{repository_id}/preflight:
    post:
      summary: Run repository onboarding preflight
      operationId: runRepositoryPreflight
      tags: [staff-project-repositories]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
        - in: path
          name: repository_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preflight report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunRepositoryPreflightResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/github-tokens:
    get:
      summary: Get project-scoped GitHub tokens status
      operationId: getProjectGitHubTokens
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project GitHub tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectGitHubTokens"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      summary: Upsert project-scoped GitHub tokens
      operationId: upsertProjectGitHubTokens
      tags: [staff-projects]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProjectGitHubTokensRequest"
      responses:
        "204":
          description: Project GitHub tokens updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/github/next-step-actions/preview:
    post:
      summary: Preview one GitHub next-step action
      operationId: previewNextStepAction
      tags: [staff-projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NextStepActionRequest"
      responses:
        "200":
          description: Next-step action preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextStepActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/github/next-step-actions/execute:
    post:
      summary: Execute one GitHub next-step action
      operationId: executeNextStepAction
      tags: [staff-projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NextStepActionRequest"
      responses:
        "200":
          description: Next-step action executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextStepActionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/docset/groups:
    get:
      summary: List docset groups (manifest v1)
      operationId: listDocsetGroups
      tags: [staff-docset]
      parameters:
        - in: query
          name: docset_ref
          required: false
          schema:
            type: string
        - in: query
          name: locale
          required: false
          schema:
            type: string
            enum: [ru, en]
      responses:
        "200":
          description: Docset groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocsetGroupItemsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/docset/import:
    post:
      summary: Import docset into project repository (PR-based)
      operationId: importDocset
      tags: [staff-docset]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportDocsetRequest"
      responses:
        "200":
          description: Import created PR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportDocsetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/staff/projects/{project_id}/docset/sync:
    post:
      summary: Safe sync docset into project repository (PR-based)
      operationId: syncDocset
      tags: [staff-docset]
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncDocsetRequest"
      responses:
        "200":
          description: Sync created PR
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncDocsetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  parameters:
    ProjectID:
      in: path
      name: project_id
      required: true
      schema:
        type: string
    RunID:
      in: path
      name: run_id
      required: true
      schema:
        type: string
    RuntimeErrorID:
      in: path
      name: runtime_error_id
      required: true
      schema:
        type: string
    ApprovalRequestID:
      in: path
      name: approval_request_id
      required: true
      schema:
        type: integer
        format: int64
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000000
    PageSize:
      in: query
      name: page_size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    UserID:
      in: path
      name: user_id
      required: true
      schema:
        type: string
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
    TriggerKindFilter:
      in: query
      name: trigger_kind
      required: false
      schema:
        type: string
    RunStatusFilter:
      in: query
      name: status
      required: false
      schema:
        type: string
    AgentKeyFilter:
      in: query
      name: agent_key
      required: false
      schema:
        type: string
    WaitStateFilter:
      in: query
      name: wait_state
      required: false
      schema:
        type: string
    TailLines:
      in: query
      name: tail_lines
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 2000
    IncludePayload:
      in: query
      name: include_payload
      required: false
      schema:
        type: boolean
        default: false
    IncludeSnapshot:
      in: query
      name: include_snapshot
      required: false
      schema:
        type: boolean
        default: false
    IncludeLogs:
      in: query
      name: include_logs
      required: false
      schema:
        type: boolean
        default: false
    MCPCallbackToken:
      in: header
      name: X-Codex-MCP-Token
      required: false
      description: "Callback bearer token. Authorization: Bearer ... is also accepted."
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Internal:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - invalid_argument
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - failed_precondition
            - resource_exhausted
            - deadline_exceeded
            - unavailable
            - canceled
            - internal
        message:
          type: string
        field:
          type: string

    IngestGitHubWebhookResponse:
      type: object
      additionalProperties: false
      required: [correlation_id, status, duplicate]
      properties:
        correlation_id:
          type: string
        run_id:
          type: string
        status:
          type: string
          enum: [accepted, duplicate, ignored]
        duplicate:
          type: boolean

    MeUser:
      type: object
      additionalProperties: false
      required: [id, email, github_login, is_platform_admin, is_platform_owner]
      properties:
        id:
          type: string
        email:
          type: string
        github_login:
          type: string
        is_platform_admin:
          type: boolean
        is_platform_owner:
          type: boolean

    MeResponse:
      type: object
      additionalProperties: false
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/MeUser"

    RunNamespaceCleanupResponse:
      type: object
      additionalProperties: false
      required: [run_id, namespace, deleted, already_deleted]
      properties:
        run_id:
          type: string
        namespace:
          type: string
        deleted:
          type: boolean
        already_deleted:
          type: boolean
        comment_url:
          type: string
          nullable: true

    Project:
      type: object
      additionalProperties: false
      required: [id, slug, name, role]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        role:
          type: string

    Run:
      type: object
      additionalProperties: false
      required:
        - id
        - correlation_id
        - project_slug
        - project_name
        - status
        - created_at
      properties:
        id:
          type: string
        correlation_id:
          type: string
        project_id:
          type: string
          nullable: true
        project_slug:
          type: string
        project_name:
          type: string
        issue_number:
          type: integer
          format: int32
          nullable: true
        issue_url:
          type: string
          nullable: true
        pr_number:
          type: integer
          format: int32
          nullable: true
        pr_url:
          type: string
          nullable: true
        trigger_kind:
          type: string
          nullable: true
        trigger_label:
          type: string
          nullable: true
        job_name:
          type: string
          nullable: true
        job_namespace:
          type: string
          nullable: true
        namespace:
          type: string
          nullable: true
        job_exists:
          type: boolean
        namespace_exists:
          type: boolean
        wait_state:
          type: string
          nullable: true
        wait_reason:
          type: string
          nullable: true
        agent_key:
          type: string
          nullable: true
        wait_since:
          type: string
          format: date-time
          nullable: true
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true

    ApprovalRequest:
      type: object
      additionalProperties: false
      required:
        - id
        - correlation_id
        - tool_name
        - action
        - approval_mode
        - requested_by
        - created_at
      properties:
        id:
          type: integer
          format: int64
        correlation_id:
          type: string
        run_id:
          type: string
          nullable: true
        project_id:
          type: string
          nullable: true
        project_slug:
          type: string
          nullable: true
        project_name:
          type: string
          nullable: true
        issue_number:
          type: integer
          format: int32
          nullable: true
        pr_number:
          type: integer
          format: int32
          nullable: true
        trigger_label:
          type: string
          nullable: true
        tool_name:
          type: string
        action:
          type: string
        approval_mode:
          type: string
          enum: [none, owner, delegated]
        requested_by:
          type: string
        created_at:
          type: string
          format: date-time

    ResolveApprovalDecisionRequest:
      type: object
      additionalProperties: false
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, denied, expired, failed]
        reason:
          type: string
          nullable: true

    MCPApprovalCallbackRequest:
      type: object
      additionalProperties: false
      required: [approval_request_id, decision]
      properties:
        approval_request_id:
          type: integer
          format: int64
        decision:
          type: string
          enum: [approved, denied, expired, failed, applied]
        reason:
          type: string
          nullable: true
        actor_id:
          type: string
          nullable: true

    InteractionCallbackEnvelope:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - interaction_id
        - adapter_event_id
        - callback_kind
        - occurred_at
      properties:
        schema_version:
          type: string
          enum: [v1]
        interaction_id:
          type: string
        delivery_id:
          type: string
          nullable: true
        adapter_event_id:
          type: string
        callback_kind:
          type: string
          enum: [delivery_receipt, decision_response]
        occurred_at:
          type: string
          format: date-time
        adapter_delivery_id:
          type: string
          nullable: true
        delivery_status:
          type: string
          enum: [accepted, delivered, failed]
          nullable: true
        response:
          $ref: "#/components/schemas/InteractionResponsePayload"
        error:
          $ref: "#/components/schemas/InteractionCallbackError"

    InteractionResponsePayload:
      type: object
      additionalProperties: false
      required: [response_kind]
      properties:
        response_kind:
          type: string
          enum: [option, free_text]
        selected_option_id:
          type: string
          nullable: true
        free_text:
          type: string
          nullable: true
          description: >
            User free-text answer. Contract limit: at most 8192 UTF-8 bytes; larger payloads are classified as invalid and do not resume the run.
        responder_ref:
          type: string
          nullable: true

    InteractionCallbackError:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
        message:
          type: string

    InteractionCallbackOutcome:
      type: object
      additionalProperties: false
      required: [accepted, classification, interaction_state, resume_required]
      properties:
        accepted:
          type: boolean
        classification:
          type: string
          enum: [applied, duplicate, stale, expired, invalid]
        interaction_state:
          type: string
        resume_required:
          type: boolean
        message:
          type: string
          nullable: true

    ResolveApprovalDecisionResponse:
      type: object
      additionalProperties: false
      required: [id, correlation_id, tool_name, action, approval_state]
      properties:
        id:
          type: integer
          format: int64
        correlation_id:
          type: string
        run_id:
          type: string
          nullable: true
        tool_name:
          type: string
        action:
          type: string
        approval_state:
          type: string
          enum: [requested, approved, denied, expired, failed, applied]

    FlowEvent:
      type: object
      additionalProperties: false
      required: [correlation_id, event_type, created_at, payload_json]
      properties:
        correlation_id:
          type: string
        event_type:
          type: string
        created_at:
          type: string
          format: date-time
        payload_json:
          type: string

    RunLogs:
      type: object
      additionalProperties: false
      required: [run_id, status, snapshot_json, tail_lines]
      properties:
        run_id:
          type: string
        status:
          type: string
        updated_at:
          type: string
          format: date-time
          nullable: true
        snapshot_json:
          type: string
        tail_lines:
          type: array
          items:
            type: string

    RuntimeDeployTaskLog:
      type: object
      additionalProperties: false
      required: [stage, level, message]
      properties:
        stage:
          type: string
        level:
          type: string
          enum: [info, warn, error]
        message:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true

    RuntimeDeployTaskListItem:
      type: object
      additionalProperties: false
      required: [run_id, status, repository_full_name, target_env, namespace, runtime_mode, build_ref]
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [pending, running, succeeded, failed, canceled]
        repository_full_name:
          type: string
        target_env:
          type: string
        result_target_env:
          type: string
          nullable: true
        namespace:
          type: string
        result_namespace:
          type: string
          nullable: true
        runtime_mode:
          type: string
        build_ref:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    RuntimeDeployTaskActionRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          nullable: true
        force:
          type: boolean
          description: Must be true for destructive stop requests; ignored by cancel.

    RuntimeDeployTaskActionResponse:
      type: object
      additionalProperties: false
      required: [run_id, action, previous_status, current_status, already_terminal]
      properties:
        run_id:
          type: string
        action:
          type: string
          enum: [cancel, stop]
        previous_status:
          type: string
          enum: [pending, running, succeeded, failed, canceled]
        current_status:
          type: string
          enum: [pending, running, succeeded, failed, canceled]
        already_terminal:
          type: boolean

    RuntimeDeployTask:
      type: object
      additionalProperties: false
      required: [run_id, runtime_mode, namespace, target_env, slot_no, repository_full_name, services_yaml_path, build_ref, deploy_only, status, attempts, logs]
      properties:
        run_id:
          type: string
        runtime_mode:
          type: string
        namespace:
          type: string
        target_env:
          type: string
        slot_no:
          type: integer
          format: int32
        repository_full_name:
          type: string
        services_yaml_path:
          type: string
        build_ref:
          type: string
        deploy_only:
          type: boolean
        status:
          type: string
          enum: [pending, running, succeeded, failed, canceled]
        lease_owner:
          type: string
          nullable: true
        lease_until:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
          format: int32
        last_error:
          type: string
          nullable: true
        result_namespace:
          type: string
          nullable: true
        result_target_env:
          type: string
          nullable: true
        cancel_requested_at:
          type: string
          format: date-time
          nullable: true
        cancel_requested_by:
          type: string
          nullable: true
        cancel_reason:
          type: string
          nullable: true
        stop_requested_at:
          type: string
          format: date-time
          nullable: true
        stop_requested_by:
          type: string
          nullable: true
        stop_reason:
          type: string
          nullable: true
        terminal_status_source:
          type: string
          enum: [worker, operator, system]
          nullable: true
        terminal_event_seq:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        logs:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDeployTaskLog"

    RuntimeError:
      type: object
      additionalProperties: false
      required: [id, source, level, message, details_json, created_at]
      properties:
        id:
          type: string
        source:
          type: string
        level:
          type: string
          enum: [error, warning, critical]
        message:
          type: string
        details_json:
          type: string
        stack_trace:
          type: string
          nullable: true
        correlation_id:
          type: string
          nullable: true
        run_id:
          type: string
          nullable: true
        project_id:
          type: string
          nullable: true
        namespace:
          type: string
          nullable: true
        job_name:
          type: string
          nullable: true
        viewed_at:
          type: string
          format: date-time
          nullable: true
        viewed_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    LearningFeedback:
      type: object
      additionalProperties: false
      required: [id, run_id, kind, explanation, created_at]
      properties:
        id:
          type: integer
          format: int64
        run_id:
          type: string
        repository_id:
          type: string
          nullable: true
        pr_number:
          type: integer
          format: int32
          nullable: true
        file_path:
          type: string
          nullable: true
        line:
          type: integer
          format: int32
          nullable: true
        kind:
          type: string
        explanation:
          type: string
        created_at:
          type: string
          format: date-time

    User:
      type: object
      additionalProperties: false
      required: [id, email, is_platform_admin, is_platform_owner]
      properties:
        id:
          type: string
        email:
          type: string
        github_user_id:
          type: integer
          format: int64
          nullable: true
        github_login:
          type: string
          nullable: true
        is_platform_admin:
          type: boolean
        is_platform_owner:
          type: boolean

    ProjectMember:
      type: object
      additionalProperties: false
      required: [project_id, user_id, email, role]
      properties:
        project_id:
          type: string
        user_id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [read, read_write, admin]
        learning_mode_override:
          type: boolean
          nullable: true

    RepositoryBinding:
      type: object
      additionalProperties: false
      required: [id, project_id, alias, role, default_ref, provider, external_id, owner, name, services_yaml_path]
      properties:
        id:
          type: string
        project_id:
          type: string
