asyncapi: 2.6.0
info:
  title: codex-k8s webhook ingress events
  version: 0.1.0
  description: Internal event model after GitHub webhook ingestion.
channels:
  flow-events.webhook:
    publish:
      summary: Flow event produced by webhook ingestion
      message:
        $ref: "#/components/messages/FlowEvent"
  ws.staff.runs.realtime:
    subscribe:
      summary: Staff UI realtime stream for one run (WebSocket message envelope)
      message:
        $ref: "#/components/messages/RunRealtimeMessage"
  ws.staff.runs.list.realtime:
    subscribe:
      summary: Staff UI realtime stream for paginated runs list (WebSocket message envelope)
      message:
        $ref: "#/components/messages/RunsRealtimeMessage"
  ws.staff.runtime-deploy.tasks.realtime:
    subscribe:
      summary: Staff UI realtime stream for paginated runtime deploy tasks list (WebSocket message envelope)
      message:
        $ref: "#/components/messages/RuntimeDeployTasksRealtimeMessage"
components:
  messages:
    FlowEvent:
      payload:
        type: object
        required: [correlation_id, event_type, actor_type, created_at]
        properties:
          correlation_id:
            type: string
          event_type:
            type: string
            enum: [webhook.received, webhook.duplicate, webhook.ignored]
          actor_type:
            type: string
            enum: [system]
          actor_id:
            type: string
          created_at:
            type: string
            format: date-time
          payload:
            type: object
            additionalProperties: true
    RunRealtimeMessage:
      payload:
        type: object
        required: [type, sent_at]
        properties:
          type:
            type: string
            enum: [snapshot, run, events, logs, error]
          sent_at:
            type: string
            format: date-time
          message:
            type: string
          run:
            $ref: "#/components/schemas/Run"
          events:
            type: array
            items:
              $ref: "#/components/schemas/FlowEvent"
          logs:
            $ref: "#/components/schemas/RunLogs"
    RunsRealtimeMessage:
      payload:
        type: object
        required: [type, sent_at]
        properties:
          type:
            type: string
            enum: [snapshot, error]
          sent_at:
            type: string
            format: date-time
          message:
            type: string
          items:
            type: array
            items:
              $ref: "#/components/schemas/Run"
          pagination:
            $ref: "#/components/schemas/Pagination"
    RuntimeDeployTasksRealtimeMessage:
      payload:
        type: object
        required: [type, sent_at]
        properties:
          type:
            type: string
            enum: [snapshot, error]
          sent_at:
            type: string
            format: date-time
          message:
            type: string
          items:
            type: array
            items:
              $ref: "#/components/schemas/RuntimeDeployTaskListItem"
          pagination:
            $ref: "#/components/schemas/Pagination"
  schemas:
    Pagination:
      type: object
      additionalProperties: false
      required: [page, page_size, total_count]
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
        total_count:
          type: integer
          minimum: 0
    Run:
      type: object
      additionalProperties: false
      required: [id, correlation_id, status, created_at]
      properties:
        id:
          type: string
        correlation_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        trigger_kind:
          type: string
        trigger_label:
          type: string
        agent_key:
          type: string
        namespace:
          type: string
        wait_state:
          type: string
        wait_reason:
          type: string
    FlowEvent:
      type: object
      additionalProperties: false
      required: [correlation_id, event_type, created_at, payload_json]
      properties:
        correlation_id:
          type: string
        event_type:
          type: string
        created_at:
          type: string
          format: date-time
        payload_json:
          type: string
    RunLogs:
      type: object
      additionalProperties: false
      required: [run_id, status, snapshot_json, tail_lines]
      properties:
        run_id:
          type: string
        status:
          type: string
        updated_at:
          type: string
          format: date-time
        snapshot_json:
          type: string
        tail_lines:
          type: array
          items:
            type: string
    RuntimeDeployTaskListItem:
      type: object
      additionalProperties: false
      required: [run_id, status, repository_full_name, target_env, namespace, runtime_mode, build_ref]
      properties:
        run_id:
          type: string
        status:
          type: string
        repository_full_name:
          type: string
        target_env:
          type: string
        result_target_env:
          type: string
        namespace:
          type: string
        result_namespace:
          type: string
        runtime_mode:
          type: string
        build_ref:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
