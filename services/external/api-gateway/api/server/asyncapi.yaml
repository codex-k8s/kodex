asyncapi: 2.6.0
info:
  title: codex-k8s webhook ingress events
  version: 0.1.0
  description: Internal event model after GitHub webhook ingestion.
channels:
  flow-events.webhook:
    publish:
      summary: Flow event produced by webhook ingestion
      message:
        $ref: "#/components/messages/FlowEvent"
  ws.staff.runs.realtime:
    subscribe:
      summary: Staff UI realtime stream for one run (WebSocket message envelope)
      message:
        $ref: "#/components/messages/RunRealtimeMessage"
  ws.staff.runs.list.realtime:
    subscribe:
      summary: Staff UI realtime stream for paginated runs list (WebSocket message envelope)
      message:
        $ref: "#/components/messages/RunsRealtimeMessage"
  ws.staff.runtime-deploy.tasks.realtime:
    subscribe:
      summary: Staff UI realtime stream for paginated runtime deploy tasks list (WebSocket message envelope)
      message:
        $ref: "#/components/messages/RuntimeDeployTasksRealtimeMessage"
components:
  messages:
    FlowEvent:
      payload:
        type: object
        required: [correlation_id, event_type, actor_type, created_at]
        properties:
          correlation_id:
            type: string
          event_type:
            type: string
            enum: [webhook.received, webhook.duplicate, webhook.ignored]
          actor_type:
            type: string
            enum: [system]
          actor_id:
            type: string
          created_at:
            type: string
            format: date-time
          payload:
            type: object
            additionalProperties: true
    RunRealtimeMessage:
      payload:
        type: object
        required: [type, sent_at]
        properties:
          type:
            type: string
            enum: [snapshot, run, events, logs, wait_entered, wait_updated, wait_resolved, wait_manual_action_required, error]
          sent_at:
            type: string
            format: date-time
          message:
            type: string
          run:
            $ref: "#/components/schemas/Run"
          events:
            type: array
            items:
              $ref: "#/components/schemas/FlowEvent"
          logs:
            $ref: "#/components/schemas/RunLogs"
          wait_projection:
            $ref: "#/components/schemas/RunWaitProjection"
          wait_resolution:
            $ref: "#/components/schemas/RunWaitResolution"
          wait_manual_action:
            $ref: "#/components/schemas/RunWaitManualActionEvent"
    RunsRealtimeMessage:
      payload:
        type: object
        required: [type, sent_at]
        properties:
          type:
            type: string
            enum: [snapshot, error]
          sent_at:
            type: string
            format: date-time
          message:
            type: string
          items:
            type: array
            items:
              $ref: "#/components/schemas/Run"
          pagination:
            $ref: "#/components/schemas/Pagination"
    RuntimeDeployTasksRealtimeMessage:
      payload:
        type: object
        required: [type, sent_at]
        properties:
          type:
            type: string
            enum: [snapshot, error]
          sent_at:
            type: string
            format: date-time
          message:
            type: string
          items:
            type: array
            items:
              $ref: "#/components/schemas/RuntimeDeployTaskListItem"
          pagination:
            $ref: "#/components/schemas/Pagination"
  schemas:
    Pagination:
      type: object
      additionalProperties: false
      required: [page, page_size, total_count]
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
        total_count:
          type: integer
          minimum: 0
    Run:
      type: object
      additionalProperties: false
      required: [id, correlation_id, status, created_at]
      properties:
        id:
          type: string
        correlation_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        trigger_kind:
          type: string
        trigger_label:
          type: string
        agent_key:
          type: string
        namespace:
          type: string
        wait_state:
          type: string
        wait_reason:
          type: string
        wait_projection:
          $ref: "#/components/schemas/RunWaitProjection"
    RunWaitProjection:
      type: object
      additionalProperties: false
      required: [wait_state, wait_reason, dominant_wait, related_waits, comment_mirror_state]
      properties:
        wait_state:
          type: string
        wait_reason:
          type: string
        dominant_wait:
          $ref: "#/components/schemas/GitHubRateLimitWaitItem"
        related_waits:
          type: array
          items:
            $ref: "#/components/schemas/GitHubRateLimitWaitItem"
        comment_mirror_state:
          type: string
          enum: [synced, pending_retry, not_attempted]
    GitHubRateLimitWaitItem:
      type: object
      additionalProperties: false
      required:
        - wait_id
        - contour_kind
        - limit_kind
        - operation_class
        - state
        - confidence
        - entered_at
        - attempts_used
        - max_attempts
        - recovery_hint
      properties:
        wait_id:
          type: string
        contour_kind:
          type: string
          enum: [platform_pat, agent_bot_token]
        limit_kind:
          type: string
          enum: [primary, secondary]
        operation_class:
          type: string
          enum: [run_status_comment, issue_label_transition, repository_provider_call, agent_github_call]
        state:
          type: string
          enum: [open, auto_resume_scheduled, auto_resume_in_progress, resolved, manual_action_required, cancelled]
        confidence:
          type: string
          enum: [deterministic, conservative, provider_uncertain]
        entered_at:
          type: string
          format: date-time
        resume_not_before:
          type: string
          format: date-time
        attempts_used:
          type: integer
          format: int32
        max_attempts:
          type: integer
          format: int32
        recovery_hint:
          $ref: "#/components/schemas/GitHubRateLimitRecoveryHint"
        manual_action:
          $ref: "#/components/schemas/GitHubRateLimitManualAction"
    GitHubRateLimitRecoveryHint:
      type: object
      additionalProperties: false
      required: [hint_kind, source_headers, details_markdown]
      properties:
        hint_kind:
          type: string
          enum: [rate_limit_reset, retry_after, exponential_backoff, manual_only]
        resume_not_before:
          type: string
          format: date-time
        source_headers:
          type: string
          enum: [reset_at, retry_after, provider_uncertain]
        details_markdown:
          type: string
    GitHubRateLimitManualAction:
      type: object
      additionalProperties: false
      required: [kind, summary, details_markdown]
      properties:
        kind:
          type: string
          enum: [requeue_platform_operation, resume_agent_session, retry_after_operator_review]
        summary:
          type: string
        details_markdown:
          type: string
        suggested_not_before:
          type: string
          format: date-time
    RunWaitResolution:
      type: object
      additionalProperties: false
      required: [wait_id, contour_kind, resolution_kind, resolved_at]
      properties:
        wait_id:
          type: string
        contour_kind:
          type: string
          enum: [platform_pat, agent_bot_token]
        resolution_kind:
          type: string
          enum: [auto_resumed, manually_resolved, cancelled]
        resolved_at:
          type: string
          format: date-time
    RunWaitManualActionEvent:
      type: object
      additionalProperties: false
      required: [wait_id, manual_action, updated_at]
      properties:
        wait_id:
          type: string
        manual_action:
          $ref: "#/components/schemas/GitHubRateLimitManualAction"
        updated_at:
          type: string
          format: date-time
    FlowEvent:
      type: object
      additionalProperties: false
      required: [correlation_id, event_type, created_at, payload_json]
      properties:
        correlation_id:
          type: string
        event_type:
          type: string
        created_at:
          type: string
          format: date-time
        payload_json:
          type: string
    RunLogs:
      type: object
      additionalProperties: false
      required: [run_id, status, snapshot_json, tail_lines]
      properties:
        run_id:
          type: string
        status:
          type: string
        updated_at:
          type: string
          format: date-time
        snapshot_json:
          type: string
        tail_lines:
          type: array
          items:
            type: string
    RuntimeDeployTaskListItem:
      type: object
      additionalProperties: false
      required: [run_id, status, repository_full_name, target_env, namespace, runtime_mode, build_ref]
      properties:
        run_id:
          type: string
        status:
          type: string
        repository_full_name:
          type: string
        target_env:
          type: string
        result_target_env:
          type: string
        namespace:
          type: string
        result_namespace:
          type: string
        runtime_mode:
          type: string
        build_ref:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
