asyncapi: 3.0.0
info:
  title: kodex provider-hub events
  version: 1.0.0
  description: Stable v1 event contract published by provider-hub through the platform outbox.
x-kodex-contract-status: stable-v1
channels:
  providerEvents:
    address: provider.events
    messages:
      providerEvent:
        $ref: '#/components/messages/ProviderEvent'
operations:
  publishProviderEvent:
    action: send
    channel:
      $ref: '#/channels/providerEvents'
    messages:
      - $ref: '#/channels/providerEvents/messages/providerEvent'
components:
  messages:
    ProviderEvent:
      name: ProviderEvent
      title: Provider domain event envelope
      payload:
        $ref: '#/components/schemas/ProviderEventEnvelope'
  schemas:
    ProviderEventEnvelope:
      oneOf:
        - $ref: '#/components/schemas/WebhookReceivedEvent'
        - $ref: '#/components/schemas/WebhookNormalizedEvent'
        - $ref: '#/components/schemas/WorkItemSyncedEvent'
        - $ref: '#/components/schemas/WorkItemDriftDetectedEvent'
        - $ref: '#/components/schemas/CommentSyncedEvent'
        - $ref: '#/components/schemas/RelationshipSyncedEvent'
        - $ref: '#/components/schemas/SyncCursorAdvancedEvent'
        - $ref: '#/components/schemas/AccountRuntimeStateChangedEvent'
        - $ref: '#/components/schemas/LimitSnapshotRecordedEvent'
        - $ref: '#/components/schemas/OperationCompletedEvent'
        - $ref: '#/components/schemas/OperationFailedEvent'
        - $ref: '#/components/schemas/RepositoryBootstrapRequiredEvent'
        - $ref: '#/components/schemas/RepositoryAdoptionRequiredEvent'
        - $ref: '#/components/schemas/RepositoryCreatedEvent'
        - $ref: '#/components/schemas/RepositoryBootstrapCompletedEvent'
        - $ref: '#/components/schemas/RepositoryAdoptionPRCreatedEvent'
        - $ref: '#/components/schemas/RepositoryAdoptionScanCompletedEvent'
        - $ref: '#/components/schemas/RepositoryBootstrapMergedEvent'
        - $ref: '#/components/schemas/RepositoryAdoptionMergedEvent'
        - $ref: '#/components/schemas/RepositoryChangedEvent'
    ProviderEventEnvelopeBase:
      type: object
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          $ref: '#/components/schemas/ProviderEventType'
        schema_version:
          type: integer
          minimum: 1
        aggregate_type:
          type: string
        aggregate_id:
          type: string
        occurred_at:
          type: string
          format: date-time
        payload:
          $ref: '#/components/schemas/ProviderEventPayload'
      required: [event_id, event_type, schema_version, aggregate_type, aggregate_id, occurred_at, payload]

    WebhookReceivedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/WebhookReceivedEventKind'
    WebhookReceivedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.webhook.received}, aggregate_type: {type: string, const: webhook_event}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    WebhookNormalizedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/WebhookNormalizedEventKind'
    WebhookNormalizedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.webhook.normalized}, aggregate_type: {type: string, const: provider_event}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    WorkItemSyncedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/WorkItemSyncedEventKind'
    WorkItemSyncedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.work_item.synced}, aggregate_type: {type: string, const: work_item}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    WorkItemDriftDetectedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/WorkItemDriftDetectedEventKind'
    WorkItemDriftDetectedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.work_item.drift_detected}, aggregate_type: {type: string, const: work_item}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    CommentSyncedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/CommentSyncedEventKind'
    CommentSyncedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.comment.synced}, aggregate_type: {type: string, const: comment}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RelationshipSyncedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RelationshipSyncedEventKind'
    RelationshipSyncedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.relationship.synced}, aggregate_type: {type: string, const: relationship}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    SyncCursorAdvancedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/SyncCursorAdvancedEventKind'
    SyncCursorAdvancedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.sync_cursor.advanced}, aggregate_type: {type: string, const: sync_cursor}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    AccountRuntimeStateChangedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/AccountRuntimeStateChangedEventKind'
    AccountRuntimeStateChangedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.account_runtime_state.changed}, aggregate_type: {type: string, const: account_runtime_state}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    LimitSnapshotRecordedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/LimitSnapshotRecordedEventKind'
    LimitSnapshotRecordedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.limit_snapshot.recorded}, aggregate_type: {type: string, const: limit_snapshot}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    OperationCompletedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/OperationCompletedEventKind'
    OperationCompletedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.operation.completed}, aggregate_type: {type: string, const: provider_operation}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    OperationFailedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/OperationFailedEventKind'
    OperationFailedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.operation.failed}, aggregate_type: {type: string, const: provider_operation}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryBootstrapRequiredEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryBootstrapRequiredEventKind'
    RepositoryBootstrapRequiredEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.bootstrap_required}, aggregate_type: {type: string, const: repository}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryAdoptionRequiredEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryAdoptionRequiredEventKind'
    RepositoryAdoptionRequiredEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.adoption_required}, aggregate_type: {type: string, const: repository}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryCreatedEventKind'
    RepositoryCreatedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.created}, aggregate_type: {type: string, const: repository}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryBootstrapCompletedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryBootstrapCompletedEventKind'
    RepositoryBootstrapCompletedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.bootstrap_completed}, aggregate_type: {type: string, const: repository}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryAdoptionPRCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryAdoptionPRCreatedEventKind'
    RepositoryAdoptionPRCreatedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.adoption_pr_created}, aggregate_type: {type: string, const: repository}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryAdoptionScanCompletedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryAdoptionScanCompletedEventKind'
    RepositoryAdoptionScanCompletedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.adoption_scan_completed}, aggregate_type: {type: string, const: repository_adoption_scan}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryBootstrapMergedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryBootstrapMergedEventKind'
    RepositoryBootstrapMergedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.bootstrap_merged}, aggregate_type: {type: string, const: repository_merge_signal}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryAdoptionMergedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryAdoptionMergedEventKind'
    RepositoryAdoptionMergedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.adoption_merged}, aggregate_type: {type: string, const: repository_merge_signal}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]
    RepositoryChangedEvent:
      allOf:
        - $ref: '#/components/schemas/ProviderEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryChangedEventKind'
    RepositoryChangedEventKind:
      type: object
      properties: {event_type: {type: string, const: provider.repository.changed}, aggregate_type: {type: string, const: repository_change_signal}, payload: {$ref: '#/components/schemas/ProviderEventPayload'}}
      required: [event_type, aggregate_type, payload]

    ProviderEventType:
      type: string
      enum:
        - provider.webhook.received
        - provider.webhook.normalized
        - provider.work_item.synced
        - provider.work_item.drift_detected
        - provider.comment.synced
        - provider.relationship.synced
        - provider.sync_cursor.advanced
        - provider.account_runtime_state.changed
        - provider.limit_snapshot.recorded
        - provider.operation.completed
        - provider.operation.failed
        - provider.repository.bootstrap_required
        - provider.repository.adoption_required
        - provider.repository.created
        - provider.repository.bootstrap_completed
        - provider.repository.adoption_pr_created
        - provider.repository.adoption_scan_completed
        - provider.repository.bootstrap_merged
        - provider.repository.adoption_merged
        - provider.repository.changed
    ProviderEventPayload:
      type: object
      additionalProperties: false
      properties:
        provider_slug:
          type: string
        webhook_event_id:
          type: string
          format: uuid
        provider_event_id:
          type: string
          format: uuid
        delivery_id:
          type: string
        event_name:
          type: string
        project_id:
          type: string
          format: uuid
        repository_id:
          type: string
          format: uuid
        repository_full_name:
          type: string
        provider_repository_id:
          type: string
        work_item_projection_id:
          type: string
          format: uuid
        provider_work_item_id:
          type: string
        repository_merge_signal_id:
          type: string
          format: uuid
        repository_change_signal_id:
          type: string
          format: uuid
        repository_adoption_scan_snapshot_id:
          type: string
          format: uuid
        signal_key:
          type: string
        signal_kind:
          type: string
        kind:
          type: string
        number:
          type: integer
        pull_request_provider_id:
          type: string
        pull_request_url:
          type: string
        head_branch:
          type: string
        head_sha:
          type: string
        path_summary_status:
          type: string
        changed_path_count:
          type: integer
        path_digest:
          type: string
        services_policy_changed:
          type: boolean
        deploy_relevant_changed:
          type: boolean
        change_fingerprint:
          type: string
        merge_commit_sha:
          type: string
        source_ref:
          type: string
        scanned_ref:
          type: string
        requested_ref:
          type: string
        default_branch:
          type: string
        marker_count:
          type: integer
        file_count:
          type: integer
        warning_count:
          type: integer
        tree_truncated:
          type: boolean
        snapshot_digest:
          type: string
        related_provider_operation_ref:
          type: string
        watermark_digest:
          type: string
        checked_artifact_ref:
          type: string
        checked_artifact_digest:
          type: string
        checked_artifact_version:
          type: string
        checked_source_path:
          type: string
        checked_content_hash:
          type: string
        checked_validated_payload_json:
          type: string
        checked_watermark_json:
          type: string
        observed_at:
          type: string
          format: date-time
        merged_at:
          type: string
          format: date-time
        comment_projection_id:
          type: string
          format: uuid
        provider_comment_id:
          type: string
        review_state:
          type: string
          enum:
            - approved
            - changes_requested
            - commented
            - dismissed
            - pending
        relationship_id:
          type: string
          format: uuid
        relationship_type:
          type: string
        sync_cursor_id:
          type: string
          format: uuid
        scope_type:
          type: string
        scope_ref:
          type: string
        external_account_id:
          type: string
          format: uuid
        provider_account_runtime_state_id:
          type: string
          format: uuid
        limit_snapshot_id:
          type: string
          format: uuid
        limit_class:
          type: string
        provider_operation_id:
          type: string
          format: uuid
        operation_type:
          type: string
        status:
          type: string
        error_code:
          type: string
        result_ref:
          type: string
        source:
          type: string
        drift_status:
          type: string
        watermark_status:
          type: string
        bootstrap_mode:
          type: string
        base_branch:
          type: string
        adoption_pr_ref:
          type: string
        version:
          type: integer
