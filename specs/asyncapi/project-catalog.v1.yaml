      required: [project_id, release_policy_id, version]
    ReleasePolicyUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, release_policy_id, version]
    ReleasePolicyArchivedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, release_policy_id, status, version]
    ReleaseLineCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, release_policy_id, release_line_id, version]
    ReleaseLineUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, release_policy_id, release_line_id, version]
    ReleaseLineArchivedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, release_policy_id, release_line_id, status, version]
    PlacementPolicyCreatedPayload:
