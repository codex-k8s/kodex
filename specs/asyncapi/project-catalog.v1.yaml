        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, override_id, target_type]
    PolicyOverrideCancelledPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, override_id, target_type]
    DocumentationSourceCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, source_id, scope_type, access_mode]
    DocumentationSourceUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, source_id, scope_type, access_mode]
    DocumentationSourceDisabledPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, source_id, status]
    BranchRulesCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, branch_rules_id, version]
    BranchRulesUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, branch_rules_id, version]
    BranchRulesDisabledPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, branch_rules_id, status, version]
    ReleasePolicyCreatedPayload:
      allOf:
