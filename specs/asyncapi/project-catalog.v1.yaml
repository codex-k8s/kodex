          const: project.documentation_source.updated
        aggregate_type:
          type: string
          const: documentation_source
        payload:
          $ref: '#/components/schemas/DocumentationSourceUpdatedPayload'
      required: [event_type, aggregate_type, payload]
    DocumentationSourceDisabledEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/DocumentationSourceDisabledEventKind'
    DocumentationSourceDisabledEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.documentation_source.disabled
        aggregate_type:
          type: string
          const: documentation_source
        payload:
          $ref: '#/components/schemas/DocumentationSourceDisabledPayload'
      required: [event_type, aggregate_type, payload]

    BranchRulesCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/BranchRulesCreatedEventKind'
    BranchRulesCreatedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.branch_rules.created
        aggregate_type:
          type: string
          const: branch_rules
        payload:
          $ref: '#/components/schemas/BranchRulesCreatedPayload'
      required: [event_type, aggregate_type, payload]
    BranchRulesUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/BranchRulesUpdatedEventKind'
    BranchRulesUpdatedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.branch_rules.updated
        aggregate_type:
          type: string
          const: branch_rules
        payload:
          $ref: '#/components/schemas/BranchRulesUpdatedPayload'
      required: [event_type, aggregate_type, payload]
    BranchRulesDisabledEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/BranchRulesDisabledEventKind'
    BranchRulesDisabledEventKind:
      type: object
