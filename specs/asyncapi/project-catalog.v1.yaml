      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/PlacementPolicyCreatedEventKind'
    PlacementPolicyCreatedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.placement_policy.created
        aggregate_type:
          type: string
          const: placement_policy
        payload:
          $ref: '#/components/schemas/PlacementPolicyCreatedPayload'
      required: [event_type, aggregate_type, payload]
    PlacementPolicyUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/PlacementPolicyUpdatedEventKind'
    PlacementPolicyUpdatedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.placement_policy.updated
        aggregate_type:
          type: string
          const: placement_policy
        payload:
          $ref: '#/components/schemas/PlacementPolicyUpdatedPayload'
      required: [event_type, aggregate_type, payload]
    PlacementPolicyDisabledEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/PlacementPolicyDisabledEventKind'
    PlacementPolicyDisabledEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.placement_policy.disabled
        aggregate_type:
          type: string
          const: placement_policy
        payload:
          $ref: '#/components/schemas/PlacementPolicyDisabledPayload'
      required: [event_type, aggregate_type, payload]

    ProjectEventType:
      type: string
      enum:
        - project.project.created
        - project.project.updated
        - project.project.archived
        - project.repository.attached
        - project.repository.updated
        - project.repository.detached
        - project.services_policy.imported
        - project.policy_override.created
        - project.policy_override.expired
        - project.policy_override.cancelled
        - project.documentation_source.created
        - project.documentation_source.updated
        - project.documentation_source.disabled
        - project.branch_rules.created
        - project.branch_rules.updated
        - project.branch_rules.disabled
        - project.release_policy.created
        - project.release_policy.updated
        - project.release_policy.archived
        - project.release_line.created
        - project.release_line.updated
        - project.release_line.archived
        - project.placement_policy.created
        - project.placement_policy.updated
        - project.placement_policy.disabled
    ProjectEventPayload:
      type: object
      additionalProperties: false
      properties:
        project_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        slug:
          type: string
        status:
          type: string
        repository_id:
          type: string
          format: uuid
        provider:
          type: string
        provider_owner:
          type: string
        provider_name:
          type: string
        icon_object_uri:
          type: string
        policy_id:
          type: string
          format: uuid
        policy_version:
          type: integer
          minimum: 1
        source_commit_sha:
          type: string
        source_blob_sha:
          type: string
        content_hash:
          type: string
        override_id:
          type: string
          format: uuid
        target_type:
          type: string
        expires_at:
          type: string
          format: date-time
        source_id:
          type: string
          format: uuid
        scope_type:
          type: string
        access_mode:
          type: string
        branch_rules_id:
          type: string
          format: uuid
        release_policy_id:
          type: string
          format: uuid
        release_line_id:
          type: string
          format: uuid
        placement_policy_id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1

    ProjectCreatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, organization_id, slug, version]
    ProjectUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, status, version]
    ProjectArchivedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, status, version]
    RepositoryAttachedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, repository_id, provider, provider_owner, provider_name, version]
    RepositoryUpdatedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, repository_id, status, version]
    RepositoryDetachedPayload:
      allOf:
        - $ref: '#/components/schemas/ProjectEventPayload'
      required: [project_id, repository_id, status, version]
    ServicesPolicyImportedPayload:
      allOf:
