asyncapi: 3.0.0
info:
  title: kodex project-catalog events
  version: 1.0.0
  description: Stable v1 lifecycle event contract published by project-catalog through the platform outbox.
x-kodex-contract-status: stable-v1
channels:
  projectEvents:
    address: project.events
    messages:
      projectEvent:
        $ref: '#/components/messages/ProjectEvent'
operations:
  publishProjectEvent:
    action: send
    channel:
      $ref: '#/channels/projectEvents'
    messages:
      - $ref: '#/channels/projectEvents/messages/projectEvent'
components:
  messages:
    ProjectEvent:
      name: ProjectEvent
      title: Project domain event envelope
      payload:
        $ref: '#/components/schemas/ProjectEventEnvelope'
  schemas:
    ProjectEventEnvelope:
      oneOf:
        - $ref: '#/components/schemas/ProjectCreatedEvent'
        - $ref: '#/components/schemas/ProjectUpdatedEvent'
        - $ref: '#/components/schemas/ProjectArchivedEvent'
        - $ref: '#/components/schemas/RepositoryAttachedEvent'
        - $ref: '#/components/schemas/RepositoryUpdatedEvent'
        - $ref: '#/components/schemas/RepositoryDetachedEvent'
        - $ref: '#/components/schemas/ServicesPolicyImportedEvent'
        - $ref: '#/components/schemas/PolicyOverrideCreatedEvent'
        - $ref: '#/components/schemas/PolicyOverrideExpiredEvent'
        - $ref: '#/components/schemas/PolicyOverrideCancelledEvent'
        - $ref: '#/components/schemas/DocumentationSourceCreatedEvent'
        - $ref: '#/components/schemas/DocumentationSourceUpdatedEvent'
        - $ref: '#/components/schemas/DocumentationSourceDisabledEvent'
        - $ref: '#/components/schemas/BranchRulesCreatedEvent'
        - $ref: '#/components/schemas/BranchRulesUpdatedEvent'
        - $ref: '#/components/schemas/BranchRulesDisabledEvent'
        - $ref: '#/components/schemas/ReleasePolicyCreatedEvent'
        - $ref: '#/components/schemas/ReleasePolicyUpdatedEvent'
        - $ref: '#/components/schemas/ReleasePolicyArchivedEvent'
        - $ref: '#/components/schemas/ReleaseLineCreatedEvent'
        - $ref: '#/components/schemas/ReleaseLineUpdatedEvent'
        - $ref: '#/components/schemas/ReleaseLineArchivedEvent'
        - $ref: '#/components/schemas/PlacementPolicyCreatedEvent'
        - $ref: '#/components/schemas/PlacementPolicyUpdatedEvent'
        - $ref: '#/components/schemas/PlacementPolicyDisabledEvent'
    ProjectEventEnvelopeBase:
      type: object
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          $ref: '#/components/schemas/ProjectEventType'
        schema_version:
          type: integer
          minimum: 1
        aggregate_type:
          type: string
        aggregate_id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date-time
        payload:
          $ref: '#/components/schemas/ProjectEventPayload'
      required: [event_id, event_type, schema_version, aggregate_type, aggregate_id, occurred_at, payload]

    ProjectCreatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/ProjectCreatedEventKind'
    ProjectCreatedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.project.created
        aggregate_type:
          type: string
          const: project
        payload:
          $ref: '#/components/schemas/ProjectCreatedPayload'
      required: [event_type, aggregate_type, payload]
    ProjectUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/ProjectUpdatedEventKind'
    ProjectUpdatedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.project.updated
        aggregate_type:
          type: string
          const: project
        payload:
          $ref: '#/components/schemas/ProjectUpdatedPayload'
      required: [event_type, aggregate_type, payload]
    ProjectArchivedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/ProjectArchivedEventKind'
    ProjectArchivedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.project.archived
        aggregate_type:
          type: string
          const: project
        payload:
          $ref: '#/components/schemas/ProjectArchivedPayload'
      required: [event_type, aggregate_type, payload]

    RepositoryAttachedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryAttachedEventKind'
    RepositoryAttachedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.repository.attached
        aggregate_type:
          type: string
          const: repository
        payload:
          $ref: '#/components/schemas/RepositoryAttachedPayload'
      required: [event_type, aggregate_type, payload]
    RepositoryUpdatedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryUpdatedEventKind'
    RepositoryUpdatedEventKind:
      type: object
      properties:
        event_type:
          type: string
          const: project.repository.updated
        aggregate_type:
          type: string
          const: repository
        payload:
          $ref: '#/components/schemas/RepositoryUpdatedPayload'
      required: [event_type, aggregate_type, payload]
    RepositoryDetachedEvent:
      allOf:
        - $ref: '#/components/schemas/ProjectEventEnvelopeBase'
        - $ref: '#/components/schemas/RepositoryDetachedEventKind'
    RepositoryDetachedEventKind:
      type: object
