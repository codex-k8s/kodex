openapi: 3.1.0
info:
  title: kodex staff-gateway API
  version: 1.0.0
  description: |
    HTTP-поверхность для операторской консоли сотрудников.
    Первый контур отдаёт входящие решения владельца из interaction-hub, project/repository context из project-catalog,
    runtime summary и safe activity timeline из agent-manager.
  license:
    name: Proprietary
    url: https://github.com/codex-k8s/kodex
tags:
  - name: owner-inbox
    description: Входящие решения владельца.
  - name: agent-sessions
    description: Безопасное чтение agent sessions для командного центра.
  - name: agent-runs
    description: Безопасное чтение agent Run для операторского UI.
  - name: projects
    description: Безопасный выбор project/repository context для operator UI.
  - name: governance
    description: Безопасная сводка governance decisions для операторского UI.
  - name: self-deploy
    description: Безопасная self-deploy сводка для владельца.
x-kodex-contract-status: mvp-staff-gateway
paths:
  /v1/owner-inbox/items:
    get:
      tags: [owner-inbox]
      operationId: listOwnerInboxItems
      summary: Получить список входящих решений владельца.
      description: |
        Возвращает безопасные карточки feedback, approval и Human gate request из interaction-hub.
        Gateway не читает БД доменного сервиса и не хранит собственную модель решений.
        Порядок фиксирует interaction-hub: активные и срочные карточки идут раньше, затем updated_at и request_id.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/ScopeTypeQuery'
        - $ref: '#/components/parameters/ScopeRefQuery'
        - $ref: '#/components/parameters/RequestKindsQuery'
        - $ref: '#/components/parameters/RequestStatusesQuery'
        - $ref: '#/components/parameters/SourceOwnerKindQuery'
        - $ref: '#/components/parameters/SourceOwnerRefQuery'
        - $ref: '#/components/parameters/AssigneeKindQuery'
        - $ref: '#/components/parameters/AssigneeRefQuery'
        - $ref: '#/components/parameters/ActorRefQuery'
        - $ref: '#/components/parameters/CorrelationKindQuery'
        - $ref: '#/components/parameters/CorrelationRefQuery'
        - $ref: '#/components/parameters/CorrelationIdQuery'
        - $ref: '#/components/parameters/IncludeDiagnosticsQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Список входящих решений получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerInboxListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/owner-inbox/items/{request_id}:
    get:
      tags: [owner-inbox]
      operationId: getOwnerInboxItem
      summary: Получить карточку одного входящего решения.
      description: |
        Возвращает безопасные детали request, delivery/callback/response summaries, allowed actions и version.
        Raw provider payload, callback body, prompt/transcript, secret values и большие логи в ответ не входят.
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/ScopeTypeQuery'
        - $ref: '#/components/parameters/ScopeRefQuery'
        - $ref: '#/components/parameters/AssigneeKindQuery'
        - $ref: '#/components/parameters/AssigneeRefQuery'
        - $ref: '#/components/parameters/IncludeDiagnosticsQuery'
      responses:
        '200':
          description: Карточка входящего решения получена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerInboxItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/owner-inbox/items/{request_id}/response:
    post:
      tags: [owner-inbox]
      operationId: respondOwnerInboxItem
      summary: Записать ответ владельца.
      description: |
        Передаёт approve, reject, request_changes, answer, defer, acknowledge или custom в interaction-hub.RecordInteractionResponse.
        Interaction-hub проверяет allowed actions, expected version, идемпотентность и terminal lifecycle.
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerInboxRespondRequest'
      responses:
        '200':
          description: Ответ владельца записан или идемпотентно подтверждён.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerInboxRespondResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/agent-sessions:
    get:
      tags: [agent-sessions]
      operationId: listAgentSessions
      summary: Получить список agent sessions.
      description: |
        Возвращает безопасные summaries `agent-manager.ListAgentSessions` для командного центра.
        Gateway только валидирует query, передаёт actor/request context и не читает БД `agent-manager`.
        В ответ не входят prompt body, transcript, tool input/output, stdout/stderr, provider payload,
        workspace paths, secret values, kubeconfig или большие логи.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/AgentScopeTypeQuery'
        - $ref: '#/components/parameters/AgentScopeRefQuery'
        - $ref: '#/components/parameters/AgentSessionStatusQuery'
        - $ref: '#/components/parameters/ProviderWorkItemRefQuery'
        - $ref: '#/components/parameters/CreatedByActorRefQuery'
        - $ref: '#/components/parameters/CreatedAfterQuery'
        - $ref: '#/components/parameters/CreatedBeforeQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Список agent sessions получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentSessionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/agent-runs:
    get:
      tags: [agent-runs]
      operationId: listAgentRunSummaries
      summary: Получить список agent Run summaries.
      description: |
        Возвращает безопасные summaries `agent-manager.ListAgentRunSummaries` для экрана исполнений.
        Gateway не читает БД `agent-manager`, не ходит в Kubernetes/runtime/provider и не делает fan-out
        за live runtime status; актуальный статус одного job остаётся в `/v1/agent-runs/{run_id}/runtime-status`.
        В ответ не входят prompt body, transcript, tool input/output, stdout/stderr, provider payload,
        workspace paths, secret values, kubeconfig или большие логи.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/AgentScopeTypeQuery'
        - $ref: '#/components/parameters/AgentScopeRefQuery'
        - $ref: '#/components/parameters/AgentRunSessionIdQuery'
        - $ref: '#/components/parameters/AgentRoleProfileIdQuery'
        - $ref: '#/components/parameters/AgentRunStatusQuery'
        - $ref: '#/components/parameters/ProviderWorkItemRefQuery'
        - $ref: '#/components/parameters/ProviderPullRequestRefQuery'
        - $ref: '#/components/parameters/CreatedAfterQuery'
        - $ref: '#/components/parameters/CreatedBeforeQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Список agent Run summaries получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunSummaryListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/agent-runs/{run_id}/runtime-status:
    get:
      tags: [agent-runs]
      operationId: getAgentRunRuntimeStatus
      summary: Получить runtime summary для agent Run.
      description: |
        Возвращает безопасную сводку `agent-manager.GetAgentRunRuntimeStatus` для одного Run.
        Gateway не читает БД `agent-manager`, не ходит в Kubernetes и не возвращает prompt body,
        kubeconfig, workspace paths, raw provider payload, secret values или большие логи.
      parameters:
        - $ref: '#/components/parameters/RunIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
      responses:
        '200':
          description: Runtime summary получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunRuntimeStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/agent-runs/{run_id}/activities:
    get:
      tags: [agent-runs]
      operationId: listAgentRunActivities
      summary: Получить безопасную activity timeline для agent Run.
      description: |
        Возвращает безопасные записи `agent-manager.ListAgentActivities` для одного Run.
        Gateway не читает БД `agent-manager`, не ходит в Kubernetes/runtime/provider и не возвращает raw tool input/output,
        stdout/stderr, prompt body, transcript, provider payload, workspace paths, secret values или большие логи.
        Time range в этом endpoint не поддержан, потому что его нет в текущем typed gRPC-контракте.
      parameters:
        - $ref: '#/components/parameters/RunIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/AgentActivityKindQuery'
        - $ref: '#/components/parameters/AgentActivityStatusQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Activity timeline получена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunActivitiesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/projects:
    get:
      tags: [projects]
      operationId: listProjects
      summary: Получить список проектов для операторского контекста.
      description: |
        Возвращает safe summaries `project-catalog.ListProjects`, чтобы `web-console` выбирал
        project context из платформенных данных, а не просил владельца вводить внутренний UUID.
        Gateway остаётся тонким adapter: не хранит project state, не читает БД `project-catalog`
        и не возвращает secret values, provider payload, raw manifests или большие документы.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/OrganizationRefQuery'
        - $ref: '#/components/parameters/ProjectStatusQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Список проектов получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/projects/{project_id}/repositories:
    get:
      tags: [projects]
      operationId: listProjectRepositories
      summary: Получить repository bindings проекта.
      description: |
        Возвращает safe summaries `project-catalog.ListRepositories` для выбранного проекта.
        Gateway не вызывает provider API, не читает raw repository contents и не возвращает
        secrets, tokens, full manifests или provider response body.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/RepositoryStatusQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Список repository bindings получен.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/governance/summary:
    get:
      tags: [governance]
      operationId: getGovernanceSummary
      summary: Получить безопасную сводку governance decisions.
      description: |
        Возвращает подготовленную `governance-manager.GetGovernanceSummary` сводку для одного selector.
        Gateway только валидирует HTTP-параметры, передаёт actor/request context и маппит safe DTO.
        Доменная логика risk/gate/release decisions остаётся в `governance-manager`.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/GovernanceTargetTypeQuery'
        - $ref: '#/components/parameters/GovernanceTargetRefQuery'
        - $ref: '#/components/parameters/GovernanceProjectRefQuery'
        - $ref: '#/components/parameters/GovernanceRepositoryRefQuery'
        - $ref: '#/components/parameters/GovernanceServiceRefQuery'
        - $ref: '#/components/parameters/GovernanceBranchRulesRefQuery'
        - $ref: '#/components/parameters/GovernanceReleasePolicyRefQuery'
        - $ref: '#/components/parameters/GovernanceReleaseLineRefQuery'
        - $ref: '#/components/parameters/GovernanceReleaseCandidateRefQuery'
        - $ref: '#/components/parameters/GovernanceReleaseDecisionPackageIdQuery'
        - $ref: '#/components/parameters/GovernanceIntegrationDomainQuery'
        - $ref: '#/components/parameters/GovernanceIntegrationKindQuery'
        - $ref: '#/components/parameters/GovernanceIntegrationRefQuery'
      responses:
        '200':
          description: Governance summary получена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceSummaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/self-deploy/summary:
    get:
      tags: [self-deploy]
      operationId: getSelfDeploySummary
      summary: Получить безопасную self-deploy сводку.
      description: |
        Возвращает latest visible self-deploy summary для командного центра. `scope_type`/`scope_ref`
        являются необязательным сужением: без них gateway использует configured self-deploy project ref
        как bounded filter. Если configured project ref отсутствует и caller не передал другой bounded
        filter, gateway возвращает `not_configured` без вызова downstream. Gateway сначала читает
        `agent-manager.ListSelfDeployPlans`; если plan ещё не создан, но caller передал safe project и
        provider signal refs, gateway уточняет project-side readiness через `project-catalog.GetSelfDeploySignal`.
        Gateway не читает БД доменных сервисов, не запускает deploy, не принимает governance decision и не
        возвращает raw webhook body, provider response, diff, полный YAML, token, OAuth state/cookies,
        secret values или большие логи. Если доменные данные ещё не появились, ответ остаётся успешным, но
        содержит `unavailable`/`pending` статусы и явный `chain_status` без фиктивных данных.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
        - $ref: '#/components/parameters/SelfDeployAgentScopeTypeQuery'
        - $ref: '#/components/parameters/SelfDeployAgentScopeRefQuery'
        - $ref: '#/components/parameters/SelfDeployProjectRefQuery'
        - $ref: '#/components/parameters/SelfDeployRepositoryRefQuery'
        - $ref: '#/components/parameters/SelfDeployProviderSignalRefQuery'
        - $ref: '#/components/parameters/SelfDeployPlanStatusQuery'
      responses:
        '200':
          description: Self-deploy сводка получена или честно недоступна.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfDeploySummaryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
  /v1/self-deploy/gates/{gate_request_id}/decision:
    post:
      tags: [self-deploy]
      operationId: submitSelfDeployGateDecision
      summary: Записать решение владельца по self-deploy gate.
      description: |
        Передаёт approve, reject или request_changes в `governance-manager.SubmitGateDecision`.
        Gateway не запускает build/deploy, не читает БД доменных сервисов и не принимает решение
        вместо владельца. В запросе и ответе допустимы только safe refs, bounded comment,
        idempotency key и expected version/status.
      parameters:
        - $ref: '#/components/parameters/GovernanceGateRequestIdPath'
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/SessionIdHeader'
        - $ref: '#/components/parameters/ActorTypeHeader'
        - $ref: '#/components/parameters/ActorIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelfDeployGateDecisionRequest'
      responses:
        '200':
          description: Решение владельца записано или идемпотентно подтверждено.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelfDeployGateDecisionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          $ref: '#/components/responses/DownstreamUnavailable'
components:
  parameters:
    RunIdPath:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
      description: Safe id `AgentRun`.
    ProjectIdPath:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 256
      description: Safe id проекта из `project-catalog`.
    AgentScopeTypeQuery:
      name: scope_type
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/AgentScopeType'
      description: Тип области `agent-manager`.
    AgentScopeRefQuery:
      name: scope_ref
      in: query
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 256
      description: Safe ref области `agent-manager`.
    SelfDeployAgentScopeTypeQuery:
      name: scope_type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AgentScopeType'
      description: Необязательное сужение self-deploy summary по области `agent-manager`.
    SelfDeployAgentScopeRefQuery:
      name: scope_ref
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 256
