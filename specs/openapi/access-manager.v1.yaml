openapi: 3.1.0
info:
  title: kodex access-manager API
  version: 1.0.0
  description: Stable v1 HTTP contract for staff and operator access-management reads and commands.
x-kodex-contract-status: stable-v1
paths:
  /v1/access/bootstrap-user:
    post:
      operationId: bootstrapUserFromIdentity
      summary: Bootstrap platform user from SSO/OIDC identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapUserFromIdentityRequest'
      responses:
        '200':
          description: Bootstrap result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapUserFromIdentityResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/AlreadyExists'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
        '429': {$ref: '#/components/responses/ResourceExhausted'}
  /v1/users/{userId}/status:
    patch:
      operationId: setUserStatus
      summary: Change user lifecycle status
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserStatusRequest'
      responses:
        '200':
          description: User state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/organizations:
    post:
      operationId: createOrganization
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '200':
          description: Organization state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '409': {$ref: '#/components/responses/AlreadyExists'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/organizations/{organizationId}:
    patch:
      operationId: updateOrganization
      summary: Update safe organization fields
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Organization state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/organizations/{organizationId}:suspend:
    post:
      operationId: suspendOrganization
      summary: Suspend non-owner organization
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        $ref: '#/components/requestBodies/CommandOnly'
      responses:
        '200': {$ref: '#/components/responses/OrganizationState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/organizations/{organizationId}:archive:
    post:
      operationId: archiveOrganization
      summary: Archive organization
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        $ref: '#/components/requestBodies/CommandOnly'
      responses:
        '200': {$ref: '#/components/responses/OrganizationState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/groups:
    post:
      operationId: createGroup
      summary: Create global or organization-scoped group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '200': {$ref: '#/components/responses/GroupState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '409': {$ref: '#/components/responses/AlreadyExists'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/groups/{groupId}:
    patch:
      operationId: updateGroup
      summary: Update group fields or hierarchy
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200': {$ref: '#/components/responses/GroupState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/groups/{groupId}:disable:
    post:
      operationId: disableGroup
      summary: Disable group without deleting history
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        $ref: '#/components/requestBodies/CommandOnly'
      responses:
        '200': {$ref: '#/components/responses/GroupState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/memberships:
    put:
      operationId: setMembership
      summary: Create, update or disable membership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetMembershipRequest'
      responses:
        '200': {$ref: '#/components/responses/MembershipState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/allowlist-entries:
    put:
      operationId: putAllowlistEntry
      summary: Create or update allowlist entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutAllowlistEntryRequest'
      responses:
        '200': {$ref: '#/components/responses/AllowlistEntryState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '409': {$ref: '#/components/responses/AlreadyExists'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/allowlist-entries/{allowlistEntryId}:disable:
    post:
      operationId: disableAllowlistEntry
      summary: Disable allowlist entry
      parameters:
        - $ref: '#/components/parameters/AllowlistEntryId'
      requestBody:
        $ref: '#/components/requestBodies/CommandOnly'
      responses:
        '200': {$ref: '#/components/responses/AllowlistEntryState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/external-providers:
    post:
      operationId: registerExternalProvider
      summary: Register external account provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterExternalProviderRequest'
      responses:
        '200': {$ref: '#/components/responses/ExternalProviderState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '409': {$ref: '#/components/responses/AlreadyExists'}
  /v1/external-providers/{externalProviderId}:
    patch:
      operationId: updateExternalProvider
      summary: Update external provider
      parameters:
        - $ref: '#/components/parameters/ExternalProviderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExternalProviderRequest'
      responses:
        '200': {$ref: '#/components/responses/ExternalProviderState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/external-accounts:
    post:
      operationId: registerExternalAccount
      summary: Register external account as policy subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterExternalAccountRequest'
      responses:
        '200': {$ref: '#/components/responses/ExternalAccountState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/AlreadyExists'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/external-accounts/{externalAccountId}/status:
    patch:
      operationId: updateExternalAccountStatus
      summary: Update external account status
      parameters:
        - $ref: '#/components/parameters/ExternalAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExternalAccountStatusRequest'
      responses:
        '200': {$ref: '#/components/responses/ExternalAccountState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/external-account-bindings:
    put:
      operationId: bindExternalAccount
      summary: Bind external account to usage scope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindExternalAccountRequest'
      responses:
        '200': {$ref: '#/components/responses/ExternalAccountBindingState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/external-account-bindings/{externalAccountBindingId}:disable:
    post:
      operationId: disableExternalAccountBinding
      summary: Disable external account binding
      parameters:
        - $ref: '#/components/parameters/ExternalAccountBindingId'
      requestBody:
        $ref: '#/components/requestBodies/CommandOnly'
      responses:
        '200': {$ref: '#/components/responses/ExternalAccountBindingState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/access-actions:
    put:
      operationId: putAccessAction
      summary: Create or update access action catalog item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutAccessActionRequest'
      responses:
        '200': {$ref: '#/components/responses/AccessActionState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '409': {$ref: '#/components/responses/AlreadyExists'}
  /v1/access-rules:
    put:
      operationId: putAccessRule
      summary: Create or update access rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutAccessRuleRequest'
      responses:
        '200': {$ref: '#/components/responses/AccessRuleState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/access-rules/{accessRuleId}:disable:
    post:
      operationId: disableAccessRule
      summary: Disable access rule
      parameters:
        - $ref: '#/components/parameters/AccessRuleId'
      requestBody:
        $ref: '#/components/requestBodies/CommandOnly'
      responses:
        '200': {$ref: '#/components/responses/AccessRuleState'}
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Aborted'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
  /v1/external-accounts/{externalAccountId}/usage:resolve:
    post:
      operationId: resolveExternalAccountUsage
      summary: Resolve whether an external account may be used for an action
      parameters:
        - $ref: '#/components/parameters/ExternalAccountId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveExternalAccountUsageRequest'
      responses:
        '200':
          description: Allowed account usage with secret reference metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveExternalAccountUsageResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
        '429': {$ref: '#/components/responses/ResourceExhausted'}
  /v1/access/check:
    post:
      operationId: checkAccess
      summary: Resolve effective access for a subject, action and resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckAccessRequest'
      responses:
        '200':
          description: Access decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAccessResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
        '412': {$ref: '#/components/responses/FailedPrecondition'}
        '429': {$ref: '#/components/responses/ResourceExhausted'}
  /v1/access/explanations/{auditId}:
    get:
      operationId: explainAccess
      summary: Explain a previously audited access decision
      parameters:
        - name: auditId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Access decision explanation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainAccessResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
  /v1/membership-graph:
    get:
      operationId: listMembershipGraph
      summary: List membership graph for operator UI
      parameters:
        - name: subjectType
          in: query
          required: true
          schema: {type: string}
        - name: subjectId
          in: query
          required: true
          schema: {type: string}
        - name: includeInactive
          in: query
          required: false
          schema: {type: boolean}
      responses:
        '200':
          description: Membership graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMembershipGraphResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '404': {$ref: '#/components/responses/NotFound'}
  /v1/pending-access:
    get:
      operationId: listPendingAccess
      summary: List pending or blocked access items
      parameters:
        - name: scopeType
          in: query
          required: false
          schema: {type: string}
        - name: scopeId
          in: query
          required: false
          schema: {type: string}
        - name: limit
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 200}
        - name: cursor
          in: query
          required: false
          schema: {type: string}
      responses:
        '200':
          description: Pending or blocked access items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPendingAccessResponse'
        '400': {$ref: '#/components/responses/InvalidArgument'}
        '401': {$ref: '#/components/responses/Unauthenticated'}
        '403': {$ref: '#/components/responses/PermissionDenied'}
        '429': {$ref: '#/components/responses/ResourceExhausted'}
components:
  parameters:
    UserId: {name: userId, in: path, required: true, schema: {type: string, format: uuid}}
    OrganizationId: {name: organizationId, in: path, required: true, schema: {type: string, format: uuid}}
    GroupId: {name: groupId, in: path, required: true, schema: {type: string, format: uuid}}
    AllowlistEntryId: {name: allowlistEntryId, in: path, required: true, schema: {type: string, format: uuid}}
    ExternalProviderId: {name: externalProviderId, in: path, required: true, schema: {type: string, format: uuid}}
    ExternalAccountId: {name: externalAccountId, in: path, required: true, schema: {type: string, format: uuid}}
    ExternalAccountBindingId: {name: externalAccountBindingId, in: path, required: true, schema: {type: string, format: uuid}}
    AccessRuleId: {name: accessRuleId, in: path, required: true, schema: {type: string, format: uuid}}
  requestBodies:
    CommandOnly:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              meta: {$ref: '#/components/schemas/CommandMeta'}
            required: [meta]
  responses:
    OrganizationState: {description: Organization state, content: {application/json: {schema: {$ref: '#/components/schemas/OrganizationResponse'}}}}
    GroupState: {description: Group state, content: {application/json: {schema: {$ref: '#/components/schemas/GroupResponse'}}}}
    MembershipState: {description: Membership state, content: {application/json: {schema: {$ref: '#/components/schemas/MembershipResponse'}}}}
    AllowlistEntryState: {description: Allowlist entry state, content: {application/json: {schema: {$ref: '#/components/schemas/AllowlistEntryResponse'}}}}
    ExternalProviderState: {description: External provider state, content: {application/json: {schema: {$ref: '#/components/schemas/ExternalProviderResponse'}}}}
    ExternalAccountState: {description: External account state, content: {application/json: {schema: {$ref: '#/components/schemas/ExternalAccountResponse'}}}}
    ExternalAccountBindingState: {description: External account binding state, content: {application/json: {schema: {$ref: '#/components/schemas/ExternalAccountBindingResponse'}}}}
    AccessActionState: {description: Access action state, content: {application/json: {schema: {$ref: '#/components/schemas/AccessActionResponse'}}}}
    AccessRuleState: {description: Access rule state, content: {application/json: {schema: {$ref: '#/components/schemas/AccessRuleResponse'}}}}
    InvalidArgument: {description: Invalid command or query argument, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
    Unauthenticated: {description: Caller is not authenticated, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
    PermissionDenied: {description: Caller has no permission for the action, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
    NotFound: {description: Entity was not found or is not visible to caller, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
    AlreadyExists: {description: Entity already exists in the same scope, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
    Aborted: {description: Aggregate version conflict, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
    FailedPrecondition: {description: Domain invariant or lifecycle state blocks the operation, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
    ResourceExhausted: {description: Policy limit or temporary quota was reached, content: {application/json: {schema: {$ref: '#/components/schemas/ErrorResponse'}}}}
  schemas:
    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
          enum: [UNAUTHENTICATED, PERMISSION_DENIED, FAILED_PRECONDITION, ALREADY_EXISTS, NOT_FOUND, ABORTED, RESOURCE_EXHAUSTED, INVALID_ARGUMENT]
        message: {type: string}
        reasonCode: {type: string}
        requestId: {type: string}
        details:
          type: array
          items: {type: string}
      required: [code, message, requestId]
    Actor:
      type: object
      additionalProperties: false
      properties:
        type: {type: string}
        id: {type: string}
      required: [type, id]
    RequestContext:
      type: object
      additionalProperties: false
      properties:
        source: {type: string}
        traceId: {type: string}
        sessionId: {type: string}
        clientIpHash: {type: string}
      required: [source]
    CommandMeta:
      type: object
      additionalProperties: false
      oneOf:
        - required: [commandId]
        - required: [idempotencyKey]
      properties:
        commandId: {type: string, format: uuid}
        idempotencyKey: {type: string}
        expectedVersion: {type: integer, format: int64}
        actor: {$ref: '#/components/schemas/Actor'}
        reason: {type: string}
        requestId: {type: string}
        requestContext: {$ref: '#/components/schemas/RequestContext'}
      required: [actor, requestContext]
    SubjectRef:
      type: object
      additionalProperties: false
      properties:
        type: {type: string}
        id: {type: string}
      required: [type, id]
    ResourceRef:
      type: object
      additionalProperties: false
      properties:
        type: {type: string}
        id: {type: string}
      required: [type, id]
    ScopeRef:
      type: object
      additionalProperties: false
      properties:
        type: {type: string}
        id: {type: string}
      required: [type, id]
    BootstrapUserFromIdentityRequest:
      type: object
      additionalProperties: false
      properties:
        provider: {type: string, enum: [keycloak, github, gitlab, google]}
        subject: {type: string}
        email: {type: string, format: email}
        displayName: {type: string}
        locale: {type: string}
        meta: {$ref: '#/components/schemas/CommandMeta'}
      required: [provider, subject, email, meta]
    BootstrapUserFromIdentityResponse:
      type: object
      additionalProperties: false
      properties:
        userId: {type: string, format: uuid}
        status: {$ref: '#/components/schemas/UserStatus'}
        decision: {$ref: '#/components/schemas/AccessDecision'}
        reasonCode: {type: string}
        organizationId: {type: string, format: uuid}
      required: [userId, status, decision, reasonCode]
    SetUserStatusRequest:
      type: object
