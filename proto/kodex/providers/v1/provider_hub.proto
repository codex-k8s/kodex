syntax = "proto3";

package kodex.providers.v1;

option go_package = "github.com/codex-k8s/kodex/proto/gen/go/kodex/providers/v1;providersv1";

// ProviderHubService is the stable v1 inter-service contract for provider-native
// work items. It covers the command and read surface agreed in
// docs/domains/provider-native-work-items/architecture/api_contract.md.
service ProviderHubService {
  // IngestWebhookEvent stores a verified provider webhook from the edge gateway.
  rpc IngestWebhookEvent(IngestWebhookEventRequest) returns (WebhookEventResponse);
  // GetWebhookEvent returns a stored raw webhook for diagnostics.
  rpc GetWebhookEvent(GetWebhookEventRequest) returns (WebhookEventResponse);
  // ListWebhookEvents returns stored webhooks with operational filters.
  rpc ListWebhookEvents(ListWebhookEventsRequest) returns (ListWebhookEventsResponse);
  // RetryWebhookEventProcessing enqueues a stored webhook for repeated normalization.
  rpc RetryWebhookEventProcessing(RetryWebhookEventProcessingRequest) returns (WebhookEventResponse);

  // GetWorkItemProjection returns a normalized Issue or PR/MR projection.
  rpc GetWorkItemProjection(GetWorkItemProjectionRequest) returns (WorkItemProjectionResponse);
  // FindWorkItemByProviderRef finds a projection by provider-native reference.
  rpc FindWorkItemByProviderRef(FindWorkItemByProviderRefRequest) returns (WorkItemProjectionResponse);
  // ListWorkItemProjections returns normalized work items by project, repository and state.
  rpc ListWorkItemProjections(ListWorkItemProjectionsRequest) returns (ListWorkItemProjectionsResponse);
  // ListComments returns normalized comments, mentions and review signals for a work item.
  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
  // ListRelationships returns normalized provider-native relationships.
  rpc ListRelationships(ListRelationshipsRequest) returns (ListRelationshipsResponse);

  // RegisterProviderArtifactSignal accepts an accelerating signal from an agent or manager.
  rpc RegisterProviderArtifactSignal(RegisterProviderArtifactSignalRequest) returns (ProviderArtifactSignalResponse);
  // EnqueueReconciliation schedules a reconciliation scope.
  rpc EnqueueReconciliation(EnqueueReconciliationRequest) returns (ReconciliationRequestResponse);
  // RunReconciliationBatch processes a leased reconciliation scope.
  rpc RunReconciliationBatch(RunReconciliationBatchRequest) returns (RunReconciliationBatchResponse);
  // GetSyncCursor returns reconciliation cursor state.
  rpc GetSyncCursor(GetSyncCursorRequest) returns (SyncCursorResponse);
  // ListSyncCursors returns reconciliation cursors by scope and health.
  rpc ListSyncCursors(ListSyncCursorsRequest) returns (ListSyncCursorsResponse);

  // CreateIssue creates a provider-native Issue through a managed external account.
  rpc CreateIssue(CreateIssueRequest) returns (ProviderOperationResponse);
  // UpdateIssue updates allowed Issue fields through a managed external account.
  rpc UpdateIssue(UpdateIssueRequest) returns (ProviderOperationResponse);
  // CreateComment creates a provider-native comment.
  rpc CreateComment(CreateCommentRequest) returns (ProviderOperationResponse);
  // UpdateComment updates a platform-owned comment when policy allows it.
  rpc UpdateComment(UpdateCommentRequest) returns (ProviderOperationResponse);
  // CreatePullRequest creates a provider-native PR/MR for a platform scenario.
  rpc CreatePullRequest(CreatePullRequestRequest) returns (ProviderOperationResponse);
  // CreateRepository creates a provider-native repository and prepares an initial provider default branch.
  rpc CreateRepository(CreateRepositoryRequest) returns (ProviderOperationResponse);
  // CreateBootstrapPullRequest creates or updates bootstrap branch/PR for an existing bootstrap-ready repository.
  rpc CreateBootstrapPullRequest(CreateBootstrapPullRequestRequest) returns (ProviderOperationResponse);
  // UpdatePullRequest updates allowed PR/MR fields through a managed external account.
  rpc UpdatePullRequest(UpdatePullRequestRequest) returns (ProviderOperationResponse);
  // CreateReviewSignal creates a review comment, approval or changes-request signal.
  rpc CreateReviewSignal(CreateReviewSignalRequest) returns (ProviderOperationResponse);
  // UpdateRelationship stores or updates a provider-native relationship where supported.
  rpc UpdateRelationship(UpdateRelationshipRequest) returns (ProviderOperationResponse);

  // GetProviderAccountRuntimeState returns provider runtime state for one external account.
  rpc GetProviderAccountRuntimeState(GetProviderAccountRuntimeStateRequest) returns (ProviderAccountRuntimeStateResponse);
  // ListProviderAccountRuntimeStates returns provider runtime states by provider or scope.
  rpc ListProviderAccountRuntimeStates(ListProviderAccountRuntimeStatesRequest) returns (ListProviderAccountRuntimeStatesResponse);
  // RecordProviderLimitSnapshot records known provider limits after an operation or signal.
  rpc RecordProviderLimitSnapshot(RecordProviderLimitSnapshotRequest) returns (ProviderLimitSnapshotResponse);
  // ListProviderLimitSnapshots returns recorded provider limit snapshots.
  rpc ListProviderLimitSnapshots(ListProviderLimitSnapshotsRequest) returns (ListProviderLimitSnapshotsResponse);
  // ListProviderOperations returns the operation log for diagnostics and audit.
  rpc ListProviderOperations(ListProviderOperationsRequest) returns (ListProviderOperationsResponse);
}

// CommandMeta is required for every mutating command.
message CommandMeta {
  // command_id is a unique command identifier. Either command_id or idempotency_key is required.
  optional string command_id = 1;
  // idempotency_key is an idempotency key scoped by operation and actor.
  optional string idempotency_key = 2;
  // expected_version is present only for existing aggregate mutations.
  optional int64 expected_version = 3;
  // actor is the authenticated caller.
  Actor actor = 4;
  // reason is a machine or operator reason for audit and domain events.
  string reason = 5;
  // request_id links the command to logs, traces and audit.
  string request_id = 6;
  // request_context carries safe request metadata; no tokens, secrets, email or names.
  RequestContext request_context = 7;
  // operation_policy_context carries the risk-based policy input used by the caller.
  ProviderOperationPolicyContext operation_policy_context = 8;
  // approval_gate_ref carries an already approved gate reference when policy requires it.
  ApprovalGateReference approval_gate_ref = 9;
}

// QueryMeta carries safe metadata for authoritative reads.
message QueryMeta {
  // actor is the authenticated caller.
  Actor actor = 1;
  // request_id links the read to logs and traces.
  string request_id = 2;
  // request_context carries safe request metadata.
  RequestContext request_context = 3;
}

// RequestContext is safe request metadata used for audit and diagnostics.
message RequestContext {
  // source identifies caller surface, for example integration-gateway, platform-mcp-server or service.
  string source = 1;
  // trace_id links platform traces.
  optional string trace_id = 2;
  // session_id links a user session when available.
  optional string session_id = 3;
  // client_ip_hash is an optional hashed client address.
  optional string client_ip_hash = 4;
}

// ProviderOperationRiskLevel classifies write-operation risk.
enum ProviderOperationRiskLevel {
  PROVIDER_OPERATION_RISK_LEVEL_UNSPECIFIED = 0;
  PROVIDER_OPERATION_RISK_LEVEL_LOW = 1;
  PROVIDER_OPERATION_RISK_LEVEL_MEDIUM = 2;
  PROVIDER_OPERATION_RISK_LEVEL_HIGH = 3;
  PROVIDER_OPERATION_RISK_LEVEL_CRITICAL = 4;
}

// ProviderOperationPolicyContext is the safe policy context for a provider command.
message ProviderOperationPolicyContext {
  // project_id is the project-catalog project id used by risk policy.
  optional string project_id = 1;
  // repository_id is the project-catalog repository binding id used by risk policy.
  optional string repository_id = 2;
  // stage is the workflow or delivery stage, for example dev, qa or release.
  optional string stage = 3;
  // role_id is the platform role id used by the caller.
  optional string role_id = 4;
  // role_key is a stable role key used by policy and audit.
  optional string role_key = 5;
  // operation_type is the operation evaluated by policy.
  ProviderOperationType operation_type = 6;
  // target_ref is a safe provider target reference used by policy.
  optional string target_ref = 7;
  // changed_fields are typed field names the command wants to change.
  repeated string changed_fields = 8;
  // risk_tags are policy-specific risk classifiers.
  repeated string risk_tags = 9;
  // risk_level is the policy result known to the caller.
  ProviderOperationRiskLevel risk_level = 10;
  // approval_required tells provider-hub that an approval_gate_ref must be present.
  bool approval_required = 11;
  // policy_version identifies the risk policy revision.
  optional string policy_version = 12;
  // policy_snapshot_ref points to an immutable policy snapshot or decision record.
  optional string policy_snapshot_ref = 13;
}

// ApprovalGateReference references an approval or gate decision owned by another service.
message ApprovalGateReference {
  // approval_id is the owner-service approval or gate id.
  string approval_id = 1;
  // gate_type classifies the gate, for example owner_approval, release_gate or risk_acceptance.
  string gate_type = 2;
  // decision is the approved decision value accepted by caller policy.
  string decision = 3;
  // decided_by_actor_id is the approving platform actor id when available.
  optional string decided_by_actor_id = 4;
  // decided_at is the decision time in RFC3339 format when available.
  optional string decided_at = 5;
  // evidence_ref points to safe approval evidence; it must not contain secrets.
  optional string evidence_ref = 6;
  // policy_version identifies the policy version used by the approval service.
  optional string policy_version = 7;
}

// Actor identifies a user, service, agent or external account.
message Actor {
  // type is a subject type such as user, service, agent or external_account.
  string type = 1;
  // id is the subject identifier in its owner domain.
  string id = 2;
}

// PageRequest limits list responses.
message PageRequest {
  // page_size is the maximum item count requested by caller.
  int32 page_size = 1;
  // page_token is an opaque continuation token returned by a previous call.
  optional string page_token = 2;
}

// PageResponse describes list continuation state.
message PageResponse {
  // next_page_token is empty when there are no more items.
  optional string next_page_token = 1;
}

// StringListPatch distinguishes absent list update from replacing the list with an empty value.
message StringListPatch {
  // values is the complete replacement list.
  // Empty values with present message clears the list.
  repeated string values = 1;
}

// WorkItemKind classifies provider-native work items.
enum WorkItemKind {
  WORK_ITEM_KIND_UNSPECIFIED = 0;
  WORK_ITEM_KIND_ISSUE = 1;
  WORK_ITEM_KIND_PULL_REQUEST = 2;
  WORK_ITEM_KIND_MERGE_REQUEST = 3;
}

// WebhookProcessingStatus is the stored raw webhook processing status.
enum WebhookProcessingStatus {
  WEBHOOK_PROCESSING_STATUS_UNSPECIFIED = 0;
  WEBHOOK_PROCESSING_STATUS_PENDING = 1;
  WEBHOOK_PROCESSING_STATUS_PROCESSED = 2;
  WEBHOOK_PROCESSING_STATUS_FAILED = 3;
  WEBHOOK_PROCESSING_STATUS_IGNORED = 4;
}

// WorkItemWatermarkStatus is the parsed watermark status.
enum WorkItemWatermarkStatus {
  WORK_ITEM_WATERMARK_STATUS_UNSPECIFIED = 0;
  WORK_ITEM_WATERMARK_STATUS_MISSING = 1;
  WORK_ITEM_WATERMARK_STATUS_VALID = 2;
  WORK_ITEM_WATERMARK_STATUS_INVALID = 3;
  WORK_ITEM_WATERMARK_STATUS_STALE = 4;
}

// WorkItemDriftStatus is the projection freshness state.
enum WorkItemDriftStatus {
  WORK_ITEM_DRIFT_STATUS_UNSPECIFIED = 0;
  WORK_ITEM_DRIFT_STATUS_FRESH = 1;
  WORK_ITEM_DRIFT_STATUS_SUSPECTED = 2;
  WORK_ITEM_DRIFT_STATUS_STALE = 3;
  WORK_ITEM_DRIFT_STATUS_FAILED = 4;
}

// CommentKind classifies provider-native comment-like records.
enum CommentKind {
  COMMENT_KIND_UNSPECIFIED = 0;
  COMMENT_KIND_COMMENT = 1;
  COMMENT_KIND_REVIEW = 2;
  COMMENT_KIND_MENTION = 3;
  COMMENT_KIND_SYSTEM = 4;
}

// ReviewState classifies provider-native review decisions.
enum ReviewState {
  REVIEW_STATE_UNSPECIFIED = 0;
  REVIEW_STATE_APPROVED = 1;
  REVIEW_STATE_CHANGES_REQUESTED = 2;
  REVIEW_STATE_COMMENTED = 3;
  REVIEW_STATE_DISMISSED = 4;
  REVIEW_STATE_PENDING = 5;
}

// RelationshipConfidence describes how reliable a relationship is.
enum RelationshipConfidence {
  RELATIONSHIP_CONFIDENCE_UNSPECIFIED = 0;
  RELATIONSHIP_CONFIDENCE_CONFIRMED = 1;
  RELATIONSHIP_CONFIDENCE_INFERRED = 2;
  RELATIONSHIP_CONFIDENCE_SUSPECTED = 3;
}

// RelationshipSource classifies where a relationship came from.
enum RelationshipSource {
  RELATIONSHIP_SOURCE_UNSPECIFIED = 0;
  RELATIONSHIP_SOURCE_PROVIDER = 1;
  RELATIONSHIP_SOURCE_WATERMARK = 2;
  RELATIONSHIP_SOURCE_COMMENT = 3;
  RELATIONSHIP_SOURCE_MANUAL = 4;
  RELATIONSHIP_SOURCE_RECONCILIATION = 5;
}

// SyncCursorScopeType classifies reconciliation scope.
enum SyncCursorScopeType {
  SYNC_CURSOR_SCOPE_TYPE_UNSPECIFIED = 0;
  SYNC_CURSOR_SCOPE_TYPE_REPOSITORY = 1;
  SYNC_CURSOR_SCOPE_TYPE_ORGANIZATION = 2;
  SYNC_CURSOR_SCOPE_TYPE_WORK_ITEM = 3;
  SYNC_CURSOR_SCOPE_TYPE_PACKAGE_SOURCE = 4;
}

// SyncArtifactKind classifies artifacts reconciled by a cursor.
enum SyncArtifactKind {
  SYNC_ARTIFACT_KIND_UNSPECIFIED = 0;
  SYNC_ARTIFACT_KIND_ISSUE = 1;
  SYNC_ARTIFACT_KIND_PULL_REQUEST = 2;
  SYNC_ARTIFACT_KIND_MERGE_REQUEST = 3;
  SYNC_ARTIFACT_KIND_COMMENT = 4;
  SYNC_ARTIFACT_KIND_RELATIONSHIP = 5;
  SYNC_ARTIFACT_KIND_REPOSITORY = 6;
}

// SyncCursorPriority classifies reconciliation urgency.
enum SyncCursorPriority {
  SYNC_CURSOR_PRIORITY_UNSPECIFIED = 0;
  SYNC_CURSOR_PRIORITY_HOT = 1;
  SYNC_CURSOR_PRIORITY_WARM = 2;
  SYNC_CURSOR_PRIORITY_COLD = 3;
}

// ProviderAccountRuntimeStatus is the operational state of an external account at provider.
enum ProviderAccountRuntimeStatus {
  PROVIDER_ACCOUNT_RUNTIME_STATUS_UNSPECIFIED = 0;
  PROVIDER_ACCOUNT_RUNTIME_STATUS_ACTIVE = 1;
  PROVIDER_ACCOUNT_RUNTIME_STATUS_REAUTHORIZATION_REQUIRED = 2;
  PROVIDER_ACCOUNT_RUNTIME_STATUS_LIMITED = 3;
  PROVIDER_ACCOUNT_RUNTIME_STATUS_DISABLED = 4;
  PROVIDER_ACCOUNT_RUNTIME_STATUS_ERROR = 5;
}

// ProviderOperationType classifies commands executed through provider-hub.
enum ProviderOperationType {
  PROVIDER_OPERATION_TYPE_UNSPECIFIED = 0;
  PROVIDER_OPERATION_TYPE_CREATE_ISSUE = 1;
  PROVIDER_OPERATION_TYPE_UPDATE_ISSUE = 2;
  PROVIDER_OPERATION_TYPE_CREATE_COMMENT = 3;
  PROVIDER_OPERATION_TYPE_UPDATE_COMMENT = 4;
  PROVIDER_OPERATION_TYPE_CREATE_PULL_REQUEST = 5;
  PROVIDER_OPERATION_TYPE_CREATE_REVIEW_SIGNAL = 6;
  PROVIDER_OPERATION_TYPE_UPDATE_RELATIONSHIP = 7;
  PROVIDER_OPERATION_TYPE_UPDATE_PULL_REQUEST = 8;
  PROVIDER_OPERATION_TYPE_CREATE_BOOTSTRAP_PULL_REQUEST = 9;
  PROVIDER_OPERATION_TYPE_CREATE_REPOSITORY = 10;
}

// ProviderOperationStatus is the execution state of a provider operation.
enum ProviderOperationStatus {
  PROVIDER_OPERATION_STATUS_UNSPECIFIED = 0;
  PROVIDER_OPERATION_STATUS_SUCCEEDED = 1;
  PROVIDER_OPERATION_STATUS_FAILED = 2;
  PROVIDER_OPERATION_STATUS_RETRYABLE_FAILED = 3;
  PROVIDER_OPERATION_STATUS_DENIED = 4;
  PROVIDER_OPERATION_STATUS_IN_PROGRESS = 5;
}

// RepositoryOwnerKind selects provider-side repository owner semantics.
enum RepositoryOwnerKind {
  REPOSITORY_OWNER_KIND_UNSPECIFIED = 0;
  REPOSITORY_OWNER_KIND_ORGANIZATION = 1;
  REPOSITORY_OWNER_KIND_AUTHENTICATED_USER = 2;
}

// RepositoryVisibility selects provider-side repository visibility.
enum RepositoryVisibility {
  REPOSITORY_VISIBILITY_UNSPECIFIED = 0;
  REPOSITORY_VISIBILITY_PUBLIC = 1;
  REPOSITORY_VISIBILITY_PRIVATE = 2;
  REPOSITORY_VISIBILITY_INTERNAL = 3;
}

// ReviewSignalKind classifies provider-native review actions.
enum ReviewSignalKind {
  REVIEW_SIGNAL_KIND_UNSPECIFIED = 0;
  REVIEW_SIGNAL_KIND_COMMENT = 1;
  REVIEW_SIGNAL_KIND_APPROVAL = 2;
  REVIEW_SIGNAL_KIND_CHANGES_REQUESTED = 3;
}

// ReviewInlineComment is a typed inline comment for a provider-native review.
message ReviewInlineComment {
  // path is the repository file path.
  string path = 1;
  // body is the inline comment text.
  string body = 2;
  // line is the end line in the provider diff when creating a new thread.
  optional int64 line = 3;
  // start_line is the optional start line for a multi-line diff comment.
  optional int64 start_line = 4;
  // side is the provider diff side, for example LEFT or RIGHT.
  optional string side = 5;
  // start_side is the provider diff side for start_line when needed.
  optional string start_side = 6;
  // in_reply_to_provider_comment_id replies to an existing provider inline comment thread.
  optional string in_reply_to_provider_comment_id = 7;
}

// ProviderTarget identifies a provider-native object.
message ProviderTarget {
  // provider_slug is an extensible provider identifier such as github or gitlab.
  string provider_slug = 1;
  // repository_full_name is owner/name or provider equivalent.
  optional string repository_full_name = 2;
  // provider_repository_id is the provider-native repository id when available.
  optional string provider_repository_id = 3;
  // work_item_kind identifies Issue, PR or MR target.
  optional WorkItemKind work_item_kind = 4;
  // number is the provider-native issue or PR/MR number.
  optional int64 number = 5;
  // provider_object_id is the provider-native stable object id.
  optional string provider_object_id = 6;
  // web_url is the safe provider URL when caller only has a URL.
  optional string web_url = 7;
}

// WebhookEvent is a stored raw webhook accepted from the edge gateway.
message WebhookEvent {
  // webhook_event_id is the stored webhook id.
  string webhook_event_id = 1;
  // provider_slug is an extensible provider identifier.
  string provider_slug = 2;
  // delivery_id is the provider delivery id used for deduplication.
  string delivery_id = 3;
  // event_name is the provider event name.
  string event_name = 4;
  // repository_provider_id is the provider-native repository id when present.
  optional string repository_provider_id = 5;
  // received_at is the receive time in RFC3339 format.
  string received_at = 6;
  // processing_status is raw webhook processing status.
  WebhookProcessingStatus processing_status = 7;
  // payload_json is the raw provider payload retained for a limited time.
  string payload_json = 8;
  // last_error is a short processing error without secrets.
  optional string last_error = 9;
  // retain_until is the payload retention deadline in RFC3339 format.
  string retain_until = 10;
}

// ProviderEvent is a normalized event produced from webhook or reconciliation.
message ProviderEvent {
  // provider_event_id is the normalized event id.
  string provider_event_id = 1;
  // source_webhook_event_id links a raw webhook inside provider-hub when available.
  optional string source_webhook_event_id = 2;
  // event_type is the normalized provider event type.
  string event_type = 3;
  // aggregate_type is the normalized aggregate type.
  string aggregate_type = 4;
  // aggregate_id identifies the changed provider aggregate.
  string aggregate_id = 5;
  // payload_json is typed event payload serialized by provider-hub.
  string payload_json = 6;
  // occurred_at is the provider change time in RFC3339 format.
  string occurred_at = 7;
}

// WorkItemProjection is a normalized Issue or PR/MR mirror.
message WorkItemProjection {
  // work_item_projection_id is the internal projection id.
  string work_item_projection_id = 1;
  // provider_slug is an extensible provider identifier.
  string provider_slug = 2;
  // provider_work_item_id is the provider-native stable work item id.
  string provider_work_item_id = 3;
  // project_id links project-catalog when known.
  optional string project_id = 4;
  // repository_id links project-catalog repository binding when known.
  optional string repository_id = 5;
  // repository_full_name is owner/name or provider equivalent.
  string repository_full_name = 6;
  // kind classifies Issue, PR or MR.
  WorkItemKind kind = 7;
  // number is the provider-native issue or PR/MR number.
  int64 number = 8;
  // web_url is a safe provider URL.
  string web_url = 9;
  // title is current provider title.
  string title = 10;
  // state is provider-normalized lifecycle state.
  string state = 11;
  // work_item_type is a platform task type parsed from provider fields or watermark.
  optional string work_item_type = 12;
  // labels are normalized label names.
  repeated string labels = 13;
  // assignee_provider_logins are provider logins assigned to the work item.
  repeated string assignee_provider_logins = 14;
  // milestone is normalized milestone text when available.
  optional string milestone = 15;
  // project_fields_json contains normalized provider project fields required by platform.
  string project_fields_json = 16;
  // watermark_status is parsed platform watermark state.
  WorkItemWatermarkStatus watermark_status = 17;
  // watermark_json is parsed platform watermark payload.
  string watermark_json = 18;
  // body_digest is a digest of provider body used for drift checks.
  string body_digest = 19;
  // provider_updated_at is provider update time in RFC3339 format when available.
  optional string provider_updated_at = 20;
  // synced_at is last successful sync time in RFC3339 format.
  string synced_at = 21;
  // drift_status is projection freshness state.
  WorkItemDriftStatus drift_status = 22;
  // version is the projection version.
  int64 version = 23;
}

// CommentProjection is a normalized comment, mention or review signal.
message CommentProjection {
  // comment_projection_id is the internal projection id.
  string comment_projection_id = 1;
  // work_item_projection_id links the owning work item projection.
  string work_item_projection_id = 2;
  // provider_comment_id is the provider-native comment id.
  string provider_comment_id = 3;
  // kind classifies the comment-like record.
  CommentKind kind = 4;
  // author_provider_login is provider login of the author.
  string author_provider_login = 5;
  // body_digest is a digest of comment body.
  string body_digest = 6;
  // summary is a short safe excerpt for UI.
  string summary = 7;
  // provider_created_at is provider creation time in RFC3339 format when available.
  optional string provider_created_at = 8;
  // provider_updated_at is provider update time in RFC3339 format when available.
  optional string provider_updated_at = 9;
  // review_state is present for provider-native review decision records.
  ReviewState review_state = 10;
}

// ProviderRelationship is a normalized relationship between provider-native objects.
message ProviderRelationship {
  // relationship_id is the relationship id.
  string relationship_id = 1;
  // source_work_item_projection_id is the source projection id.
  string source_work_item_projection_id = 2;
  // target_work_item_projection_id is present when target projection is known.
  optional string target_work_item_projection_id = 3;
  // target_provider_ref is URL or provider ref when target projection is not known yet.
  optional string target_provider_ref = 4;
  // relationship_type is an extensible normalized relationship type.
  string relationship_type = 5;
  // source classifies where the relationship came from.
  RelationshipSource source = 6;
  // confidence describes how reliable the relationship is.
  RelationshipConfidence confidence = 7;
  // created_at is creation time in RFC3339 format.
  string created_at = 8;
  // version is the local relationship version for optimistic concurrency.
  int64 version = 9;
}

// SyncCursor stores reconciliation state for one provider scope.
message SyncCursor {
  // sync_cursor_id is the cursor id.
  string sync_cursor_id = 1;
  // provider_slug is an extensible provider identifier.
  string provider_slug = 2;
  // external_account_id is the selected external account confirmed through access-manager before provider API use.
  string external_account_id = 15;
  // scope_type classifies reconciliation scope.
  SyncCursorScopeType scope_type = 3;
  // scope_ref is the provider scope reference.
  string scope_ref = 4;
  // artifact_kind classifies synchronized artifact kind.
  SyncArtifactKind artifact_kind = 5;
  // cursor_value is provider cursor or timestamp marker.
  optional string cursor_value = 6;
  // overlap_since is the overlap window start in RFC3339 format.
  optional string overlap_since = 7;
  // priority classifies reconciliation urgency.
  SyncCursorPriority priority = 8;
  // last_success_at is last successful sync time in RFC3339 format.
  optional string last_success_at = 9;
  // last_checked_at is last attempt time in RFC3339 format.
  optional string last_checked_at = 10;
  // last_error is a short error without secrets.
  optional string last_error = 11;
  // rate_budget_state_json is the known rate budget state.
  string rate_budget_state_json = 12;
  // lease_owner is current lease owner when leased.
  optional string lease_owner = 13;
  // lease_until is the lease deadline in RFC3339 format.
  optional string lease_until = 14;
}

// ProviderAccountRuntimeState is the operational state of an external account at provider.
message ProviderAccountRuntimeState {
  // provider_account_runtime_state_id is the runtime state id.
  string provider_account_runtime_state_id = 1;
  // external_account_id links access-manager external account.
  string external_account_id = 2;
  // provider_slug is an extensible provider identifier.
  string provider_slug = 3;
  // status is provider runtime state.
  ProviderAccountRuntimeStatus status = 4;
  // last_checked_at is last check time in RFC3339 format.
  optional string last_checked_at = 5;
  // last_success_at is last successful operation time in RFC3339 format.
  optional string last_success_at = 6;
  // last_error_code is a provider error classification.
  optional string last_error_code = 7;
  // last_error_message is a short error without secrets.
  optional string last_error_message = 8;
  // version is the runtime state version.
  int64 version = 9;
}

// ProviderLimitSnapshot is a known provider limit state.
message ProviderLimitSnapshot {
  // provider_limit_snapshot_id is the snapshot id.
  string provider_limit_snapshot_id = 1;
  // external_account_id links access-manager external account.
  string external_account_id = 2;
  // provider_slug is an extensible provider identifier.
  string provider_slug = 3;
  // limit_class is provider limit class such as core, graphql or search.
  string limit_class = 4;
  // remaining is remaining budget when known.
  optional int64 remaining = 5;
  // limit_value is total budget when known.
  optional int64 limit_value = 6;
  // reset_at is reset time in RFC3339 format when known.
  optional string reset_at = 7;
  // captured_at is snapshot time in RFC3339 format.
  string captured_at = 8;
  // source identifies who recorded the snapshot.
  string source = 9;
}

// ProviderOperation is an audited provider operation.
message ProviderOperation {
  // provider_operation_id is the operation id.
  string provider_operation_id = 1;
  // command_id is the idempotent command id.
  string command_id = 2;
  // actor_id is the platform actor id when known.
  optional string actor_id = 3;
  // external_account_id links access-manager external account.
  string external_account_id = 4;
  // provider_slug is an extensible provider identifier.
  string provider_slug = 5;
  // operation_type classifies the operation.
  ProviderOperationType operation_type = 6;
  // target_ref identifies provider target.
  string target_ref = 7;
  // status is execution status.
  ProviderOperationStatus status = 8;
  // result_ref is provider result URL or id when available.
  optional string result_ref = 9;
  // error_code is a provider error classification.
  optional string error_code = 10;
  // error_message is a short error without secrets.
  optional string error_message = 11;
  // rate_limit_snapshot_id links a limit snapshot after operation.
  optional string rate_limit_snapshot_id = 12;
  // started_at is operation start time in RFC3339 format.
  string started_at = 13;
  // finished_at is operation finish time in RFC3339 format when known.
  optional string finished_at = 14;
  // operation_policy_context is the risk-based policy context accepted for the command.
  ProviderOperationPolicyContext operation_policy_context = 15;
  // approval_gate_ref is the approval or gate reference accepted for the command.
  ApprovalGateReference approval_gate_ref = 16;
  // provider_version is the resulting provider version or update marker when known.
  optional string provider_version = 17;
}

