// EnqueueReconciliationRequest schedules reconciliation.
message EnqueueReconciliationRequest {
  // provider_slug is an extensible provider identifier.
  string provider_slug = 1;
  // scope_type classifies reconciliation scope.
  SyncCursorScopeType scope_type = 2;
  // scope_ref is provider scope reference.
  string scope_ref = 3;
  // artifact_kinds select artifacts to reconcile.
  repeated SyncArtifactKind artifact_kinds = 4;
  // priority classifies reconciliation urgency.
  SyncCursorPriority priority = 5;
  // meta carries idempotency and audit context. meta.idempotency_key is required for this operation;
  // command_id alone is not enough because enqueue replay is scoped by provider_slug, scope_type and scope_ref.
  CommandMeta meta = 6;
  // external_account_id is the account chosen by the caller's policy for this reconciliation scope.
  string external_account_id = 7;
}

// ReconciliationRequestResponse returns scheduled reconciliation state.
message ReconciliationRequestResponse {
  // sync_cursors are affected or created cursors.
  repeated SyncCursor sync_cursors = 1;
}

// RunReconciliationBatchRequest processes a reconciliation batch.
message RunReconciliationBatchRequest {
  // sync_cursor_id optionally selects an exact cursor.
  optional string sync_cursor_id = 1;
  // provider_slug optionally filters provider when cursor is selected by scheduler.
  optional string provider_slug = 2;
  // max_items limits provider items processed by one batch.
  int32 max_items = 3;
  // lease_owner identifies worker lease owner.
  string lease_owner = 4;
  // meta carries idempotency and audit context.
  CommandMeta meta = 5;
  // external_account_id optionally filters scheduler selection to one selected external account.
  optional string external_account_id = 6;
}

// RunReconciliationBatchResponse returns batch result.
message RunReconciliationBatchResponse {
  // sync_cursor is the processed cursor.
  SyncCursor sync_cursor = 1;
  // items_processed is the number of provider items processed.
  int64 items_processed = 2;
  // events_published is the number of domain events published.
  int64 events_published = 3;
  // retry_after is optional delay hint in RFC3339 duration format.
  optional string retry_after = 4;
}

