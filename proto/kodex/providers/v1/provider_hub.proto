  // started_since optionally filters lower start time in RFC3339 format.
  optional string started_since = 6;
  // page limits response size.
  PageRequest page = 7;
  // meta carries read actor and request context.
  QueryMeta meta = 8;
}

// ListProviderOperationsResponse returns provider operations.
message ListProviderOperationsResponse {
  // provider_operations are returned in stable server-defined order.
  repeated ProviderOperation provider_operations = 1;
  // page describes continuation state.
  PageResponse page = 2;
}
