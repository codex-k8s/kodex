enum PolicyOverrideTargetType {
  POLICY_OVERRIDE_TARGET_TYPE_UNSPECIFIED = 0;
  POLICY_OVERRIDE_TARGET_TYPE_SERVICES_POLICY = 1;
  POLICY_OVERRIDE_TARGET_TYPE_BRANCH_RULES = 2;
  POLICY_OVERRIDE_TARGET_TYPE_RELEASE_POLICY = 3;
  POLICY_OVERRIDE_TARGET_TYPE_PLACEMENT_POLICY = 4;
  POLICY_OVERRIDE_TARGET_TYPE_DOCUMENTATION_SOURCE = 5;
  POLICY_OVERRIDE_TARGET_TYPE_RELEASE_LINE = 6;
}

// PolicyOverrideStatus is the closed set of override statuses.
enum PolicyOverrideStatus {
  POLICY_OVERRIDE_STATUS_UNSPECIFIED = 0;
  POLICY_OVERRIDE_STATUS_ACTIVE = 1;
  POLICY_OVERRIDE_STATUS_EXPIRED = 2;
  POLICY_OVERRIDE_STATUS_CANCELLED = 3;
}

// Project describes a project aggregate.
message Project {
  // project_id is the project aggregate id.
  string project_id = 1;
  // organization_id is the owner organization id from access-manager.
  string organization_id = 2;
  // slug is unique in organization scope.
  string slug = 3;
  // display_name is safe display text.
  string display_name = 4;
  // description is optional safe description.
  optional string description = 5;
  // icon_object_uri is an optional object-store URI for project icon.
  optional string icon_object_uri = 6;
  // status is project lifecycle status.
  ProjectStatus status = 7;
  // version is the aggregate version.
  int64 version = 8;
}

// Repository describes a repository binding aggregate.
message Repository {
  // repository_id is the repository binding aggregate id.
  string repository_id = 1;
  // project_id is the project that owns the binding.
  string project_id = 2;
  // provider is the repository provider.
  RepositoryProvider provider = 3;
  // provider_owner is owner or group name at provider.
  string provider_owner = 4;
  // provider_name is repository name at provider.
  string provider_name = 5;
  // web_url is a safe URL to the provider repository.
  string web_url = 6;
  // default_branch is the default branch for project policy.
  string default_branch = 7;
  // status is repository binding status.
  RepositoryStatus status = 8;
  // provider_repository_id is optional provider-native id.
  optional string provider_repository_id = 9;
  // icon_object_uri is an optional object-store URI for repository icon.
  optional string icon_object_uri = 10;
  // version is the aggregate version.
  int64 version = 11;
}

// RepositoryBootstrapFile is one prepared text file for an empty-repository bootstrap branch.
message RepositoryBootstrapFile {
  // path is a repository-relative file path.
  string path = 1;
  // content is UTF-8 text prepared outside project-catalog.
  string content = 2;
  // executable marks files that should be executable when the provider supports it.
  bool executable = 3;
}

// RepositoryBootstrapServicesPolicy links prepared bootstrap files to a checked services.yaml projection.
message RepositoryBootstrapServicesPolicy {
  // source_path is the repository-relative path of services.yaml inside prepared files.
  string source_path = 1;
  // content_hash is the checked source content hash accepted by project policy.
  string content_hash = 2;
  // validated_payload_json is normalized services.yaml payload accepted by project policy.
  string validated_payload_json = 3;
}

// RepositoryBootstrapProviderTarget is the provider repository target derived from project binding.
message RepositoryBootstrapProviderTarget {
  // provider_slug is the extensible provider identifier passed to provider-hub.
  string provider_slug = 1;
  // repository_full_name is owner/name or provider equivalent.
  string repository_full_name = 2;
  // provider_repository_id is the provider-native repository id when known.
  optional string provider_repository_id = 3;
  // web_url is the safe provider repository URL from the binding.
  optional string web_url = 4;
}

// ServicesPolicy describes a checked services.yaml projection.
message ServicesPolicy {
  // services_policy_id is the policy aggregate id.
  string services_policy_id = 1;
  // project_id is the project that owns the policy.
  string project_id = 2;
  // source_repository_id is the repository where source services.yaml was found.
  optional string source_repository_id = 3;
  // source_path is the policy file path.
  string source_path = 4;
  // source_ref is the branch, tag or provider ref used for import.
  optional string source_ref = 5;
  // source_commit_sha is the commit used for checked projection.
  string source_commit_sha = 6;
  // source_blob_sha is the provider file object hash when available.
  optional string source_blob_sha = 7;
  // policy_version is the checked policy version.
  int64 policy_version = 8;
  // content_hash is the normalized source content hash.
  string content_hash = 9;
  // validated_payload_json is normalized payload for audit and revalidation.
  string validated_payload_json = 10;
  // validation_status is source validation status.
  ServicesPolicyValidationStatus validation_status = 11;
  // projection_status is operational projection status.
  ServicesPolicyProjectionStatus projection_status = 12;
  // imported_at is the import time in RFC3339 format.
  string imported_at = 13;
}

// ServiceDescriptor describes one typed service from checked services.yaml.
message ServiceDescriptor {
  // service_descriptor_id is the service descriptor id.
  string service_descriptor_id = 1;
  // project_id is the owner project id.
  string project_id = 2;
  // services_policy_id is the source checked policy id.
  string services_policy_id = 3;
  // repository_id is optional repository binding id.
  optional string repository_id = 4;
  // service_key is stable service key from services.yaml.
  string service_key = 5;
  // display_name is safe display text.
  string display_name = 6;
  // kind classifies the service.
  ServiceKind kind = 7;
  // root_path is the service root in workspace.
  string root_path = 8;
  // documentation_scope_id links service to documentation sources.
  optional string documentation_scope_id = 9;
  // depends_on_service_keys lists project service dependencies.
  repeated string depends_on_service_keys = 10;
  // status is service descriptor status.
  ServiceStatus status = 11;
  // version is the descriptor version.
  int64 version = 12;
}

// SelfDeployPathCategoryCount содержит safe счётчики категорий путей без raw paths.
message SelfDeployPathCategoryCount {
  // category классифицирует семейство изменённых путей.
  SelfDeployPathCategory category = 1;
  // count — bounded provider-side счётчик для категории.
  int64 count = 2;
}

// SelfDeployGovernanceRequirement содержит только safe governance hints.
message SelfDeployGovernanceRequirement {
  // gate_required сообщает agent-manager, что до runtime jobs нужен owner/governance approval.
  bool gate_required = 1;
  // risk_profile_ref опционально указывает на governance policy без копирования решений.
  optional string risk_profile_ref = 2;
  // gate_policy_ref опционально указывает на gate policy для оценки.
  optional string gate_policy_ref = 3;
}

// SelfDeployServicesYamlProjection описывает checked project-owned проекцию services.yaml.
message SelfDeployServicesYamlProjection {
  // services_yaml_ref — safe project-catalog ссылка на checked projection.
  string services_yaml_ref = 1;
  // services_yaml_digest — checked normalized services.yaml digest, а не provider path_digest.
  string services_yaml_digest = 2;
  // services_yaml_fingerprint — стабильный safe fingerprint checked projection.
  string services_yaml_fingerprint = 3;
  // services_policy_id — aggregate id в project-catalog.
  string services_policy_id = 4;
  // source_repository_id — repository binding источника projection.
  optional string source_repository_id = 5;
  // source_path — путь checked services.yaml.
  string source_path = 6;
  // source_ref — branch, tag или provider ref, использованный для import.
  optional string source_ref = 7;
  // source_commit_sha — commit checked projection.
  string source_commit_sha = 8;
  // policy_version — версия checked projection.
  int64 policy_version = 9;
  // validation_status — статус проверки source.
  ServicesPolicyValidationStatus validation_status = 10;
  // projection_status — операционный статус projection.
  ServicesPolicyProjectionStatus projection_status = 11;
  // imported_at — время import в формате RFC3339.
  string imported_at = 12;
}

// SelfDeploySignal — project-side safe input для agent-manager SelfDeployPlan.
message SelfDeploySignal {
  // provider_signal_ref — стабильный provider signal idempotency ref.
  string provider_signal_ref = 1;
  // provider_signal_id — persisted signal id в provider-hub, если известен.
  optional string provider_signal_id = 2;
  // provider_signal_key — idempotency key в provider-hub, если известен.
  optional string provider_signal_key = 3;
  // project_ref — project ref в project-catalog.
  string project_ref = 4;
  // repository_ref — repository binding ref в project-catalog.
  string repository_ref = 5;
  // provider_slug идентифицирует provider adapter.
  string provider_slug = 6;
  // repository_full_name — safe provider owner/name.
  string repository_full_name = 7;
  // provider_repository_id — provider-native repository id, если известен.
  optional string provider_repository_id = 8;
  // source_ref — provider ref, который изменился.
  string source_ref = 9;
  // merge_commit_sha — observed head или merge commit sha.
  string merge_commit_sha = 10;
  // services_yaml присутствует, когда у project-catalog есть checked projection.
  SelfDeployServicesYamlProjection services_yaml = 11;
  // affected_service_keys вычисляются только из checked ServicesPolicy descriptors.
  repeated string affected_service_keys = 12;
  // path_categories — safe provider categories, переложенные в project vocabulary.
  repeated SelfDeployPathCategoryCount path_categories = 13;
  // services_yaml_changed показывает, видел ли provider-hub изменение root services.yaml.
  bool services_yaml_changed = 14;
  // deploy_relevant_changed показывает, видел ли provider-hub deploy-relevant categories.
  bool deploy_relevant_changed = 15;
  // expected_runtime_job_types — safe job type hints для agent-manager.
  repeated SelfDeployExpectedRuntimeJobType expected_runtime_job_types = 16;
  // governance_requirement показывает, нужен ли owner/governance gate.
  SelfDeployGovernanceRequirement governance_requirement = 17;
  // provider_change_fingerprint — provider-owned signal fingerprint.
  string provider_change_fingerprint = 18;
  // project_signal_fingerprint — project-side enrichment fingerprint.
  string project_signal_fingerprint = 19;
  // provider_etag — provider-hub safe read token, если известен.
  optional string provider_etag = 20;
  // safe_summary — bounded diagnostic text без raw payloads.
  string safe_summary = 21;
  // observed_at — время provider observation в формате RFC3339.
  string observed_at = 22;
  // version — версия project-side signal contract.
  int64 version = 23;
}

// SelfDeployBuildRecipe содержит статический проверенный рецепт сборки из ServicesPolicy.
message SelfDeployBuildRecipe {
  // image_ref — целевой image repository/ref без digest.
  string image_ref = 1;
  // image_tag — checked tag policy для build результата.
  string image_tag = 2;
  // image_digest заполняется только если checked policy уже содержит безопасный digest.
  optional string image_digest = 3;
  // dockerfile_ref — путь Dockerfile внутри будущего build context.
  string dockerfile_ref = 4;
  // dockerfile_target — фиксированный Dockerfile target.
  string dockerfile_target = 5;
  // builder_image_ref — approved builder image.
  string builder_image_ref = 6;
  // allowed_secret_refs — refs секретов без значений.
  repeated kodex.runtime.v1.RuntimeJobAllowedSecretRef allowed_secret_refs = 7;
  // output_refs — refs ожидаемых build outputs.
  repeated kodex.runtime.v1.RuntimeJobOutputRef output_refs = 8;
  // recipe_fingerprint — стабильный fingerprint рецепта без runtime context.
  string recipe_fingerprint = 9;
}

// SelfDeployMaterializedBuildContext содержит build context, подготовленный runtime-manager.
message SelfDeployMaterializedBuildContext {
  // service_key связывает context с affected service key.
  string service_key = 1;
  // plan_item_fingerprint опционально связывает context с ранее выданным item рецепта.
  optional string plan_item_fingerprint = 2;
  // build_context_ref — ref подготовленного context.
  string build_context_ref = 3;
  // build_context_digest — digest подготовленного context.
  string build_context_digest = 4;
  // dockerfile_digest — digest Dockerfile внутри context, если runtime его посчитал.
  optional string dockerfile_digest = 5;
  // materialization_ref — safe ref runtime materialization attempt.
  optional string materialization_ref = 6;
  // materialization_fingerprint — safe fingerprint runtime materialization result.
  optional string materialization_fingerprint = 7;
  // manifest_bundle_digest — actual YAML bundle digest prepared by runtime-manager.
  optional string manifest_bundle_digest = 8;
}

// SelfDeployBuildPlanItem содержит рецепт и, когда context готов, runtime build spec для одного сервиса.
message SelfDeployBuildPlanItem {
  // service_key идентифицирует service descriptor из checked ServicesPolicy.
  string service_key = 1;
  // service_ref — safe ref service descriptor в project-catalog.
  string service_ref = 2;
  // build_execution_spec совместим с runtime-manager JOB_TYPE_BUILD и присутствует только для ready item.
  kodex.runtime.v1.BuildExecutionSpec build_execution_spec = 3;
  // plan_item_fingerprint — стабильный fingerprint item без raw YAML.
  string plan_item_fingerprint = 4;
  // status описывает готовность item.
  SelfDeployBuildPlanItemStatus status = 5;
  // build_recipe содержит статический проверенный рецепт без runtime context.
  SelfDeployBuildRecipe build_recipe = 6;
  // safe_reason объясняет non-ready item без raw payloads и секретов.
  optional string safe_reason = 7;
}

// SelfDeployBuildPlan — проверенный project-owned plan для подготовки build jobs.
message SelfDeployBuildPlan {
  // project_ref — project ref в project-catalog.
  string project_ref = 1;
  // repository_ref — repository binding ref в project-catalog.
  string repository_ref = 2;
  // provider_signal_ref — safe provider/project signal ref, если известен.
  optional string provider_signal_ref = 3;
  // source_ref — provider/source ref, который послужил trigger.
  string source_ref = 4;
  // merge_commit_sha — commit source snapshot.
  string merge_commit_sha = 5;
  // services_yaml — checked project-owned policy projection.
  SelfDeployServicesYamlProjection services_yaml = 6;
  // affected_service_keys — нормализованный список запрошенных сервисов.
  repeated string affected_service_keys = 7;
  // build_items — per-service typed build specs.
  repeated SelfDeployBuildPlanItem build_items = 8;
  // plan_fingerprint — стабильный fingerprint всего checked build plan.
  string plan_fingerprint = 9;
  // safe_summary — bounded diagnostic summary без raw payloads.
  string safe_summary = 10;
  // version — версия build plan contract.
  int64 version = 11;
}

// SelfDeployBuildOutput содержит safe результат успешной build job для deploy planning.
message SelfDeployBuildOutput {
  string service_key = 1;
  optional string runtime_job_ref = 2;
  string image_ref = 3;
  string image_tag = 4;
  optional string image_digest = 5;
  optional string build_plan_item_fingerprint = 6;
  optional string build_plan_fingerprint = 7;
  optional string build_context_ref = 8;
  optional string build_context_digest = 9;
}

// SelfDeployDeployPlanItem содержит checked deploy spec одного сервиса.
message SelfDeployDeployPlanItem {
  string service_key = 1;
  optional string service_ref = 2;
  kodex.runtime.v1.DeployExecutionSpec deploy_execution_spec = 3;
  string plan_item_fingerprint = 4;
  SelfDeployDeployPlanItemStatus status = 5;
  optional string safe_reason = 6;
}

// SelfDeployDeployPlan содержит checked project-owned deploy inputs.
message SelfDeployDeployPlan {
  string project_ref = 1;
  string repository_ref = 2;
  optional string provider_signal_ref = 3;
  string source_ref = 4;
  string merge_commit_sha = 5;
  SelfDeployServicesYamlProjection services_yaml = 6;
  repeated string affected_service_keys = 7;
  repeated SelfDeployDeployPlanItem deploy_items = 8;
  string plan_fingerprint = 9;
  string safe_summary = 10;
  int64 version = 11;
}

// DocumentationSource describes one project documentation source.
message DocumentationSource {
  // documentation_source_id is the source aggregate id.
  string documentation_source_id = 1;
  // project_id is the owner project id.
  string project_id = 2;
  // repository_id is optional repository binding id.
  optional string repository_id = 3;
  // scope_type classifies where the source applies.
  DocumentationScopeType scope_type = 4;
  // scope_id is optional service, dependency or guidance scope id.
  optional string scope_id = 5;
  // local_path is target path in workspace.
  string local_path = 6;
  // access_mode controls whether the source is editable.
  DocumentationAccessMode access_mode = 7;
  // status is source status.
  DocumentationSourceStatus status = 8;
  // version is the aggregate version.
