  SERVICE_KIND_WORKER = 3;
  SERVICE_KIND_DOCUMENTATION = 4;
  SERVICE_KIND_PACKAGE = 5;
  SERVICE_KIND_OTHER = 6;
}

// ServiceStatus is the closed set of service descriptor statuses.
enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_ACTIVE = 1;
  SERVICE_STATUS_DISABLED = 2;
  SERVICE_STATUS_STALE = 3;
}

