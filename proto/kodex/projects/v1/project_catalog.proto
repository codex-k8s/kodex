  CommandMeta meta = 7;
}

// UpdateProjectRequest changes safe project fields.
message UpdateProjectRequest {
  // project_id is the project aggregate id.
  string project_id = 1;
  // slug is optional new slug.
  optional string slug = 2;
  // display_name is optional safe display text.
  optional string display_name = 3;
  // description is optional safe description; present empty value clears it.
  optional string description = 4;
  // icon_object_uri is optional icon URI; present empty value clears it.
  optional string icon_object_uri = 5;
  // status is optional target lifecycle status.
  optional ProjectStatus status = 6;
  // meta carries idempotency, expected version and audit context.
  CommandMeta meta = 7;
}

// ProjectResponse returns project state.
