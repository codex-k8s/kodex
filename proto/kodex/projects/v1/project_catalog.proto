  ROLLOUT_STRATEGY_DIRECT = 1;
  ROLLOUT_STRATEGY_STAGED = 2;
  ROLLOUT_STRATEGY_CANARY = 3;
}

// RollbackPolicy is the closed set of release rollback policies.
enum RollbackPolicy {
  ROLLBACK_POLICY_UNSPECIFIED = 0;
  ROLLBACK_POLICY_MANUAL = 1;
  ROLLBACK_POLICY_AUTOMATIC_ON_GATE = 2;
  ROLLBACK_POLICY_AUTOMATIC_ON_ALERT = 3;
}

// ReleasePolicyStatus is the closed set of release policy statuses.
