enum DocumentationScopeType {
  DOCUMENTATION_SCOPE_TYPE_UNSPECIFIED = 0;
  DOCUMENTATION_SCOPE_TYPE_PROJECT = 1;
  DOCUMENTATION_SCOPE_TYPE_SERVICE = 2;
  DOCUMENTATION_SCOPE_TYPE_DEPENDENCY = 3;
  DOCUMENTATION_SCOPE_TYPE_GUIDANCE_REF = 4;
}

// DocumentationAccessMode controls whether an agent may edit a documentation source.
enum DocumentationAccessMode {
  DOCUMENTATION_ACCESS_MODE_UNSPECIFIED = 0;
  DOCUMENTATION_ACCESS_MODE_READ = 1;
  DOCUMENTATION_ACCESS_MODE_WRITE = 2;
}

// SourceAccessMode controls whether a workspace source is editable.
enum SourceAccessMode {
  SOURCE_ACCESS_MODE_UNSPECIFIED = 0;
  SOURCE_ACCESS_MODE_READ = 1;
  SOURCE_ACCESS_MODE_WRITE = 2;
}

// DocumentationSourceStatus is the closed set of documentation source statuses.
enum DocumentationSourceStatus {
  DOCUMENTATION_SOURCE_STATUS_UNSPECIFIED = 0;
  DOCUMENTATION_SOURCE_STATUS_ACTIVE = 1;
  DOCUMENTATION_SOURCE_STATUS_DISABLED = 2;
