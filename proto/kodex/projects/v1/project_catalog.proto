syntax = "proto3";

package kodex.projects.v1;

import "kodex/runtime/v1/runtime_manager.proto";

option go_package = "github.com/codex-k8s/kodex/proto/gen/go/kodex/projects/v1;projectsv1";

// ProjectCatalogService is the stable v1 inter-service contract for the
// projects and repositories domain. It covers the command and read surface
// agreed in docs/domains/projects-and-repositories/architecture/api_contract.md.
service ProjectCatalogService {
  // CreateProject creates a project in an organization.
  rpc CreateProject(CreateProjectRequest) returns (ProjectResponse);
  // UpdateProject changes safe project fields and lifecycle status.
  rpc UpdateProject(UpdateProjectRequest) returns (ProjectResponse);
  // GetProject returns authoritative project state.
  rpc GetProject(GetProjectRequest) returns (ProjectResponse);
  // ListProjects returns projects visible in an organization or filter scope.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  // AttachRepository binds a provider repository to a project.
  rpc AttachRepository(AttachRepositoryRequest) returns (RepositoryResponse);
  // CreateProviderRepository asks provider-hub to create a provider repository and records a project binding.
  rpc CreateProviderRepository(CreateProviderRepositoryRequest) returns (RepositoryProviderCreateResponse);
  // CreateRepositoryBootstrapPullRequest asks provider-hub to open or update a bootstrap PR for an existing binding.
  rpc CreateRepositoryBootstrapPullRequest(CreateRepositoryBootstrapPullRequestRequest) returns (RepositoryBootstrapPullRequestResponse);
  // UpdateRepository changes safe repository binding fields.
  rpc UpdateRepository(UpdateRepositoryRequest) returns (RepositoryResponse);
  // DetachRepository archives a repository binding and removes it from active project policy.
  rpc DetachRepository(DetachRepositoryRequest) returns (RepositoryResponse);
  // GetRepository returns authoritative repository binding state.
  rpc GetRepository(GetRepositoryRequest) returns (RepositoryResponse);
  // ListRepositories returns repository bindings for a project.
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  // ImportServicesPolicy stores a checked services.yaml projection.
  rpc ImportServicesPolicy(ImportServicesPolicyRequest) returns (ServicesPolicyResponse);
  // ImportBootstrapServicesPolicy imports checked services.yaml after a merged bootstrap PR and activates the repository binding.
  rpc ImportBootstrapServicesPolicy(ImportBootstrapServicesPolicyRequest) returns (BootstrapServicesPolicyImportResponse);
  // ReconcileBootstrapMergeSignal imports checked services.yaml from a safe provider bootstrap merge signal.
  rpc ReconcileBootstrapMergeSignal(ReconcileBootstrapMergeSignalRequest) returns (BootstrapServicesPolicyImportResponse);
  // ReconcileAdoptionMergeSignal imports checked services.yaml from a safe provider adoption merge signal.
  rpc ReconcileAdoptionMergeSignal(ReconcileAdoptionMergeSignalRequest) returns (BootstrapServicesPolicyImportResponse);
  // GetSelfDeploySignal возвращает project-side enrichment для safe provider repository change signal.
  rpc GetSelfDeploySignal(GetSelfDeploySignalRequest) returns (SelfDeploySignalResponse);
  // GetSelfDeployBuildPlan возвращает проверенный project-side build input для self-deploy runtime jobs.
  rpc GetSelfDeployBuildPlan(GetSelfDeployBuildPlanRequest) returns (SelfDeployBuildPlanResponse);
  // GetSelfDeployDeployPlan возвращает проверенный project-side deploy input после успешных build jobs.
  rpc GetSelfDeployDeployPlan(GetSelfDeployDeployPlanRequest) returns (SelfDeployDeployPlanResponse);
  // GetServicesPolicy returns a checked services.yaml projection.
  rpc GetServicesPolicy(GetServicesPolicyRequest) returns (ServicesPolicyResponse);
  // ListServiceDescriptors returns typed service descriptors from active policy.
  rpc ListServiceDescriptors(ListServiceDescriptorsRequest) returns (ListServiceDescriptorsResponse);
  // GetProjectOnboardingStatus returns safe readiness for manual project/repository onboarding.
  rpc GetProjectOnboardingStatus(GetProjectOnboardingStatusRequest) returns (ProjectOnboardingStatusResponse);
  // CreatePolicyEditProposal creates a request to change services.yaml through PR.
  rpc CreatePolicyEditProposal(CreatePolicyEditProposalRequest) returns (PolicyEditProposalResponse);
  // CreatePolicyOverride creates a time-bound operator override.
  rpc CreatePolicyOverride(CreatePolicyOverrideRequest) returns (PolicyOverrideResponse);
  // CancelPolicyOverride cancels an active operator override before expiration.
  rpc CancelPolicyOverride(CancelPolicyOverrideRequest) returns (PolicyOverrideResponse);
  // ListPolicyOverrides returns visible operator overrides for a project.
  rpc ListPolicyOverrides(ListPolicyOverridesRequest) returns (ListPolicyOverridesResponse);
  // PutDocumentationSource creates or updates a documentation source.
  rpc PutDocumentationSource(PutDocumentationSourceRequest) returns (DocumentationSourceResponse);
  // GetDocumentationSource returns a documentation source.
  rpc GetDocumentationSource(GetDocumentationSourceRequest) returns (DocumentationSourceResponse);
  // ListDocumentationSources returns documentation sources for a project scope.
  rpc ListDocumentationSources(ListDocumentationSourcesRequest) returns (ListDocumentationSourcesResponse);
  // GetWorkspacePolicy returns source checkout policy for an agent workspace.
  rpc GetWorkspacePolicy(GetWorkspacePolicyRequest) returns (WorkspacePolicyResponse);
  // PutBranchRules creates or updates branch rules.
  rpc PutBranchRules(PutBranchRulesRequest) returns (BranchRulesResponse);
  // GetBranchRules returns branch rules.
  rpc GetBranchRules(GetBranchRulesRequest) returns (BranchRulesResponse);
  // ListBranchRules returns active branch rules for a project or repository.
  rpc ListBranchRules(ListBranchRulesRequest) returns (ListBranchRulesResponse);
  // PutReleasePolicy creates or updates a release policy.
  rpc PutReleasePolicy(PutReleasePolicyRequest) returns (ReleasePolicyResponse);
  // GetReleasePolicy returns a release policy.
  rpc GetReleasePolicy(GetReleasePolicyRequest) returns (ReleasePolicyResponse);
  // ListReleasePolicies returns release policies for a project.
  rpc ListReleasePolicies(ListReleasePoliciesRequest) returns (ListReleasePoliciesResponse);
  // PutReleaseLine creates or updates a concrete release line.
  rpc PutReleaseLine(PutReleaseLineRequest) returns (ReleaseLineResponse);
  // GetReleaseLine returns a concrete release line.
  rpc GetReleaseLine(GetReleaseLineRequest) returns (ReleaseLineResponse);
  // ListReleaseLines returns release lines for a project or release policy.
  rpc ListReleaseLines(ListReleaseLinesRequest) returns (ListReleaseLinesResponse);
  // PutPlacementPolicy creates or updates placement policy.
  rpc PutPlacementPolicy(PutPlacementPolicyRequest) returns (PlacementPolicyResponse);
  // GetPlacementPolicy returns placement policy.
  rpc GetPlacementPolicy(GetPlacementPolicyRequest) returns (PlacementPolicyResponse);
  // ListPlacementPolicies returns placement policies for a project scope.
  rpc ListPlacementPolicies(ListPlacementPoliciesRequest) returns (ListPlacementPoliciesResponse);
}

// CommandMeta is required for every mutating command.
message CommandMeta {
  // command_id is a unique command identifier. Either command_id or idempotency_key is required.
  optional string command_id = 1;
  // idempotency_key is an idempotency key scoped by operation and actor.
  optional string idempotency_key = 2;
  // expected_version is present only for existing aggregate mutations.
  optional int64 expected_version = 3;
  // actor is the authenticated caller.
  Actor actor = 4;
  // reason is a machine or operator reason for audit and domain events.
  string reason = 5;
  // request_id links the command to logs, traces and audit.
  string request_id = 6;
  // request_context carries safe request metadata; no tokens, secrets, email or names.
  RequestContext request_context = 7;
}

// QueryMeta carries safe metadata for authoritative reads.
message QueryMeta {
  // actor is the authenticated caller.
  Actor actor = 1;
  // request_id links the read to logs and traces.
  string request_id = 2;
  // request_context carries safe request metadata.
  RequestContext request_context = 3;
}

// RequestContext is safe request metadata used for audit and diagnostics.
message RequestContext {
  // source identifies caller surface, for example staff-gateway, platform-mcp-server or service.
  string source = 1;
  // trace_id links platform traces.
  optional string trace_id = 2;
  // session_id links a user session when available.
  optional string session_id = 3;
  // client_ip_hash is an optional hashed client address.
  optional string client_ip_hash = 4;
}

// Actor identifies a user, service, agent or external account.
message Actor {
  // type is a subject type such as user, service, agent or external_account.
  string type = 1;
  // id is the subject identifier in its owner domain.
  string id = 2;
}

// PageRequest limits list responses.
message PageRequest {
  // page_size is the maximum item count requested by caller.
  int32 page_size = 1;
  // page_token is an opaque continuation token returned by a previous call.
  optional string page_token = 2;
}

// PageResponse describes list continuation state.
message PageResponse {
  // next_page_token is empty when there are no more items.
  optional string next_page_token = 1;
}

