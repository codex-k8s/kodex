  // release_policies are returned in stable server-defined order.
  repeated ReleasePolicy release_policies = 1;
  // page describes continuation state.
  PageResponse page = 2;
}

// PutReleaseLineRequest creates or updates a release line.
message PutReleaseLineRequest {
  // release_line_id is optional release line aggregate id.
  optional string release_line_id = 1;
  // project_id is the owner project id.
  string project_id = 2;
  // release_policy_id is the source release policy id.
  string release_policy_id = 3;
  // name is the release line name.
  string name = 4;
  // branch_pattern is release branch pattern.
  string branch_pattern = 5;
  // status is release line status.
  ReleasePolicyStatus status = 6;
  // meta carries idempotency, optional expected version and audit context.
  CommandMeta meta = 7;
}

// ReleaseLineResponse returns release line state.
message ReleaseLineResponse {
  // release_line is the returned release line.
  ReleaseLine release_line = 1;
}

// GetReleaseLineRequest reads release line.
message GetReleaseLineRequest {
  // release_line_id is the release line aggregate id.
  string release_line_id = 1;
  // meta carries read actor and request context.
  QueryMeta meta = 2;
}

// ListReleaseLinesRequest lists release lines.
message ListReleaseLinesRequest {
  // project_id is the owner project id.
  string project_id = 1;
  // release_policy_id optionally filters lines by release policy.
  optional string release_policy_id = 2;
  // statuses optionally filter line lifecycle.
  repeated ReleasePolicyStatus statuses = 3;
  // page limits response size.
  PageRequest page = 4;
  // meta carries read actor and request context.
  QueryMeta meta = 5;
}

// ListReleaseLinesResponse returns release lines.
message ListReleaseLinesResponse {
  // release_lines are returned in stable server-defined order.
  repeated ReleaseLine release_lines = 1;
  // page describes continuation state.
  PageResponse page = 2;
}

// PutPlacementPolicyRequest creates or updates placement policy.
message PutPlacementPolicyRequest {
  // placement_policy_id is optional placement policy aggregate id.
  optional string placement_policy_id = 1;
  // project_id is the owner project id.
  string project_id = 2;
  // repository_id narrows policy to one repository when set.
  optional string repository_id = 3;
  // service_key narrows policy to one service when set.
  optional string service_key = 4;
  // allowed_cluster_refs contains fleet-manager cluster references.
  repeated string allowed_cluster_refs = 5;
  // status is placement policy status.
  PlacementPolicyStatus status = 6;
  // meta carries idempotency, optional expected version and audit context.
  CommandMeta meta = 7;
}

// PlacementPolicyResponse returns placement policy state.
message PlacementPolicyResponse {
  // placement_policy is the returned placement policy.
  PlacementPolicy placement_policy = 1;
}

// GetPlacementPolicyRequest reads placement policy.
message GetPlacementPolicyRequest {
  // placement_policy_id is the placement policy aggregate id.
  string placement_policy_id = 1;
  // meta carries read actor and request context.
  QueryMeta meta = 2;
}

// ListPlacementPoliciesRequest lists placement policies.
message ListPlacementPoliciesRequest {
  // project_id is the owner project id.
  string project_id = 1;
  // repository_id optionally filters policy by repository.
  optional string repository_id = 2;
  // service_key optionally filters policy by service.
  optional string service_key = 3;
  // statuses optionally filter policy lifecycle.
  repeated PlacementPolicyStatus statuses = 4;
  // page limits response size.
  PageRequest page = 5;
  // meta carries read actor and request context.
  QueryMeta meta = 6;
}

// ListPlacementPoliciesResponse returns placement policies.
message ListPlacementPoliciesResponse {
  // placement_policies are returned in stable server-defined order.
  repeated PlacementPolicy placement_policies = 1;
  // page describes continuation state.
  PageResponse page = 2;
}
