syntax = "proto3";

package kodex.agents.v1;

import "kodex/providers/v1/provider_hub.proto";
import "kodex/runtime/v1/runtime_manager.proto";

option go_package = "github.com/codex-k8s/kodex/proto/gen/go/kodex/agents/v1;agentsv1";

// AgentManagerService is the stable v1 inter-service contract for the agent
// orchestration domain. It owns flows, stages, roles, prompt templates, agent
// sessions, agent runs, acceptance state, follow-up intents and human gate refs.
service AgentManagerService {
  // CreateFlow creates a flow in the requested scope.
  rpc CreateFlow(CreateFlowRequest) returns (FlowResponse);
  // UpdateFlow changes safe flow metadata without mutating immutable versions.
  rpc UpdateFlow(UpdateFlowRequest) returns (FlowResponse);
  // CreateFlowVersion creates an immutable flow definition version.
  rpc CreateFlowVersion(CreateFlowVersionRequest) returns (FlowVersionResponse);
  // ActivateFlowVersion activates one version for future sessions and runs.
  rpc ActivateFlowVersion(ActivateFlowVersionRequest) returns (FlowVersionResponse);
  // GetFlow returns authoritative flow state.
  rpc GetFlow(GetFlowRequest) returns (FlowResponse);
  // ListFlows returns flows by scope and status.
  rpc ListFlows(ListFlowsRequest) returns (ListFlowsResponse);
  // CreateRoleProfile creates an agent role profile.
  rpc CreateRoleProfile(CreateRoleProfileRequest) returns (RoleProfileResponse);
  // UpdateRoleProfile changes safe role metadata and policy refs.
  rpc UpdateRoleProfile(UpdateRoleProfileRequest) returns (RoleProfileResponse);
  // GetRoleProfile returns authoritative role state.
  rpc GetRoleProfile(GetRoleProfileRequest) returns (RoleProfileResponse);
  // ListRoleProfiles returns role profiles by scope, kind and status.
  rpc ListRoleProfiles(ListRoleProfilesRequest) returns (ListRoleProfilesResponse);
  // GetPromptTemplate returns prompt template metadata without template body.
  rpc GetPromptTemplate(GetPromptTemplateRequest) returns (PromptTemplateResponse);
  // ListPromptTemplates returns prompt templates by role and kind.
  rpc ListPromptTemplates(ListPromptTemplatesRequest) returns (ListPromptTemplatesResponse);
  // CreatePromptTemplateVersion creates a prompt template version for a role.
  rpc CreatePromptTemplateVersion(CreatePromptTemplateVersionRequest) returns (PromptTemplateVersionResponse);
  // ActivatePromptTemplateVersion activates one prompt version for future runs.
  rpc ActivatePromptTemplateVersion(ActivatePromptTemplateVersionRequest) returns (PromptTemplateVersionResponse);
  // GetPromptTemplateVersion returns one prompt template version.
  rpc GetPromptTemplateVersion(GetPromptTemplateVersionRequest) returns (PromptTemplateVersionResponse);
  // ListPromptTemplateVersions returns prompt versions by role and kind.
  rpc ListPromptTemplateVersions(ListPromptTemplateVersionsRequest) returns (ListPromptTemplateVersionsResponse);
  // StartAgentSession creates or continues an agent session.
  rpc StartAgentSession(StartAgentSessionRequest) returns (AgentSessionResponse);
  // StartAgentRun creates a role run and records immutable context refs.
  rpc StartAgentRun(StartAgentRunRequest) returns (AgentRunResponse);
  // RecordRunState records a generic run lifecycle transition from runtime, MCP or hook ingress.
  rpc RecordRunState(RecordRunStateRequest) returns (AgentRunResponse);
  // ReportAgentRunState records a bounded state report from an agent-runner bound to one runtime job.
  rpc ReportAgentRunState(ReportAgentRunStateRequest) returns (AgentRunResponse);
  // GetAgentRunRuntimeStatus возвращает безопасное состояние runtime для одного run.
  rpc GetAgentRunRuntimeStatus(GetAgentRunRuntimeStatusRequest) returns (AgentRunRuntimeStatusResponse);
  // RecordSessionStateSnapshot records metadata for a Codex session state object.
  rpc RecordSessionStateSnapshot(RecordSessionStateSnapshotRequest) returns (AgentSessionStateSnapshotResponse);
  // RequestAcceptance requests acceptance checks for a session, run and stage.
  rpc RequestAcceptance(RequestAcceptanceRequest) returns (AcceptanceResultResponse);
  // RecordAcceptanceResult records acceptance state after machine or role checks.
  rpc RecordAcceptanceResult(RecordAcceptanceResultRequest) returns (AcceptanceResultResponse);
  // GetAcceptanceResult returns one acceptance result.
  rpc GetAcceptanceResult(GetAcceptanceResultRequest) returns (AcceptanceResultResponse);
  // ListAcceptanceResults returns acceptance results by session, run, stage or status.
  rpc ListAcceptanceResults(ListAcceptanceResultsRequest) returns (ListAcceptanceResultsResponse);
  // CreateFollowUpIntent records an intent for the next provider-native work item.
  rpc CreateFollowUpIntent(CreateFollowUpIntentRequest) returns (FollowUpIntentResponse);
  // DispatchFollowUpIntent sends a requested follow-up intent to provider-hub as a typed provider command.
  rpc DispatchFollowUpIntent(DispatchFollowUpIntentRequest) returns (FollowUpIntentResponse);
  // RecordAgentActivity records one safe timeline entry for a session or run.
  rpc RecordAgentActivity(RecordAgentActivityRequest) returns (AgentActivityResponse);
  // ListAgentActivities returns safe timeline entries by session or run.
  rpc ListAgentActivities(ListAgentActivitiesRequest) returns (ListAgentActivitiesResponse);
  // RequestHumanGate records an owner-decision wait and safe interaction/governance refs.
  rpc RequestHumanGate(RequestHumanGateRequest) returns (HumanGateRequestResponse);
  // RecordHumanGateDecision records a normalized owner decision outcome.
  rpc RecordHumanGateDecision(RecordHumanGateDecisionRequest) returns (HumanGateRequestResponse);
  // GetHumanGateRequest returns one owner-decision wait.
  rpc GetHumanGateRequest(GetHumanGateRequestRequest) returns (HumanGateRequestResponse);
  // ListHumanGateRequests returns owner-decision waits by session, run, stage or state.
  rpc ListHumanGateRequests(ListHumanGateRequestsRequest) returns (ListHumanGateRequestsResponse);
  // GetAgentSession returns authoritative session state.
  rpc GetAgentSession(GetAgentSessionRequest) returns (AgentSessionResponse);
  // ListAgentSessions returns safe session summaries for operator read surfaces.
  rpc ListAgentSessions(ListAgentSessionsRequest) returns (ListAgentSessionsResponse);
  // ListAgentRuns returns agent runs by session, role, status or provider target.
  rpc ListAgentRuns(ListAgentRunsRequest) returns (ListAgentRunsResponse);
  // ListAgentRunSummaries returns safe run summaries for operator read surfaces.
  rpc ListAgentRunSummaries(ListAgentRunSummariesRequest) returns (ListAgentRunSummariesResponse);
  // CreateSelfDeployPlan records a safe pending plan for self-deploy orchestration.
  rpc CreateSelfDeployPlan(CreateSelfDeployPlanRequest) returns (SelfDeployPlanResponse);
  // CreateSelfDeployPlanFromSignal records a pending plan from a safe provider/project signal.
  rpc CreateSelfDeployPlanFromSignal(CreateSelfDeployPlanFromSignalRequest) returns (SelfDeployPlanResponse);
  // GetSelfDeployPlan returns one safe self-deploy plan.
  rpc GetSelfDeployPlan(GetSelfDeployPlanRequest) returns (SelfDeployPlanResponse);
  // ListSelfDeployPlans returns safe self-deploy plans by project, repository, signal or status.
  rpc ListSelfDeployPlans(ListSelfDeployPlansRequest) returns (ListSelfDeployPlansResponse);
}

// CommandMeta is required for every mutating command.
message CommandMeta {
  // command_id is a unique command identifier. Either command_id or idempotency_key is required.
  optional string command_id = 1;
  // idempotency_key is an idempotency key scoped by operation and actor.
  optional string idempotency_key = 2;
  // expected_version is present only for existing aggregate mutations.
  optional int64 expected_version = 3;
  // actor is the authenticated caller.
  Actor actor = 4;
  // reason is a machine or operator reason for audit and domain events.
  string reason = 5;
  // request_id links the command to logs, traces and audit.
  string request_id = 6;
  // request_context carries safe request metadata; no tokens, secrets, email or names.
  RequestContext request_context = 7;
}

// QueryMeta carries safe metadata for authoritative reads.
message QueryMeta {
  // actor is the authenticated caller.
  Actor actor = 1;
  // request_id links the read to logs and traces.
  string request_id = 2;
  // request_context carries safe request metadata.
  RequestContext request_context = 3;
}

// RequestContext is safe request metadata used for audit and diagnostics.
message RequestContext {
  // source identifies caller surface, for example staff-gateway, platform-mcp-server or service.
  string source = 1;
  // trace_id links platform traces.
  optional string trace_id = 2;
  // session_id links a user session when available.
  optional string session_id = 3;
  // client_ip_hash is an optional hashed client address.
  optional string client_ip_hash = 4;
}

// Actor identifies a user, service, agent or external account.
message Actor {
  // type is a subject type such as user, service, agent or external_account.
  string type = 1;
  // id is the subject identifier in its owner domain.
  string id = 2;
}

// PageRequest limits list responses.
message PageRequest {
  // page_size is the maximum item count requested by caller.
  int32 page_size = 1;
  // page_token is an opaque continuation token returned by a previous call.
  optional string page_token = 2;
}

// PageResponse describes list continuation state.
message PageResponse {
  // next_page_token is empty when there are no more items.
  optional string next_page_token = 1;
}

// LocalizedText carries text for one locale.
message LocalizedText {
  // locale is a BCP 47 locale code, for example ru or en-US.
  string locale = 1;
  // text is localized display text.
  string text = 2;
}

// ScopeRef identifies where a flow, role, session or automation applies.
message ScopeRef {
  // type classifies the scope.
  AgentScopeType type = 1;
  // ref is an external scope identifier owned by another domain.
  string ref = 2;
}

// ProviderTargetRef points to provider-native artifacts without copying their state.
message ProviderTargetRef {
  // work_item_ref points to Issue or another provider-native work item projection.
  optional string work_item_ref = 1;
  // pull_request_ref points to PR/MR projection when available.
  optional string pull_request_ref = 2;
  // comment_ref points to a provider comment projection when available.
  optional string comment_ref = 3;
  // review_signal_ref points to a provider review signal when available.
  optional string review_signal_ref = 4;
}

// GovernanceContextRef указывает на факты governance-manager без копирования тела решений.
message GovernanceContextRef {
  // risk_assessment_ref указывает на состояние оценки риска.
  optional string risk_assessment_ref = 1;
  // gate_request_ref указывает на состояние запроса gate.
  optional string gate_request_ref = 2;
  // gate_decision_ref указывает на состояние решения gate.
  optional string gate_decision_ref = 3;
  // release_decision_package_ref указывает на пакет evidence для release decision.
  optional string release_decision_package_ref = 4;
  // release_decision_ref указывает на состояние release decision.
  optional string release_decision_ref = 5;
  // risk_profile_ref указывает на risk policy profile, применённый к факту.
  optional string risk_profile_ref = 6;
  // gate_policy_ref указывает на gate policy, потребовавшую решение владельца.
  optional string gate_policy_ref = 7;
  // release_policy_ref указывает на release policy из project-catalog.
  optional string release_policy_ref = 8;
}

// RuntimeContextRef points to runtime state owned by runtime-manager.
message RuntimeContextRef {
  // slot_ref points to runtime slot state.
  optional string slot_ref = 1;
  // job_ref points to platform job state.
  optional string job_ref = 2;
  // workspace_ref points to workspace materialization state.
  optional string workspace_ref = 3;
  // context_ref is an opaque runtime context reference.
  optional string context_ref = 4;
}

// GuidanceRef fixes one guidance package used in an agent run.
message GuidanceRef {
  // package_installation_ref points to package-hub installation state.
  string package_installation_ref = 1;
  // package_version_ref points to package-hub version state.
  string package_version_ref = 2;
  // manifest_digest identifies the manifest used for the run.
  string manifest_digest = 3;
  // source_ref optionally identifies a materialized source in runtime workspace.
  optional string source_ref = 4;
  // capability_ref is a stable safe ref for realtime hooks and runtime materialization.
  optional string capability_ref = 5;
  // capability_kind classifies the selected capability context, for example guidance.
  optional string capability_kind = 6;
  // package_ref points to package-hub package state.
  optional string package_ref = 7;
  // package_slug is a safe package slug captured for policy/debug displays.
  optional string package_slug = 8;
  // package_version_label is a safe human-readable package version label.
  optional string package_version_label = 9;
  // policy_summary_json carries a bounded safe status summary without manifest payload.
  optional string policy_summary_json = 10;
}

// GuidanceSelectionHint is an untrusted caller hint resolved by agent-manager
// through package-hub before creating immutable GuidanceRef records on a run.
message GuidanceSelectionHint {
  // package_installation_ref optionally narrows selection to an installed guidance package.
  optional string package_installation_ref = 1;
  // package_slug optionally narrows selection by package slug inside the run scope.
  optional string package_slug = 2;
}

// ObjectRef points to object storage without embedding object content.
message ObjectRef {
  // object_uri points to S3-compatible object storage.
  string object_uri = 1;
  // object_digest is a digest used for integrity checks.
  string object_digest = 2;
  // object_size_bytes is optional object size for limits and retention.
  optional int64 object_size_bytes = 3;
}

