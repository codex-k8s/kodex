  optional string safe_summary = 10;
  optional string interaction_request_ref = 11;
  optional string interaction_response_ref = 12;
  optional string governance_gate_request_ref = 13;
  optional string governance_decision_ref = 14;
  HumanGateStatus status = 15;
  HumanGateOutcome outcome = 16;
  string idempotency_key = 17;
  int64 version = 18;
  string created_at = 19;
  string updated_at = 20;
  optional string resolved_at = 21;
  GovernanceContextRef governance_context = 22;
}

// SelfDeployPlan is a pending safe plan for building or deploying this platform.
