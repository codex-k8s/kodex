// Flow is a logical process template in a scope.
message Flow {
  string id = 1;
  ScopeRef scope = 2;
  string slug = 3;
  repeated LocalizedText display_name = 4;
  repeated LocalizedText description = 5;
  optional string icon_object_uri = 6;
  FlowStatus status = 7;
  optional string active_version_id = 8;
  int64 version = 9;
  string created_at = 10;
  string updated_at = 11;
}

// FlowVersion is an immutable flow definition snapshot.
message FlowVersion {
  string id = 1;
  string flow_id = 2;
  int64 version = 3;
  optional string source_ref = 4;
  string definition_digest = 5;
  FlowVersionStatus status = 6;
  repeated Stage stages = 7;
  repeated StageTransition transitions = 8;
  repeated StageRoleBinding stage_role_bindings = 9;
  optional string activated_at = 10;
  string created_at = 11;
}

// Stage is one flow stage.
message Stage {
  string id = 1;
  string flow_version_id = 2;
  string slug = 3;
  StageType stage_type = 4;
  repeated LocalizedText display_name = 5;
  optional string icon_object_uri = 6;
  // required_artifacts_json is bounded policy JSON for expected provider/runtime/package artifacts.
  string required_artifacts_json = 7;
  // acceptance_policy_json is bounded policy JSON for checks, watermarks, gates and transitions.
  string acceptance_policy_json = 8;
  int32 position = 9;
}

// StageTransition is an allowed transition between stages.
message StageTransition {
  string id = 1;
  string flow_version_id = 2;
  optional string from_stage_id = 3;
  string to_stage_id = 4;
  // condition_json is bounded policy JSON for acceptance, gate, branch or manual choices.
  string condition_json = 5;
  optional string follow_up_type = 6;
}

// RoleProfile is an agent role profile.
message RoleProfile {
  string id = 1;
  ScopeRef scope = 2;
  string slug = 3;
  repeated LocalizedText display_name = 4;
  optional string icon_object_uri = 5;
  RoleKind role_kind = 6;
  string runtime_profile = 7;
  repeated string allowed_mcp_tools = 8;
  optional string provider_account_policy_ref = 9;
  RoleStatus status = 10;
  int64 version = 11;
  string created_at = 12;
  string updated_at = 13;
}

// PromptTemplate groups prompt versions for one role and purpose.
message PromptTemplate {
  string id = 1;
  string role_profile_id = 2;
  PromptKind prompt_kind = 3;
  optional string active_version_id = 4;
  int64 version = 5;
  string created_at = 6;
  string updated_at = 7;
}

// PromptTemplateVersion fixes prompt template content and its source.
message PromptTemplateVersion {
  string id = 1;
  string prompt_template_id = 2;
  string role_profile_id = 3;
  PromptKind prompt_kind = 4;
  int64 version = 5;
  optional string source_ref = 6;
  optional ObjectRef template_object = 7;
  string template_digest = 8;
  PromptVersionStatus status = 9;
  string created_at = 10;
  optional string activated_at = 11;
}

// StageRoleBinding links a stage to a role.
message StageRoleBinding {
  string id = 1;
  string stage_id = 2;
  string role_profile_id = 3;
  StageRoleBindingKind binding_kind = 4;
  // launch_policy_json is bounded policy JSON for manual, automatic, parallel and retry launches.
  string launch_policy_json = 5;
  bool required_for_acceptance = 6;
}

// AgentSession is a resumable logical agent context.
message AgentSession {
  string id = 1;
  ScopeRef scope = 2;
  optional string provider_work_item_ref = 3;
  optional string flow_version_id = 4;
  optional string current_stage_id = 5;
  optional string latest_state_snapshot_id = 6;
  AgentSessionStatus status = 7;
  string created_by_actor_ref = 8;
  int64 version = 9;
  string created_at = 10;
  string updated_at = 11;
}

// AgentRun is one role run inside an agent session.
message AgentRun {
  string id = 1;
  string session_id = 2;
  optional string flow_version_id = 3;
  optional string stage_id = 4;
  string role_profile_id = 5;
  int64 role_profile_version = 6;
  string role_profile_digest = 7;
  string prompt_template_version_id = 8;
  string prompt_template_digest = 9;
  RuntimeContextRef runtime_context = 10;
  ProviderTargetRef provider_target = 11;
  repeated GuidanceRef guidance_refs = 12;
  AgentRunStatus status = 13;
  optional string result_summary = 14;
  optional string failure_code = 15;
  int64 version = 16;
  optional string started_at = 17;
  optional string finished_at = 18;
  string created_at = 19;
  string updated_at = 20;
}

// AgentSessionStateSnapshot is metadata for an object-store Codex session state.
message AgentSessionStateSnapshot {
  string id = 1;
  string session_id = 2;
  optional string run_id = 3;
  AgentSessionSnapshotKind snapshot_kind = 4;
  optional int64 turn_index = 5;
  ObjectRef object = 6;
  string captured_at = 7;
  string created_at = 8;
}

// AcceptanceResult records machine, role or human-gate acceptance state.
message AcceptanceResult {
  string id = 1;
  string session_id = 2;
  optional string run_id = 3;
  optional string stage_id = 4;
  AcceptanceCheckKind check_kind = 5;
  AcceptanceStatus status = 6;
  optional string target_ref = 7;
  // details_json is bounded diagnostic JSON without secrets, tokens, email or provider payloads.
  string details_json = 8;
  int64 version = 9;
  string created_at = 10;
  string updated_at = 11;
  GovernanceContextRef governance_context = 12;
}

// FollowUpIntent is an intent to create or update a provider-native work item.
message FollowUpIntent {
  string id = 1;
  string session_id = 2;
  optional string from_stage_id = 3;
  optional string to_stage_id = 4;
  string provider_work_item_type = 5;
  optional string provider_operation_ref = 6;
  FollowUpIntentStatus status = 7;
  optional string instruction_body_digest = 8;
  int64 version = 9;
  string created_at = 10;
  string updated_at = 11;
  // run_id points to the run that produced the follow-up evidence.
  optional string run_id = 12;
  // acceptance_result_id points to the positive machine acceptance result when one exists.
  optional string acceptance_result_id = 13;
  // provider_target contains safe refs to provider-native artifacts.
  ProviderTargetRef provider_target = 14;
  // safe_title is a bounded title for the next provider-native work item.
  optional string safe_title = 15;
  // safe_summary is a bounded summary for the next provider-native work item.
  optional string safe_summary = 16;
  // role_hint is a bounded role hint for the next flow step.
  optional string role_hint = 17;
  // stage_hint is a bounded stage hint for the next flow step.
  optional string stage_hint = 18;
  // idempotency_key is the command idempotency key stored with this intent.
  string idempotency_key = 19;
  GovernanceContextRef governance_context = 20;
}

// AgentActivity is a safe persistent timeline entry owned by agent-manager.
message AgentActivity {
  string id = 1;
  string session_id = 2;
  optional string run_id = 3;
  optional string turn_id = 4;
  optional string tool_use_id = 5;
  AgentActivityKind activity_kind = 6;
  optional string tool_name = 7;
  optional string tool_category = 8;
  AgentActivityStatus status = 9;
  optional string started_at = 10;
  optional string finished_at = 11;
  optional int64 duration_ms = 12;
  optional string safe_summary = 13;
  optional string payload_digest = 14;
  optional string bounded_error = 15;
  // safe_refs_json is bounded JSON object with refs only, never raw payload.
  string safe_refs_json = 16;
  // safe_details_json is bounded JSON object with safe display details only.
  string safe_details_json = 17;
  optional string correlation_id = 18;
  string idempotency_key = 19;
  int64 version = 20;
  string created_at = 21;
  string updated_at = 22;
}

// HumanGateRequest is the authoritative agent-manager wait/result state for an owner decision.
message HumanGateRequest {
  string id = 1;
  string session_id = 2;
  optional string run_id = 3;
  optional string stage_id = 4;
  optional string acceptance_result_id = 5;
  ProviderTargetRef provider_target = 6;
