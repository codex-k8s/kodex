syntax = "proto3";

package kodex.runtime.v1;

option go_package = "github.com/codex-k8s/kodex/proto/gen/go/kodex/runtime/v1;runtimev1";

// RuntimeManagerService is the stable v1 inter-service contract for the
// runtime and fleet boundary. Runtime-manager owns slots, workspace
// materialization, platform jobs, short diagnostics, cleanup and prewarm state.
service RuntimeManagerService {
  // PrepareRuntime resolves placement through fleet-manager, reserves a slot and starts workspace materialization.
  rpc PrepareRuntime(PrepareRuntimeRequest) returns (PrepareRuntimeResponse);
  // ReserveSlot reserves or creates a runtime slot.
  rpc ReserveSlot(ReserveSlotRequest) returns (SlotResponse);
  // ExtendSlotLease extends active slot lease.
  rpc ExtendSlotLease(ExtendSlotLeaseRequest) returns (SlotResponse);
  // ReleaseSlot releases a slot after work finishes.
  rpc ReleaseSlot(ReleaseSlotRequest) returns (SlotResponse);
  // MarkSlotFailed marks a slot as failed with a classified error.
  rpc MarkSlotFailed(MarkSlotFailedRequest) returns (SlotResponse);
  // GetSlot returns authoritative slot state.
  rpc GetSlot(GetSlotRequest) returns (SlotResponse);
  // ListSlots returns slots by project, status, runtime profile or fleet scope.
  rpc ListSlots(ListSlotsRequest) returns (ListSlotsResponse);
  // StartWorkspaceMaterialization starts source preparation inside a slot.
  rpc StartWorkspaceMaterialization(StartWorkspaceMaterializationRequest) returns (WorkspaceMaterializationResponse);
  // ReportWorkspaceMaterializationProgress updates materialization status, fingerprint and classified error.
  rpc ReportWorkspaceMaterializationProgress(ReportWorkspaceMaterializationProgressRequest) returns (WorkspaceMaterializationResponse);
  // GetWorkspaceMaterialization returns one materialization attempt.
  rpc GetWorkspaceMaterialization(GetWorkspaceMaterializationRequest) returns (WorkspaceMaterializationResponse);
  // ListWorkspaceMaterializations returns materialization attempts by slot or agent run.
  rpc ListWorkspaceMaterializations(ListWorkspaceMaterializationsRequest) returns (ListWorkspaceMaterializationsResponse);
  // CreateJob creates a platform technical job.
  rpc CreateJob(CreateJobRequest) returns (JobResponse);
  // ClaimRunnableJob claims a runnable job with a short lease and returns a lease token.
  rpc ClaimRunnableJob(ClaimRunnableJobRequest) returns (ClaimRunnableJobResponse);
  // ReportJobStepProgress updates job step progress and short diagnostics.
  rpc ReportJobStepProgress(ReportJobStepProgressRequest) returns (JobResponse);
  // CompleteJob completes a job successfully.
  rpc CompleteJob(CompleteJobRequest) returns (JobResponse);
  // FailJob completes a job with a classified error.
  rpc FailJob(FailJobRequest) returns (JobResponse);
  // CancelJob cancels a pending or running job by policy.
  rpc CancelJob(CancelJobRequest) returns (JobResponse);
  // GetJob returns authoritative job state.
  rpc GetJob(GetJobRequest) returns (JobResponse);
  // ListJobs returns jobs by status, type, project, slot, agent run or release line.
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  // RecordRuntimeArtifactRef records a reference to an external runtime artifact.
  rpc RecordRuntimeArtifactRef(RecordRuntimeArtifactRefRequest) returns (RuntimeArtifactRefResponse);
  // ListRuntimeArtifactRefs returns runtime artifact references by job or slot.
  rpc ListRuntimeArtifactRefs(ListRuntimeArtifactRefsRequest) returns (ListRuntimeArtifactRefsResponse);
  // CreateOrUpdateCleanupPolicy creates or updates retention policy for runtime objects.
  rpc CreateOrUpdateCleanupPolicy(CreateOrUpdateCleanupPolicyRequest) returns (CleanupPolicyResponse);
  // RunCleanupBatch claims and executes a cleanup batch by policy.
  rpc RunCleanupBatch(RunCleanupBatchRequest) returns (RunCleanupBatchResponse);
  // CreateOrUpdatePrewarmPool creates or updates a pool of prewarmed slots.
  rpc CreateOrUpdatePrewarmPool(CreateOrUpdatePrewarmPoolRequest) returns (PrewarmPoolResponse);
  // ReconcilePrewarmPool reconciles actual prewarmed slots with target pool size.
  rpc ReconcilePrewarmPool(ReconcilePrewarmPoolRequest) returns (PrewarmPoolResponse);
}

// CommandMeta is required for every mutating command.
message CommandMeta {
  // command_id is a unique command identifier. Either command_id or idempotency_key is required.
  optional string command_id = 1;
  // idempotency_key is an idempotency key scoped by operation and actor.
  optional string idempotency_key = 2;
  // expected_version is present only for existing aggregate mutations.
  optional int64 expected_version = 3;
  // actor is the authenticated caller.
  Actor actor = 4;
  // reason is a machine or operator reason for audit and domain events.
  string reason = 5;
  // request_id links the command to logs, traces and audit.
  string request_id = 6;
  // request_context carries safe request metadata; no tokens, secrets, email or names.
  RequestContext request_context = 7;
}

// QueryMeta carries safe metadata for authoritative reads.
message QueryMeta {
  // actor is the authenticated caller.
  Actor actor = 1;
  // request_id links the read to logs and traces.
  string request_id = 2;
  // request_context carries safe request metadata.
  RequestContext request_context = 3;
}

// RequestContext is safe request metadata used for audit and diagnostics.
message RequestContext {
  // source identifies caller surface, for example staff-gateway, platform-mcp-server or service.
  string source = 1;
  // trace_id links platform traces.
  optional string trace_id = 2;
  // session_id links a user session when available.
  optional string session_id = 3;
  // client_ip_hash is an optional hashed client address.
  optional string client_ip_hash = 4;
}

// Actor identifies a user, service, agent or external account.
message Actor {
  // type is a subject type such as user, service, agent or external_account.
  string type = 1;
  // id is the subject identifier in its owner domain.
  string id = 2;
}

// PageRequest limits list responses.
message PageRequest {
  // page_size is the maximum item count requested by caller.
  int32 page_size = 1;
  // page_token is an opaque continuation token returned by a previous call.
  optional string page_token = 2;
}

// PageResponse describes list continuation state.
message PageResponse {
  // next_page_token is empty when there are no more items.
  optional string next_page_token = 1;
}

// RuntimeMode classifies runtime isolation level.
enum RuntimeMode {
  RUNTIME_MODE_UNSPECIFIED = 0;
  RUNTIME_MODE_CODE_ONLY = 1;
  RUNTIME_MODE_FULL_ENV = 2;
  RUNTIME_MODE_READ_ONLY_PRODUCTION = 3;
}

// SlotStatus is the slot lifecycle status.
enum SlotStatus {
  SLOT_STATUS_UNSPECIFIED = 0;
  SLOT_STATUS_PREWARMED = 1;
  SLOT_STATUS_RESERVED = 2;
  SLOT_STATUS_MATERIALIZING = 3;
  SLOT_STATUS_READY = 4;
  SLOT_STATUS_IN_USE = 5;
  SLOT_STATUS_RELEASING = 6;
  SLOT_STATUS_FAILED = 7;
  SLOT_STATUS_CLEANUP_PENDING = 8;
  SLOT_STATUS_CLEANED = 9;
}

// WorkspaceSourceKind classifies one materialized source.
enum WorkspaceSourceKind {
  WORKSPACE_SOURCE_KIND_UNSPECIFIED = 0;
  WORKSPACE_SOURCE_KIND_CODE = 1;
  WORKSPACE_SOURCE_KIND_DOCUMENTATION = 2;
  WORKSPACE_SOURCE_KIND_GUIDANCE_PACKAGE = 3;
  WORKSPACE_SOURCE_KIND_GENERATED_CONTEXT = 4;
}

// WorkspaceSourceAccessMode controls whether a source is editable.
enum WorkspaceSourceAccessMode {
  WORKSPACE_SOURCE_ACCESS_MODE_UNSPECIFIED = 0;
  WORKSPACE_SOURCE_ACCESS_MODE_READ = 1;
  WORKSPACE_SOURCE_ACCESS_MODE_WRITE = 2;
}

// WorkspaceMaterializationStatus is the source preparation status.
enum WorkspaceMaterializationStatus {
  WORKSPACE_MATERIALIZATION_STATUS_UNSPECIFIED = 0;
  WORKSPACE_MATERIALIZATION_STATUS_PENDING = 1;
  WORKSPACE_MATERIALIZATION_STATUS_RUNNING = 2;
  WORKSPACE_MATERIALIZATION_STATUS_COMPLETED = 3;
  WORKSPACE_MATERIALIZATION_STATUS_FAILED = 4;
  WORKSPACE_MATERIALIZATION_STATUS_CANCELLED = 5;
}

// JobType classifies platform technical jobs.
enum JobType {
  JOB_TYPE_UNSPECIFIED = 0;
  JOB_TYPE_MIRROR = 1;
  JOB_TYPE_BUILD = 2;
  JOB_TYPE_DEPLOY = 3;
  JOB_TYPE_CLEANUP = 4;
  JOB_TYPE_HEALTH_CHECK = 5;
  JOB_TYPE_HOUSEKEEPING = 6;
  JOB_TYPE_WORKSPACE_MATERIALIZATION = 7;
  JOB_TYPE_AGENT_RUN = 8;
}

// JobStatus is the platform job lifecycle status.
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING = 1;
  JOB_STATUS_CLAIMED = 2;
  JOB_STATUS_RUNNING = 3;
  JOB_STATUS_SUCCEEDED = 4;
  JOB_STATUS_FAILED = 5;
  JOB_STATUS_CANCELLED = 6;
  JOB_STATUS_TIMED_OUT = 7;
}

// JobPriority classifies job scheduling priority.
enum JobPriority {
  JOB_PRIORITY_UNSPECIFIED = 0;
  JOB_PRIORITY_LOW = 1;
  JOB_PRIORITY_NORMAL = 2;
  JOB_PRIORITY_HIGH = 3;
  JOB_PRIORITY_BLOCKING = 4;
}

// AgentRunRunnerMode selects a fixed runner mode without arbitrary commands.
enum AgentRunRunnerMode {
  AGENT_RUN_RUNNER_MODE_UNSPECIFIED = 0;
  AGENT_RUN_RUNNER_MODE_CODEX_AGENT = 1;
}

// JobStepStatus is one job step status.
enum JobStepStatus {
  JOB_STEP_STATUS_UNSPECIFIED = 0;
  JOB_STEP_STATUS_PENDING = 1;
  JOB_STEP_STATUS_RUNNING = 2;
  JOB_STEP_STATUS_SUCCEEDED = 3;
  JOB_STEP_STATUS_FAILED = 4;
  JOB_STEP_STATUS_SKIPPED = 5;
}

// RuntimeArtifactType classifies references to external runtime artifacts.
enum RuntimeArtifactType {
  RUNTIME_ARTIFACT_TYPE_UNSPECIFIED = 0;
  RUNTIME_ARTIFACT_TYPE_IMAGE_REF = 1;
  RUNTIME_ARTIFACT_TYPE_KUBERNETES_JOB = 2;
  RUNTIME_ARTIFACT_TYPE_NAMESPACE = 3;
  RUNTIME_ARTIFACT_TYPE_DEPLOYMENT = 4;
  RUNTIME_ARTIFACT_TYPE_LOG_REF = 5;
  RUNTIME_ARTIFACT_TYPE_MANIFEST_REF = 6;
}

// CleanupPolicyStatus is the cleanup policy lifecycle status.
enum CleanupPolicyStatus {
  CLEANUP_POLICY_STATUS_UNSPECIFIED = 0;
  CLEANUP_POLICY_STATUS_ACTIVE = 1;
  CLEANUP_POLICY_STATUS_DISABLED = 2;
  CLEANUP_POLICY_STATUS_SUPERSEDED = 3;
}

// RuntimeScopeType classifies scope for cleanup and prewarm policies.
enum RuntimeScopeType {
  RUNTIME_SCOPE_TYPE_UNSPECIFIED = 0;
  RUNTIME_SCOPE_TYPE_PLATFORM = 1;
  RUNTIME_SCOPE_TYPE_ORGANIZATION = 2;
  RUNTIME_SCOPE_TYPE_PROJECT = 3;
  RUNTIME_SCOPE_TYPE_REPOSITORY = 4;
  RUNTIME_SCOPE_TYPE_RUNTIME_PROFILE = 5;
}

// PrewarmPoolScopeType classifies scope for prewarm pool policies.
enum PrewarmPoolScopeType {
  PREWARM_POOL_SCOPE_TYPE_UNSPECIFIED = 0;
  PREWARM_POOL_SCOPE_TYPE_PLATFORM = 1;
  PREWARM_POOL_SCOPE_TYPE_ORGANIZATION = 2;
  PREWARM_POOL_SCOPE_TYPE_PROJECT = 3;
  PREWARM_POOL_SCOPE_TYPE_REPOSITORY = 4;
}

// PrewarmPoolStatus is the prewarm pool lifecycle status.
enum PrewarmPoolStatus {
  PREWARM_POOL_STATUS_UNSPECIFIED = 0;
  PREWARM_POOL_STATUS_ACTIVE = 1;
  PREWARM_POOL_STATUS_PAUSED = 2;
  PREWARM_POOL_STATUS_DISABLED = 3;
}

// CapacityStatus describes whether actual prewarm capacity matches policy.
enum CapacityStatus {
  CAPACITY_STATUS_UNSPECIFIED = 0;
  CAPACITY_STATUS_OK = 1;
  CAPACITY_STATUS_DEGRADED = 2;
  CAPACITY_STATUS_INSUFFICIENT = 3;
}

// WorkspaceSource describes one source that runtime may materialize.
message WorkspaceSource {
  // source_id is the source identifier from the owner domain.
  string source_id = 1;
  // kind classifies source behavior.
  WorkspaceSourceKind kind = 2;
  // repository_id is an optional project-catalog repository binding id.
  optional string repository_id = 3;
  // provider is repository provider name, for example github or gitlab.
  optional string provider = 4;
  // provider_owner is owner or group name at provider.
  optional string provider_owner = 5;
  // provider_name is repository or package name at provider.
  optional string provider_name = 6;
  // source_ref is a branch, tag, commit, package version or generated context ref.
  optional string source_ref = 7;
  // commit_sha is the concrete commit when known.
  optional string commit_sha = 8;
  // local_path is the target path inside workspace.
  string local_path = 9;
  // access_mode controls whether the source is editable.
  WorkspaceSourceAccessMode access_mode = 10;
  // digest is an immutable content digest when known.
  optional string digest = 11;
  // metadata_json carries safe source metadata without secrets.
  string metadata_json = 12;
}

// WorkspacePolicyInput is the checked source policy runtime can execute.
message WorkspacePolicyInput {
  // project_id is the project id from project-catalog.
  string project_id = 1;
  // policy_digest identifies the checked policy snapshot.
  string policy_digest = 2;
  // policy_version is the project policy version.
  int64 policy_version = 3;
  // sources are code, documentation, guidance and generated context sources.
  repeated WorkspaceSource sources = 4;
  // active_policy_override_ids lists active emergency overrides included in this policy.
  repeated string active_policy_override_ids = 5;
}

// PlacementConstraints are passed to fleet-manager to resolve placement.
message PlacementConstraints {
  // project_id is the project id.
  string project_id = 1;
  // repository_ids optionally narrow placement to repositories.
  repeated string repository_ids = 2;
  // service_keys optionally narrow placement to service descriptors.
  repeated string service_keys = 3;
  // runtime_profile is the requested runtime profile.
  string runtime_profile = 4;
  // preferred_fleet_scope_id is an explicit preferred fleet scope when policy already resolved it.
  optional string preferred_fleet_scope_id = 5;
  // required_capabilities describe required cluster/runtime capabilities.
  repeated string required_capabilities = 6;
  // metadata_json carries safe placement metadata without secrets.
  string metadata_json = 7;
}

// RuntimeContext describes how a caller can use prepared runtime.
message RuntimeContext {
  // slot_id is the prepared slot id.
  string slot_id = 1;
  // agent_run_id is the external agent run id, when bound.
  optional string agent_run_id = 2;
  // fleet_scope_id is the resolved fleet scope.
  optional string fleet_scope_id = 3;
  // cluster_id is the resolved cluster id.
  optional string cluster_id = 4;
  // namespace_name is the Kubernetes namespace in the first implementation.
  string namespace_name = 5;
  // runtime_profile is the active runtime profile.
  string runtime_profile = 6;
  // workspace_root is the root path inside prepared workspace.
  string workspace_root = 7;
  // materialization_fingerprint is the prepared workspace fingerprint.
  string materialization_fingerprint = 8;
}

// AgentRunAllowedSecretRef carries only an allowed secret reference.
message AgentRunAllowedSecretRef {
  // secret_ref points to a secret in an owner domain; secret values are never carried here.
  string secret_ref = 1;
  // purpose is a bounded machine-readable usage label.
  string purpose = 2;
}

// AgentRunReportingTargetRef carries a safe runner reporting target.
message AgentRunReportingTargetRef {
  // kind classifies the owner target, for example agent_run_state or agent_activity.
  string kind = 1;
  // ref is the owner-domain reference.
  string ref = 2;
}

// AgentRunExecutionRef carries a bounded reference for runner execution contracts.
message AgentRunExecutionRef {
  // kind classifies the reference purpose.
  string kind = 1;
  // ref is the owner-domain or runtime-owned reference.
  string ref = 2;
}

// RuntimeJobAllowedSecretRef carries only an allowed secret reference.
message RuntimeJobAllowedSecretRef {
  // secret_ref points to a secret in an owner domain; secret values are never carried here.
  string secret_ref = 1;
  // purpose is a bounded machine-readable usage label.
  string purpose = 2;
}

// RuntimeJobOutputRef carries a bounded output or reporting reference.
message RuntimeJobOutputRef {
  // kind classifies the reference purpose.
  string kind = 1;
  // ref is the owner-domain or runtime-owned reference.
  string ref = 2;
}

// BuildExecutionSpec defines the safe contract for future image build jobs.
message BuildExecutionSpec {
  // source_ref points to the checked source snapshot.
  string source_ref = 1;
  // source_commit_sha is the immutable git commit sha for the build source.
  string source_commit_sha = 2;
  // service_key identifies one service from checked services.yaml stack inventory.
  string service_key = 3;
  // image_ref is the target image repository or fully qualified image ref without a digest.
  string image_ref = 4;
  // image_tag is the target image tag.
  string image_tag = 5;
  // image_digest is optional until the build executor records the produced image digest.
  optional string image_digest = 6;
  // build_context_ref points to the checked build context.
  string build_context_ref = 7;
  // build_context_digest is the immutable digest of the checked build context.
  string build_context_digest = 8;
  // dockerfile_ref points to the checked Dockerfile.
  string dockerfile_ref = 9;
  // dockerfile_digest is the immutable digest of the checked Dockerfile when known.
  optional string dockerfile_digest = 10;
  // dockerfile_target selects a fixed Dockerfile target such as prod or migrations.
  string dockerfile_target = 11;
  // builder_image_ref selects the approved builder image, for example Kaniko executor.
  string builder_image_ref = 12;
  // build_plan_fingerprint identifies the checked build plan.
  string build_plan_fingerprint = 13;
  // allowed_secret_refs lists allowed secret references without values.
  repeated RuntimeJobAllowedSecretRef allowed_secret_refs = 14;
  // output_refs describe where bounded build outputs are written.
  repeated RuntimeJobOutputRef output_refs = 15;
}

// DeployExecutionSpec defines the safe contract for future Kubernetes rollout jobs.
message DeployExecutionSpec {
  // source_ref points to the checked source snapshot used for render/deploy.
  string source_ref = 1;
  // source_commit_sha is the immutable git commit sha for the deploy source.
  string source_commit_sha = 2;
  // service_key identifies one service from checked services.yaml stack inventory.
  string service_key = 3;
  // image_ref is the image repository or fully qualified image ref without a digest.
  string image_ref = 4;
  // image_tag is the target image tag selected by the deploy plan.
  string image_tag = 5;
  // image_digest is the immutable image digest required for rollout.
  string image_digest = 6;
  // manifest_ref points to the checked rendered manifest or manifest set.
  string manifest_ref = 7;
  // manifest_digest is the immutable digest of the checked manifest set.
  string manifest_digest = 8;
  // kustomization_ref points to the checked kustomization input.
  string kustomization_ref = 9;
  // kustomization_digest is the immutable digest of the checked kustomization input.
  string kustomization_digest = 10;
  // target_namespace is the Kubernetes namespace selected by the deploy plan.
  string target_namespace = 11;
  // target_cluster_ref is the fleet-owned target cluster reference.
  string target_cluster_ref = 12;
  // target_slot_id optionally links the rollout to a runtime slot.
  optional string target_slot_id = 13;
  // deploy_plan_fingerprint identifies the checked deploy plan.
  string deploy_plan_fingerprint = 14;
  // allowed_secret_refs lists allowed secret references without values.
  repeated RuntimeJobAllowedSecretRef allowed_secret_refs = 15;
  // output_refs describe where bounded deploy outputs are written.
  repeated RuntimeJobOutputRef output_refs = 16;
}

// CodexSessionExecutionSpec defines the safe contract for a future Codex CLI session.
message CodexSessionExecutionSpec {
  // instruction_object_ref points to the checked execution input object or workspace file.
  string instruction_object_ref = 1;
  // instruction_object_digest is the immutable digest of the checked execution input.
  string instruction_object_digest = 2;
  // result_schema_ref points to the checked result schema object.
  string result_schema_ref = 3;
  // result_schema_digest is the immutable digest of the checked result schema.
  string result_schema_digest = 4;
  // session_snapshot_ref points to the previous Codex session snapshot when resuming.
  optional string session_snapshot_ref = 5;
  // workspace_snapshot_ref points to the checked workspace snapshot when there is no session snapshot.
  optional string workspace_snapshot_ref = 6;
  // hook_endpoint_ref points to the approved Codex hook ingress endpoint reference.
  string hook_endpoint_ref = 7;
  // callback_refs list owner callbacks used for safe lifecycle reporting.
  repeated AgentRunExecutionRef callback_refs = 8;
  // timeout_seconds bounds one Codex session execution attempt.
  int32 timeout_seconds = 9;
  // runner_profile_ref selects the fixed approved runner profile.
  string runner_profile_ref = 10;
  // runner_mode selects the fixed runner mode without arbitrary commands.
  AgentRunRunnerMode runner_mode = 11;
  // output_refs describe where bounded execution outputs are written.
  repeated AgentRunExecutionRef output_refs = 12;
  // result_refs describe where checked result metadata is written.
  repeated AgentRunExecutionRef result_refs = 13;
  // allowed_secret_refs lists allowed secret references without values.
  repeated AgentRunAllowedSecretRef allowed_secret_refs = 14;
}

// AgentRunExecutionSpec defines the safe contract for future agent Run execution.
message AgentRunExecutionSpec {
  // agent_run_id is the external agent-manager Run id.
  string agent_run_id = 1;
  // slot_id identifies the prepared runtime slot.
  string slot_id = 2;
  // expected_materialization_id identifies the expected workspace materialization attempt.
  string expected_materialization_id = 3;
  // expected_materialization_fingerprint is the checked workspace fingerprint.
  string expected_materialization_fingerprint = 4;
  // workspace_ref is the runtime-owned workspace reference.
  string workspace_ref = 5;
  // workspace_mount_ref is the mount reference visible to the runner.
  string workspace_mount_ref = 6;
  // workspace_pvc_ref is the Kubernetes PVC reference used for execution, never a kubeconfig or secret value.
  string workspace_pvc_ref = 7;
  // context_ref points to .kodex/context/agent-run.json or an equivalent runtime-owned reference.
  string context_ref = 8;
  // context_digest is the immutable digest of the checked generated context.
  string context_digest = 9;
  // runner_profile_ref selects an approved runner profile.
  string runner_profile_ref = 10;
  // runner_image_ref selects an approved runner image reference.
  string runner_image_ref = 11;
  // runner_mode selects a fixed runner mode without arbitrary shell commands.
  AgentRunRunnerMode runner_mode = 12;
  // allowed_secret_refs lists allowed secret references without values.
  repeated AgentRunAllowedSecretRef allowed_secret_refs = 13;
  // reporting_target_refs lists owner-domain targets for safe status reporting.
  repeated AgentRunReportingTargetRef reporting_target_refs = 14;
  // codex_session_execution_spec carries safe refs for future Codex CLI execution.
  optional CodexSessionExecutionSpec codex_session_execution_spec = 15;
}

// Slot is an isolated runtime environment.
message Slot {
  // slot_id is the slot aggregate id.
  string slot_id = 1;
  // slot_key is a readable diagnostic key.
  string slot_key = 2;
  // status is the slot lifecycle status.
  SlotStatus status = 3;
  // runtime_mode is the requested isolation mode.
  RuntimeMode runtime_mode = 4;
  // is_prewarmed indicates that slot was created before task binding.
  bool is_prewarmed = 5;
  // fleet_scope_id is an external fleet scope id.
  optional string fleet_scope_id = 6;
  // cluster_id is an external fleet cluster id.
  optional string cluster_id = 7;
  // namespace_name is the Kubernetes namespace in the first implementation.
  string namespace_name = 8;
  // agent_run_id is an external agent-manager run id.
  optional string agent_run_id = 9;
  // project_id is an external project id.
  optional string project_id = 10;
  // repository_ids are external project-catalog repository ids.
  repeated string repository_ids = 11;
  // runtime_profile is the runtime profile key.
  string runtime_profile = 12;
  // fingerprint is the reuse safety fingerprint.
  string fingerprint = 13;
  // lease_owner identifies the current lease holder.
  string lease_owner = 14;
  // lease_until is the lease expiration time in RFC3339 format.
  optional string lease_until = 15;
  // last_error_code is the last classified error code.
  string last_error_code = 16;
  // last_error_message is the last safe error message without secrets.
  string last_error_message = 17;
  // created_at is creation time in RFC3339 format.
  string created_at = 18;
  // updated_at is update time in RFC3339 format.
  string updated_at = 19;
  // version is the aggregate version.
  int64 version = 20;
}

// WorkspaceMaterialization is one attempt to prepare workspace sources.
message WorkspaceMaterialization {
  // workspace_materialization_id is the materialization attempt id.
  string workspace_materialization_id = 1;
  // slot_id is the runtime slot id.
  string slot_id = 2;
  // status is the materialization lifecycle status.
  WorkspaceMaterializationStatus status = 3;
  // policy_digest identifies the checked workspace policy snapshot.
  string policy_digest = 4;
  // sources are normalized sources used for materialization.
  repeated WorkspaceSource sources = 5;
  // fingerprint is the prepared workspace fingerprint.
  string fingerprint = 6;
  // started_at is start time in RFC3339 format.
  optional string started_at = 7;
  // finished_at is finish time in RFC3339 format.
  optional string finished_at = 8;
  // last_error_code is the last classified error code.
  string last_error_code = 9;
  // last_error_message is the last safe error message without secrets.
  string last_error_message = 10;
  // version is the aggregate version.
  int64 version = 11;
}

// Job is a technical platform operation owned by runtime-manager.
message Job {
  // job_id is the job aggregate id.
  string job_id = 1;
  // command_id is the create command id used for idempotency.
  string command_id = 2;
  // job_type classifies the technical operation.
  JobType job_type = 3;
  // status is the job lifecycle status.
  JobStatus status = 4;
  // priority is the scheduling priority.
  JobPriority priority = 5;
  // job_input_json carries bounded operation input without secrets.
  string job_input_json = 6;
  // lease_owner identifies the worker or controller that claimed the job.
  string lease_owner = 7;
  // lease_until is claim lease expiration time in RFC3339 format.
  optional string lease_until = 8;
  // claim_attempt increments every time the job is claimed.
  int64 claim_attempt = 9;
  // slot_id is an optional runtime slot id.
  optional string slot_id = 10;
  // agent_run_id is an external agent-manager run id.
  optional string agent_run_id = 11;
  // project_id is an external project id.
  optional string project_id = 12;
  // repository_id is an external repository binding id.
  optional string repository_id = 13;
  // release_line_id is an external release line id.
  optional string release_line_id = 14;
  // package_installation_id is an external package installation id.
  optional string package_installation_id = 15;
  // fleet_scope_id is an external fleet scope id.
  optional string fleet_scope_id = 16;
  // cluster_id is an external fleet cluster id.
  optional string cluster_id = 17;
  // requested_by is the actor id that requested the job when available.
  optional string requested_by = 18;
  // created_at is creation time in RFC3339 format.
  string created_at = 19;
  // started_at is start time in RFC3339 format.
  optional string started_at = 20;
  // finished_at is finish time in RFC3339 format.
  optional string finished_at = 21;
  // next_action describes the next expected operator or automation action.
  string next_action = 22;
  // last_error_code is the last classified error code.
  string last_error_code = 23;
  // last_error_message is the last safe error message without secrets.
  string last_error_message = 24;
  // short_log_tail stores a bounded diagnostic log tail.
  string short_log_tail = 25;
  // full_log_ref points to the full log source.
  string full_log_ref = 26;
  // version is the aggregate version.
  int64 version = 27;
  // steps are job steps returned with the job state.
  repeated JobStep steps = 28;
  // agent_run_execution_spec is present only for executable JOB_TYPE_AGENT_RUN jobs.
  optional AgentRunExecutionSpec agent_run_execution_spec = 29;
  // build_execution_spec is present only for executable JOB_TYPE_BUILD jobs.
  optional BuildExecutionSpec build_execution_spec = 30;
  // deploy_execution_spec is present only for typed JOB_TYPE_DEPLOY jobs.
  optional DeployExecutionSpec deploy_execution_spec = 31;
}

// JobStep is one step of a platform job.
message JobStep {
  // job_step_id is the step id.
  string job_step_id = 1;
  // job_id is the parent job id.
  string job_id = 2;
  // step_key is a stable step key such as checkout, build or deploy.
  string step_key = 3;
  // status is the step status.
  JobStepStatus status = 4;
  // started_at is start time in RFC3339 format.
  optional string started_at = 5;
  // finished_at is finish time in RFC3339 format.
  optional string finished_at = 6;
  // short_log_tail stores a bounded diagnostic log tail for this step.
  string short_log_tail = 7;
  // external_ref points to Kubernetes Job, Pod or another external object.
  string external_ref = 8;
  // error_code is the classified step error code.
  string error_code = 9;
  // error_message is a safe step error message without secrets.
  string error_message = 10;
  // version is the step version.
  int64 version = 11;
}

// RuntimeArtifactRef points to an external runtime artifact without copying it into runtime DB.
message RuntimeArtifactRef {
  // runtime_artifact_ref_id is the reference id.
  string runtime_artifact_ref_id = 1;
  // job_id optionally links the reference to a job.
  optional string job_id = 2;
  // slot_id optionally links the reference to a slot.
  optional string slot_id = 3;
  // artifact_type classifies the referenced artifact.
  RuntimeArtifactType artifact_type = 4;
  // external_ref is the primary source URI or object reference.
  string external_ref = 5;
  // digest is the immutable digest when known.
  string digest = 6;
  // metadata_json carries bounded safe metadata without secrets.
  string metadata_json = 7;
  // created_at is creation time in RFC3339 format.
  string created_at = 8;
}

// RuntimeArtifactRefInput carries caller-provided external artifact reference data.
message RuntimeArtifactRefInput {
  // artifact_type classifies the referenced artifact.
  RuntimeArtifactType artifact_type = 1;
  // external_ref is the primary source URI or object reference.
  string external_ref = 2;
  // digest is the immutable digest when known.
  string digest = 3;
  // metadata_json carries bounded safe metadata without secrets.
  string metadata_json = 4;
}

// CleanupPolicy describes retention and cleanup rules for runtime objects.
message CleanupPolicy {
  // cleanup_policy_id is the cleanup policy id.
  string cleanup_policy_id = 1;
  // scope_type classifies the scope this policy applies to.
  RuntimeScopeType scope_type = 2;
  // scope_id is the optional external scope id.
  optional string scope_id = 3;
  // ttl_seconds is the default retention period for completed runtime objects.
  int64 ttl_seconds = 4;
  // failed_ttl_seconds is the retention period for failed runtime objects.
  int64 failed_ttl_seconds = 5;
  // keep_short_log_tail controls whether bounded diagnostic tails remain after cleanup.
  bool keep_short_log_tail = 6;
  // status is the cleanup policy status.
  CleanupPolicyStatus status = 7;
  // created_at is creation time in RFC3339 format.
  string created_at = 8;
  // updated_at is update time in RFC3339 format.
  string updated_at = 9;
  // version is the aggregate version.
  int64 version = 10;
}

// PrewarmPool describes desired prewarmed slot capacity.
message PrewarmPool {
  // prewarm_pool_id is the prewarm pool id.
  string prewarm_pool_id = 1;
  // scope_type classifies the scope this pool applies to.
  PrewarmPoolScopeType scope_type = 2;
  // scope_id is the optional external scope id.
  optional string scope_id = 3;
  // runtime_profile is the runtime profile maintained by the pool.
  string runtime_profile = 4;
  // fleet_scope_id is the optional fleet scope for this pool.
  optional string fleet_scope_id = 5;
  // target_size is desired number of prewarmed slots.
  int64 target_size = 6;
  // status is the prewarm pool status.
  PrewarmPoolStatus status = 7;
  // last_capacity_status describes the last capacity reconciliation result.
  CapacityStatus last_capacity_status = 8;
  // created_at is creation time in RFC3339 format.
  string created_at = 9;
  // updated_at is update time in RFC3339 format.
  string updated_at = 10;
  // version is the aggregate version.
  int64 version = 11;
}

message PrepareRuntimeRequest {
